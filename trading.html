<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD TRADE CENTER - ระบบแลกเปลี่ยน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffc831; --blue: #00d2ff; --bg: #0f0f13; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        .lobby-container { max-width: 500px; margin: 100px auto; text-align: center; padding: 20px; background: #1a1a20; border-radius: 20px; border: 1px solid #333; }
        .input-group { margin: 20px 0; }
        input { background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 80%; font-size: 1.2rem; text-align: center; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; margin-top: 10px; }
        
        .trade-screen { display: none; padding: 20px; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .trade-box { background: #1a1a20; border-radius: 15px; padding: 20px; border: 2px solid #333; position: relative; }
        .trade-box.active { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 200, 49, 0.2); }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .offer-area { min-height: 200px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .offered-card { width: 100%; border-radius: 5px; border: 1px solid var(--gold); }
        .resource-offer { margin-top: 15px; font-size: 1.1rem; color: var(--blue); }

        .confirm-btn { background: #444; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .confirm-btn.ready { background: #2ed573; color: black; }
        .status-tag { position: absolute; top: 10px; right: 10px; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }
        .status-waiting { background: #ff4757; }
        .status-ready { background: #2ed573; color: black; }

        .inventory-drawer { grid-column: span 2; background: #1a1a20; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .inv-item { cursor: pointer; transition: 0.2s; position: relative; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; border: 1px solid transparent; }
        .inv-item:hover { border-color: var(--gold); transform: translateY(-3px); }
        .inv-item img { width: 100%; border-radius: 8px; display: block; }
        .count-badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: black; font-size: 0.75rem; padding: 2px 8px; border-radius: 50px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="lobby" class="lobby-container">
        <h2 style="color: var(--gold);"><i class="fas fa-sync-alt"></i> TRADE CENTER</h2>
        <div class="input-group">
            <button class="btn-main" onclick="createRoom()">สร้างห้องใหม่</button>
            <p style="color: #666;">--- หรือ ---</p>
            <input type="text" id="roomInput" placeholder="ใส่รหัสห้อง 6 หลัก">
            <button class="btn-main" style="background: var(--blue);" onclick="joinRoom()">เข้าห้องแลกเปลี่ยน</button>
        </div>
    </div>

    <div id="tradeScreen" class="trade-screen">
        <h2 style="grid-column: span 2; text-align: center; color: var(--gold);">ROOM ID: <span id="displayRoomId">------</span></h2>
        
        <div class="trade-box active" id="mySide">
            <div id="myStatus" class="status-tag status-waiting">รอยืนยัน</div>
            <div class="user-info">
                <i class="fas fa-user-circle fa-2x"></i>
                <div><b>คุณ (ฉัน)</b></div>
            </div>
            <div class="offer-area" id="myOffers"></div>
            <div class="resource-offer">
                🪙 <span id="myGoldOffer">0</span> | 💎 <span id="myDiaOffer">0</span>
                <button onclick="setResources()" style="font-size: 0.7rem; background: none; border: 1px solid #555; color: #aaa; cursor: pointer; margin-left: 10px; padding: 2px 8px; border-radius: 5px;">แก้ไข</button>
            </div>
            <button class="confirm-btn" id="myConfirmBtn" onclick="toggleReady()">ยืนยันข้อเสนอ</button>
        </div>

        <div class="trade-box" id="peerSide">
            <div id="peerStatus" class="status-tag status-waiting">รอยืนยัน</div>
            <div class="user-info">
                <i class="fas fa-user-friends fa-2x"></i>
                <div id="peerName">รออีกฝ่าย...</div>
            </div>
            <div class="offer-area" id="peerOffers"></div>
            <div class="resource-offer">
                🪙 <span id="peerGoldOffer">0</span> | 💎 <span id="peerDiaOffer">0</span>
            </div>
        </div>

        <div class="inventory-drawer">
            <h3 style="margin-top: 0;"><i class="fas fa-th"></i> เลือกการ์ดที่ซ้ำของคุณทั้งหมด</h3>
            <div id="myInventory" class="inv-grid"></div>
        </div>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid, userData, roomId;
    let isCreator = false;
    let myOffer = { cards: [], gold: 0, diamonds: 0, ready: false };
    window.isTradingAction = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (snap) => {
                if (snap.exists()) {
                    userData = snap.data();
                    renderInventory(); 
                }
            });
        } else { window.location.href = "login.html"; }
    });

    // แก้ไขฟังก์ชันให้ดึงมาทั้งหมด "จริงๆ" โดยเช็คหลาย Key
    function renderInventory() {
        const invGrid = document.getElementById("myInventory");
        invGrid.innerHTML = "";
        
        const userCards = userData.collection || [];
        console.log("DEBUG: ข้อมูลใน Collection ทั้งหมด ->", userCards);

        // กรองการ์ดที่มีซ้ำ (เช็คทั้ง .count และ .amount เพื่อความชัวร์)
        const duplicates = userCards.filter(card => {
            const quantity = card.count || card.amount || 0;
            return quantity > 1;
        });

        if (duplicates.length === 0) {
            invGrid.innerHTML = `<div style="grid-column: span 4; text-align: center; color: #666; padding: 40px;">
                ไม่มีการ์ดซ้ำในสมุดสะสมที่สามารถเทรดได้
            </div>`;
            return;
        }

        duplicates.forEach((card) => {
            const quantity = card.count || card.amount || 0;
            const div = document.createElement("div");
            div.className = "inv-item";
            div.onclick = () => addToOffer(card);
            
            // ใช้ Image จากคีย์ที่น่าจะเป็นไปได้ (img หรือ image)
            const displayImg = card.img || card.image || 'https://via.placeholder.com/150';

            div.innerHTML = `
                <img src="${displayImg}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/150'">
                <div class="count-badge">x${quantity}</div>
                <div style="font-size: 10px; color: #fff; text-align: center; margin-top: 8px; font-weight:bold;">
                    ${card.name}
                </div>
                <div style="font-size: 9px; color: var(--blue); text-align: center;">ส่งได้: ${quantity - 1} ใบ</div>
            `;
            invGrid.appendChild(div);
        });
    }

    window.addToOffer = (card) => {
        if (myOffer.cards.length >= 4) return alert("แลกได้สูงสุดครั้งละ 4 ใบ");
        
        const quantity = card.count || card.amount || 0;
        const inOfferCount = myOffer.cards.filter(c => c.name === card.name).length;
        
        if (inOfferCount >= quantity - 1) {
            return alert(`คุณต้องเก็บ ${card.name} ไว้อย่างน้อย 1 ใบ`);
        }

        myOffer.cards.push({ ...card, count: 1 });
        myOffer.ready = false;
        syncOffer();
    };

    // ส่วนประกอบอื่นๆ ของระบบแลกเปลี่ยน
    window.createRoom = async () => {
        roomId = Math.floor(100000 + Math.random() * 900000).toString();
        isCreator = true;
        await setDoc(doc(db, "rooms", roomId), {
            p1: { uid, name: userData.username, offer: myOffer },
            p2: null, status: "waiting", createdAt: new Date()
        });
        startTrade();
    };

    window.joinRoom = async () => {
        roomId = document.getElementById("roomInput").value;
        if(!roomId) return alert("กรุณาใส่รหัสห้อง");
        const roomRef = doc(db, "rooms", roomId);
        const snap = await getDoc(roomRef);
        if (snap.exists() && !snap.data().p2) {
            isCreator = false;
            await updateDoc(roomRef, {
                p2: { uid, name: userData.username, offer: myOffer },
                status: "active"
            });
            startTrade();
        } else { alert("ห้องเต็มหรือไม่พบเลขห้อง"); }
    };

    function startTrade() {
        document.getElementById("lobby").style.display = "none";
        document.getElementById("tradeScreen").style.display = "grid";
        document.getElementById("displayRoomId").innerText = roomId;
        listenToRoom();
    }

    function listenToRoom() {
        onSnapshot(doc(db, "rooms", roomId), async (snapshot) => {
            const data = snapshot.data();
            if (!data) return;
            const me = isCreator ? data.p1 : data.p2;
            const peer = isCreator ? data.p2 : data.p1;
            if (peer) {
                document.getElementById("peerName").innerText = peer.name;
                updateOfferUI("peer", peer.offer);
            }
            updateOfferUI("my", me.offer);
            if (data.p1.offer.ready && data.p2?.offer.ready) { executeTrade(data); }
        });
    }

    function updateOfferUI(side, offer) {
        const area = document.getElementById(`${side}Offers`);
        const status = document.getElementById(`${side}Status`);
        document.getElementById(`${side}GoldOffer`).innerText = (offer.gold || 0).toLocaleString();
        document.getElementById(`${side}DiaOffer`).innerText = (offer.diamonds || 0).toLocaleString();
        area.innerHTML = offer.cards.map(c => `<img src="${c.img || c.image}" class="offered-card">`).join("");
        if (offer.ready) {
            status.innerText = "พร้อมแล้ว"; status.className = "status-tag status-ready";
            if(side === 'my') document.getElementById("myConfirmBtn").classList.add("ready");
        } else {
            status.innerText = "รอยืนยัน"; status.className = "status-tag status-waiting";
            if(side === 'my') document.getElementById("myConfirmBtn").classList.remove("ready");
        }
    }

    window.setResources = () => {
        const g = parseInt(prompt("Coins:", 0)) || 0;
        const d = parseInt(prompt("Diamonds:", 0)) || 0;
        if (g > (userData.coins || 0) || d > (userData.diamonds || 0)) return alert("ทรัพยากรไม่พอ!");
        myOffer.gold = g; myOffer.diamonds = d; myOffer.ready = false;
        syncOffer();
    };

    window.toggleReady = () => { 
        if(myOffer.cards.length === 0 && myOffer.gold === 0 && myOffer.diamonds === 0) return alert("เลือกของก่อนครับ");
        myOffer.ready = !myOffer.ready; 
        syncOffer(); 
    };

    async function syncOffer() {
        const roomRef = doc(db, "rooms", roomId);
        const updateObj = isCreator ? { "p1.offer": myOffer } : { "p2.offer": myOffer };
        await updateDoc(roomRef, updateObj);
    }

    async function executeTrade(roomData) {
        if (window.isTradingAction) return;
        window.isTradingAction = true;
        const myRef = doc(db, "users", uid);
        const myOfferFinal = isCreator ? roomData.p1.offer : roomData.p2.offer;
        const peerOfferFinal = isCreator ? roomData.p2.offer : roomData.p1.offer;

        try {
            const mySnap = await getDoc(myRef);
            let myColl = [...mySnap.data().collection];

            // หักของ
            myOfferFinal.cards.forEach(cOut => {
                const idx = myColl.findIndex(c => c.name === cOut.name);
                if (idx > -1) myColl[idx].count = (myColl[idx].count || myColl[idx].amount) - 1;
            });

            // เพิ่มของ
            peerOfferFinal.cards.forEach(cIn => {
                const idx = myColl.findIndex(c => c.name === cIn.name);
                if (idx > -1) { 
                    const q = (myColl[idx].count || myColl[idx].amount || 1);
                    myColl[idx].count = q + 1; 
                } 
                else { myColl.push({ ...cIn, count: 1 }); }
            });

            await updateDoc(myRef, {
                collection: myColl,
                coins: increment(peerOfferFinal.gold - myOfferFinal.gold),
                diamonds: increment(peerOfferFinal.diamonds - myOfferFinal.diamonds)
            });

            if (isCreator) setTimeout(async () => { await deleteDoc(doc(db, "rooms", roomId)); }, 1000);
            alert("✅ แลกเปลี่ยนสำเร็จ!");
            window.location.reload(); 
        } catch (e) { 
            console.error(e); 
            window.isTradingAction = false; 
        }
    }
</script>
</body>
</html>
