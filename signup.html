<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - MY GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 40px 30px; border-radius: 20px; text-align: center; border: 1px solid #444; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h2 { color: #28a745; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #888; font-size: 0.85rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #28a745; text-align: center; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #28a745; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; font-size: 1.1rem; margin-top: 15px; }
        button:hover { background: #fff; color: #28a745; transform: translateY(-2px); }
        .link { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .link a { color: #ffc831; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>📝 สมัครสมาชิก</h2>
        <p>สร้างบัญชีใหม่เพื่อเข้าสู่โลกของเกม</p>
        
        <input type="email" id="reg-email" placeholder="อีเมล (เช่น name@email.com)" autocomplete="on">
        <input type="text" id="reg-user" placeholder="ชื่อเล่นในเกม" autocomplete="off">
        <input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน (6 ตัวขึ้นไป)">
        <input type="password" id="reg-confirm" placeholder="ยืนยันรหัสผ่าน">
        
        <button id="reg-btn">สร้างบัญชีผู้ใช้</button>
        
        <div class="link">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("reg-btn").onclick = async () => {
        const email = document.getElementById("reg-email").value.trim();
        const username = document.getElementById("reg-user").value.trim();
        const pass = document.getElementById("reg-pass").value.trim();
        const confirmPass = document.getElementById("reg-confirm").value.trim();

        // ตรวจสอบความถูกต้องเบื้องต้น
        if (!email || !username || !pass) return alert("⚠️ กรุณากรอกข้อมูลให้ครบทุกช่อง");
        if (pass !== confirmPass) return alert("❌ รหัสผ่านไม่ตรงกัน!");
        if (pass.length < 6) return alert("⚠️ รหัสผ่านต้องมี 6 ตัวขึ้นไป (ตามกฎ Firebase)");

        try {
            // 1. สร้างบัญชีผู้ใช้ใน Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. บันทึกข้อมูลเสริมลงใน Firestore โดยใช้ UID เป็นชื่อเอกสาร
            await setDoc(doc(db, "users", user.uid), {
                username: username,
                email: email,
                points: 1000, // แถมแต้มเริ่มต้นให้เลย
                collection: [],
                profileImage: "",
                role: "user",
                createdAt: new Date().toISOString()
            });

            alert("✨ สมัครสมาชิกสำเร็จ! ระบบกำลังพาคุณไปหน้าล็อกอิน");
            window.location.href = "login.html";

        } catch (error) {
            console.error(error);
            if (error.code === 'auth/email-already-in-use') {
                alert("❌ อีเมลนี้ถูกใช้งานแล้ว!");
            } else if (error.code === 'auth/invalid-email') {
                alert("❌ รูปแบบอีเมลไม่ถูกต้อง!");
            } else {
                alert("เกิดข้อผิดพลาด: " + error.message);
            }
        }
    };
</script>
</body>
</html>
