<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครสมาชิก - Mycard Game</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background: #161616; padding: 30px; border-radius: 20px; width: 320px; border: 1px solid #333; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; }
        button { width: 100%; padding: 12px; background: #ffc831; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="signup-box">
    <h2 style="color: #ffc831;">สร้างบัญชีใหม่</h2>
    <input type="email" id="email" placeholder="อีเมล (เช่น test@gmail.com)">
    <input type="password" id="password" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)">
    <button onclick="handleSignUp()">สมัครสมาชิก</button>
    <p style="font-size: 0.8rem; color: #888; cursor: pointer;" onclick="location.href='login.html'">มีบัญชีแล้ว? เข้าสู่ระบบ</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ใช้ข้อมูลจากรูป Project Settings ของคุณ
    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleSignUp = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            // 1. สร้างบัญชีใน Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. สร้างฐานข้อมูลเริ่มต้นให้ผู้ใช้ใหม่ใน Firestore
            await setDoc(doc(db, "users", user.uid), {
                email: email,
                points: 1000, // แถมพอยท์เริ่มเล่น
                myCollection: [], // คลังการ์ดว่างเปล่า
                featuredCard: null
            });

            alert("สมัครสมาชิกสำเร็จ!");
            window.location.href = "profile.html";
        } catch (error) {
            alert("ผิดพลาด: " + error.message);
        }
    };
</script>
</body>
</html>
