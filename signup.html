<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครสมาชิก - MyCard Game</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background: #161616; padding: 30px; border-radius: 20px; width: 320px; border: 1px solid #333; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; }
        button { width: 100%; padding: 12px; background: #ffc831; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }
    </style>
</head>
<body>

<div class="signup-box">
    <h2 style="color: #ffc831;">สมัครสมาชิก</h2>
    <input type="text" id="username" placeholder="ตั้งชื่อผู้ใช้ (ภาษาอังกฤษ)">
    <input type="password" id="password" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)">
    <button onclick="handleSignUp()">สมัครสมาชิกเลย!</button>
    <p style="font-size: 0.8rem; color: #888; cursor: pointer; margin-top: 15px;" onclick="location.href='login.html'">มีบัญชีแล้ว? เข้าสู่ระบบ</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleSignUp = async () => {
        const userField = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if(!userField || password.length < 6) {
            alert("กรุณากรอกชื่อและรหัสผ่านให้ครบ (6 ตัวขึ้นไป)");
            return;
        }

        // แก้ตรงนี้ให้เป็น @card.com เหมือนหน้า Login ครับ
        const fakeEmail = userField + "@card.com";

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                username: userField,
                points: 500, 
                myCollection: [],
                featuredCard: null // เพิ่มไว้สำหรับเก็บการ์ดที่จะโชว์หน้าโปรไฟล์
            });

            alert("สมัครสำเร็จ! ยินดีต้อนรับคุณ " + userField);
            window.location.href = "login.html"; // สมัครเสร็จแล้วให้ไปหน้า Login
        } catch (error) {
            alert("สมัครไม่สำเร็จ: " + error.message);
        }
    };
</script>
</body>
</html>
