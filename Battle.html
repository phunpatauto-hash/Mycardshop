<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Rank System (Dynamic Trophies)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
            overflow-x: hidden;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; padding-left: 90px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .rank-status { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .rank-status:hover { background: rgba(255,255,255,0.1); border-color: #ffc831; }
        .rank-icon { font-size: 2.5rem; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .season-timer { text-align: center; font-size: 0.8rem; color: #aaa; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 20px; border: 1px solid #333; }

        @keyframes rainbowText {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            20% { color: #ff8000; text-shadow: 0 0 10px #ff8000; }
            40% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            60% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            80% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #8000ff; text-shadow: 0 0 10px #8000ff; }
        }
        .rank-rainbow {
            animation: rainbowText 3s linear infinite;
            font-weight: bold !important;
        }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #1a1a2e; margin: 5% auto; padding: 25px; border: 2px solid #ffc831; width: 90%; max-width: 600px; border-radius: 20px; position: relative; box-shadow: 0 0 30px rgba(255, 200, 49, 0.2); }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.8rem; cursor: pointer; color: #ffc831; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { flex: 1; min-width: 90px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; text-align: center; font-size: 0.9rem; transition: 0.2s; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; box-shadow: 0 4px 15px rgba(255, 200, 49, 0.3); }

        .card-row { display: flex; gap: 8px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 75px; aspect-ratio: 2/3; background: #222; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* CSS เฉพาะของแต่ละระดับ */
        .rarity-usec { border: 2.5px solid #ffffff !important; box-shadow: 0 0 15px #ffffff; }
        .rarity-exr { border: 2px solid #ff00ff !important; box-shadow: 0 0 10px #ff00ff; }
        .rarity-cbr { border: 2px solid #ff4d4d !important; box-shadow: 0 0 10px #ff4d4d; }
        .rarity-pr { border: 2px solid #ffc831 !important; border-style: dashed !important; }

        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; padding: 2px; font-size: 0.6rem; text-align: center; color: #ffc831; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.55rem; padding: 1px 4px; border-radius: 4px; font-weight: bold; z-index: 2; }
        .selected-glow { border: 2.5px solid #ffc831 !important; transform: scale(1.05); z-index: 5; box-shadow: 0 0 20px #ffc831; }

        .elem-icon { position: absolute; top: 2px; left: 4px; font-size: 0.8rem; z-index: 2; filter: drop-shadow(0 0 2px black); }

        .ui-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s; }
        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; font-size: 1rem; }
        .bot-tag { background: #ff4d4d; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 5px; }

        .battle-area { position: relative; overflow: hidden; min-height: 450px; display: flex; flex-direction: column; justify-content: center; }
        .ready-up { animation: readyAni 0.6s ease-in-out infinite alternate; }
        @keyframes readyAni { from { transform: translateY(0) scale(1); filter: brightness(1); } to { transform: translateY(5px) scale(1.02); filter: brightness(1.3); } }
        .strike-player { animation: strikeP 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        .strike-opp { animation: strikeO 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        @keyframes strikeP { 0% { transform: translateY(0); } 50% { transform: translateY(-120px) scale(1.2); z-index: 10; } 100% { transform: translateY(0); } }
        @keyframes strikeO { 0% { transform: translateY(0); } 50% { transform: translateY(120px) scale(1.2); z-index: 10; } 100% { transform: translateY(0); } }
        .arena-shake { animation: shakeEffect 0.4s ease-in-out; }
        @keyframes shakeEffect { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-15px) rotate(-1deg); } 40% { transform: translateX(15px) rotate(1deg); } 60% { transform: translateX(-15px); } 80% { transform: translateX(15px); } }
        .clash-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 50; }
        .flash-active { animation: flashAni 0.5s ease-out; }

        #view-defense, #view-history, #view-leaderboard, #view-battle { display: none; }
        .back-btn { position: fixed; top: 5px; left: 20px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 200, 49, 0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ffc831; text-decoration: none; font-size: 1.2rem; z-index: 1001; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .reward-highlight { background: rgba(0, 255, 136, 0.1); padding: 20px; border-radius: 15px; border: 1px solid #00ff88; margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.2rem;">⚔️ Battle ARENA!!</div>
        <div id="navbar-coins" style="color: #ffc831; font-weight: bold;">🪙 0</div>
    </nav>

    <div class="container">
        <div class="season-timer">⏳ จบซีซั่นใน: <span id="season-countdown">-- วัน --:--:--</span></div>

        <div class="rank-status" onclick="toggleModal('rankModal', true)">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div style="flex: 1;">
                <div style="display:flex; justify-content:space-between; font-size: 0.9rem; font-weight: bold;">
                    <span id="rank-name">BRONZE 3</span>
                    <span>🏆 <span id="trophy-count">0</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button id="tab-lobby" class="tab active" onclick="showView('lobby')">🏟️ ท้าดวล</button>
            <button id="tab-defense" class="tab" onclick="showView('defense')">🛡️ ป้องกัน</button>
            <button id="tab-leaderboard" class="tab" onclick="showView('leaderboard')">🏆 อันดับ</button>
            <button id="tab-history" class="tab" onclick="showView('history')">📜 ประวัติ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list" style="text-align: center; padding: 40px; color: #888;">กำลังโหลด...</div></div>
        
        <div id="view-leaderboard">
            <h3 style="color:#ffc831; text-align:center;">🏆 TOP 20 WARRIORS</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="view-defense" class="ui-card" style="text-align: center;">
            <h3 style="color:#00ff88;">🛡️ จัดทีมตั้งรับ (จำกัด USEC 1 ใบ)</h3>
            <div id="defense-slots" class="card-row" style="min-height: 120px; border: 1px dashed #444; border-radius: 10px; padding: 10px;"></div>
            <button class="btn-action" onclick="saveDefense()">💾 บันทึกทีมป้องกัน</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div id="defense-pool" class="card-row"></div>
        </div>

        <div id="view-history"><div id="history-list"></div></div>

        <div id="view-battle">
            <div class="ui-card battle-area" id="arena-box" style="border: 2px solid #ffc831;">
                <div id="flash-effect" class="clash-flash"></div>
                <div id="opp-battle-row" class="card-row"></div>
                <h1 id="vs-label" style="text-align:center; color:#ffc831; margin:40px 0; font-size: 3rem;">VS</h1>
                <div id="player-battle-row" class="card-row"></div>
                <div id="battle-status" style="text-align:center; min-height: 60px; margin-top: 20px; font-weight: bold;"></div>
                <button id="exit-battle-btn" class="btn-action" style="display:none;" onclick="showView('lobby')">กลับสู่หน้าหลัก</button>
            </div>
        </div>
    </div>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('rankModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🎖️ อันดับและรางวัลซีซั่น</h3>
            <div id="rank-details"></div>
        </div>
    </div>

    <div id="prepModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('prepModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🚩 จัดทีมบุก (เลือก 5 ใบ / USEC 1)</h3>
            <div id="prep-slots" class="card-row" style="min-height: 120px; border: 1px dashed #444; border-radius: 10px; padding: 10px;"></div>
            <button id="start-btn" class="btn-action" disabled onclick="handleStartBattle()">⚔️ เริ่มท้าดวล!</button>
            <div id="prep-pool" class="card-row" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="seasonRewardModal" class="modal">
        <div class="modal-content" style="border-color: #00ff88;">
            <h2 style="color: #00ff88; text-align: center;">🎉 สิ้นสุดการแข่งขัน!</h2>
            <div class="reward-highlight">
                <div id="final-rank-display" style="font-size: 1.5rem; margin-bottom: 10px; font-weight: bold;">--</div>
                <div style="font-size: 1.2rem; color: #ffc831;">รางวัล: <b id="final-coin-reward">🪙 0</b></div>
            </div>
            <button class="btn-action" onclick="claimSeasonReward()">รับรางวัลและเริ่มซีซั่นใหม่</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", authDomain: "sign-up-73f99.firebaseapp.com", projectId: "sign-up-73f99", storageBucket: "sign-up-73f99.appspot.com", messagingSenderId: "916335559099", appId: "1:916335559099:web:3a8ed896ba26e38991849e" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ระดับพลังและการเรียงตามลำดับที่คุณสั่ง
    const RARITY_POWER = {
        "USEC":{ base: 6500, perLv: 3500 }, // 1. สูงกว่า EXR
        "EXR": { base: 4000, perLv: 2500 }, 
        "CBR": { base: 3600, perLv: 2200 }, // 2. ล่างจาก EXR
        "SEC": { base: 3200, perLv: 2000 },
        "SUR": { base: 2600, perLv: 1800 },
        "SSR": { base: 2000, perLv: 1500 },
        "PR":  { base: 1800, perLv: 1350 }, // 3. ล่างจาก SSR
        "UR":  { base: 1500, perLv: 1200 },
        "SR":  { base: 1000, perLv: 1000 },
        "R":   { base: 600,  perLv: 800 },
        "U":   { base: 300,  perLv: 500 },
        "C":   { base: 100,  perLv: 300 }
    };
    const RARITY_ORDER = ["USEC", "EXR", "CBR", "SEC", "SUR", "SSR", "PR", "UR", "SR", "R", "U", "C"];

    const RANKS = [
        { name: "BRONZE 3", min: 0, icon: "🥉", color: "#cd7f32", reward: {coin: 1000} },
        { name: "BRONZE 2", min: 100, icon: "🥉", color: "#cd7f32", reward: {coin: 2500} },
        { name: "BRONZE 1", min: 300, icon: "🥉", color: "#cd7f32", reward: {coin: 5000} },
        { name: "SILVER 3", min: 600, icon: "🥈", color: "#c0c0c0", reward: {coin: 10000} },
        { name: "SILVER 2", min: 1000, icon: "🥈", color: "#c0c0c0", reward: {coin: 15000} },
        { name: "SILVER 1", min: 1400, icon: "🥈", color: "#c0c0c0", reward: {coin: 20000} },
        { name: "GOLD 3", min: 1800, icon: "🥇", color: "#ffd700", reward: {coin: 35000} },
        { name: "GOLD 2", min: 2200, icon: "🥇", color: "#ffd700", reward: {coin: 50000} },
        { name: "GOLD 1", min: 2600, icon: "🥇", color: "#ffd700", reward: {coin: 75000} },
        { name: "DIAMOND 4", min: 3100, icon: "💎", color: "#00eeee", reward: {coin: 100000} },
        { name: "DIAMOND 3", min: 3700, icon: "💎", color: "#00eeee", reward: {coin: 130000} },
        { name: "DIAMOND 2", min: 4400, icon: "💎", color: "#00eeee", reward: {coin: 170000} },
        { name: "DIAMOND 1", min: 5200, icon: "💎", color: "#00eeee", reward: {coin: 210000} },
        { name: "MASTER 4", min: 6100, icon: "⚔️", color: "#ff4500", reward: {coin: 300000} },
        { name: "MASTER 3", min: 7200, icon: "⚔️", color: "#ff4500", reward: {coin: 450000} },
        { name: "MASTER 2", min: 8500, icon: "⚔️", color: "#ff4500", reward: {coin: 650000} },
        { name: "MASTER 1", min: 10000, icon: "🔥", color: "#ff0000", reward: {coin: 1000000} },
        { name: "Supre MASTER ", min: 12000, icon: "👑", color: "rainbow", reward: {coin: 2500000} },
        { name: "Supre MASTER PRO!!", min: 15000, icon: "👑", color: "rainbow", reward: {coin: 50000000} }
    ];

    const ELEMENTS = { "Fire": { icon: "🔥", beats: "Wind", color: "#ff4d4d" }, "Wind": { icon: "🌪️", beats: "Earth", color: "#4dff88" }, "Earth": { icon: "⛰️", beats: "Water", color: "#ffb347" }, "Water": { icon: "💧", beats: "Fire", color: "#4da6ff" } };
    
    let userDoc = null, tempAtk = [], tempDef = [], targetOpp = null;
    const SEASON_LIMIT = 20 * 24 * 60 * 60 * 1000;

    const getPower = (c) => {
        if(!c) return 0;
        const config = RARITY_POWER[c.rarity] || RARITY_POWER["C"];
        const basePower = config.base + (Number(c.level || 1) * config.perLv);
        const starBonus = 1 + (Number(c.stars || 0) * 0.1); 
        return Math.floor(basePower * starBonus);
    };

    const getRankInfo = (trophies) => {
        let rank = RANKS[0];
        for (let i = RANKS.length - 1; i >= 0; i--) { if (trophies >= RANKS[i].min) { rank = RANKS[i]; break; } }
        return rank;
    };
    
    const cardHTML = (c, selected = false) => {
        if(!c) return `<div class="mini-card" style="border: 1px dashed #333; background: transparent;"></div>`;
        let rClass = "";
        if(c.rarity === "USEC") rClass = "rarity-usec";
        else if(c.rarity === "EXR") rClass = "rarity-exr";
        else if(c.rarity === "CBR") rClass = "rarity-cbr";
        else if(c.rarity === "PR") rClass = "rarity-pr";

        const elemInfo = ELEMENTS[c.element] || ELEMENTS["Fire"];
        return `
        <div class="mini-card ${rClass} ${selected?'selected-glow':''}">
            <div class="elem-icon" style="color:${elemInfo.color}">${elemInfo.icon}</div>
            <img src="${c.img || c.image || ''}">
            <div class="lv-badge">Lv.${c.level || 1}</div>
            <div style="position: absolute; top: 15px; width: 100%; text-align: center; font-size: 0.5rem; z-index: 2; text-shadow: 0 0 2px black;">${"⭐".repeat(c.stars || 0)}</div>
            <div style="position:absolute; top:2px; right:35px; font-size:0.5rem; color:#ffc831; font-weight:bold; z-index:2;">${c.rarity}</div>
            <div class="stat-overlay">⚡ ${getPower(c).toLocaleString()}</div>
        </div>`;
    };

    onAuthStateChanged(auth, user => {
        if(!user) return;
        onSnapshot(doc(db, "users", user.uid), snap => {
            userDoc = snap.data();
            if(userDoc) {
                document.getElementById("navbar-coins").innerText = `🪙 ${Number(userDoc.points || 0).toLocaleString()}`;
                if(tempDef.length === 0 && userDoc.defenseTeam) tempDef = [...userDoc.defenseTeam];
                updateUI();
                checkSeasonStatus();
            }
        });
        startSeasonTimer();
        setTimeout(() => showView('lobby'), 500);
    });

    async function checkSeasonStatus() {
        if (!userDoc.seasonStartTime) { await updateDoc(doc(db, "users", auth.currentUser.uid), { seasonStartTime: Date.now() }); return; }
        if (Date.now() - userDoc.seasonStartTime >= SEASON_LIMIT) {
            const currentRank = getRankInfo(userDoc.trophies || 0);
            document.getElementById("final-rank-display").innerText = `${currentRank.icon} ${currentRank.name}`;
            document.getElementById("final-coin-reward").innerText = `🪙 ${currentRank.reward.coin.toLocaleString()}`;
            toggleModal("seasonRewardModal", true);
        }
    }

    window.claimSeasonReward = async function() {
        const currentRank = getRankInfo(userDoc.trophies || 0);
        await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(currentRank.reward.coin), trophies: 0, seasonStartTime: Date.now() });
        toggleModal("seasonRewardModal", false);
        alert("รับรางวัลสำเร็จ!");
    }

    function updateUI() {
        if(!userDoc) return;
        document.getElementById("trophy-count").innerText = (userDoc.trophies || 0).toLocaleString();
        const cur = getRankInfo(userDoc.trophies || 0);
        const rName = document.getElementById("rank-name");
        document.getElementById("rank-icon").innerText = cur.icon;
        rName.innerText = cur.name;
        rName.className = cur.color === "rainbow" ? "rank-rainbow" : "";
        rName.style.color = cur.color === "rainbow" ? "" : cur.color;
        const nextRank = RANKS[RANKS.indexOf(cur)+1];
        document.getElementById("rank-progress").style.width = nextRank ? Math.min(((userDoc.trophies - cur.min) / (nextRank.min - cur.min)) * 100, 100) + "%" : "100%";
    }

    function startSeasonTimer() {
        setInterval(() => {
            if (!userDoc?.seasonStartTime) return;
            const diff = (userDoc.seasonStartTime + SEASON_LIMIT) - Date.now();
            const el = document.getElementById("season-countdown");
            if (diff <= 0) { el.innerText = "จบซีซั่น!"; return; }
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0'), m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0'), s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            el.innerText = `${d} วัน ${h}:${m}:${s}`;
        }, 1000);
    }

    // ระบบ Sorting และการเลือกการ์ด (ดึงมาจากตรรกะที่คุณสั่ง)
    function renderPools(mode) {
        const poolEl = document.getElementById(mode === 'prep' ? "prep-pool" : "defense-pool");
        const slotEl = document.getElementById(mode === 'prep' ? "prep-slots" : "defense-slots");
        if(!poolEl || !slotEl) return;
        const currentTeam = mode === 'prep' ? tempAtk : tempDef;
        slotEl.innerHTML = "";
        for(let i=0; i<5; i++) slotEl.innerHTML += cardHTML(currentTeam[i]);

        poolEl.innerHTML = "";
        // เรียงตาม Rarity Order ที่ตั้งไว้ และตามด้วย Level
        const sorted = [...(userDoc.collection || [])].sort((a,b) => {
            const oa = RARITY_ORDER.indexOf(a.rarity), ob = RARITY_ORDER.indexOf(b.rarity);
            if(oa !== ob) return oa - ob;
            return b.level - a.level;
        });

        sorted.forEach(c => {
            const isSel = currentTeam.some(t => t.name === c.name);
            const div = document.createElement("div"); div.innerHTML = cardHTML(c, isSel);
            div.onclick = () => {
                const idx = currentTeam.findIndex(t => t.name === c.name);
                if(idx > -1) currentTeam.splice(idx, 1);
                else if(currentTeam.length < 5) {
                    if(c.rarity === "USEC" && currentTeam.some(t => t.rarity === "USEC")) return alert("ใส่ USEC ได้แค่ใบเดียว!");
                    currentTeam.push(c);
                }
                renderPools(mode);
                if(mode === 'prep') document.getElementById("start-btn").disabled = tempAtk.length < 5;
            };
            poolEl.appendChild(div);
        });
    }

    // ระบบ Lobby และการต่อสู้ (คงเดิม 100%)
    async function loadLobby() {
        const list = document.getElementById("lobby-list");
        list.innerHTML = "🔍 กำลังหาคู่ต่อสู้...";
        const snap = await getDocs(query(collection(db, "users"), limit(10)));
        let players = [];
        snap.forEach(d => { if(d.id !== auth.currentUser.uid && d.data().defenseTeam?.length === 5) players.push({id: d.id, ...d.data()}); });
        list.innerHTML = "";
        players.forEach(u => {
            const pwr = u.defenseTeam.reduce((s, c) => s + getPower(c), 0);
            const div = document.createElement("div"); div.className = "ui-card";
            div.innerHTML = `<div><b>🏆 ${u.trophies} - ${u.username}</b></div><div class="card-row" style="transform:scale(0.8); origin:left;">${u.defenseTeam.map(c => cardHTML(c)).join('')}</div><button class="btn-action" onclick="openPrep('${u.id}')">ท้าชิง (DEF: ${pwr})</button>`;
            list.appendChild(div);
        });
    }

    window.openPrep = async (id) => { const s = await getDoc(doc(db, "users", id)); targetOpp = {id, ...s.data()}; tempAtk = []; toggleModal('prepModal', true); renderPools('prep'); };
    window.showView = (v) => { 
        ["lobby", "defense", "leaderboard", "history", "battle"].forEach(id => {
            const el = document.getElementById(`view-${id}`); if(el) el.style.display = (id === v) ? 'block' : 'none';
            const tab = document.getElementById(`tab-${id}`); if(tab) tab.classList.toggle('active', id === v);
        });
        if(v === 'lobby') loadLobby(); if(v === 'defense') renderPools('defense'); if(v === 'leaderboard') loadLeaderboard(); if(v === 'history') loadHistory();
    };

    window.handleStartBattle = async () => {
        toggleModal('prepModal', false); showView('battle');
        const log = document.getElementById("battle-status");
        document.getElementById("opp-battle-row").innerHTML = targetOpp.defenseTeam.map(c => cardHTML(c)).join('');
        document.getElementById("player-battle-row").innerHTML = tempAtk.map(c => cardHTML(c)).join('');
        log.innerHTML = "⚔️ ประจันหน้า...";
        setTimeout(async () => {
            let pTotal = 0, oTotal = 0;
            for(let i=0; i<5; i++) {
                let p = getPower(tempAtk[i]), o = getPower(targetOpp.defenseTeam[i]);
                if(ELEMENTS[tempAtk[i].element].beats === targetOpp.defenseTeam[i].element) p *= 1.25;
                else if(ELEMENTS[targetOpp.defenseTeam[i].element].beats === tempAtk[i].element) o *= 1.25;
                pTotal += p; oTotal += o;
            }
            const win = pTotal >= oTotal;
            const trophyChange = win ? 30 : -15;
            log.innerHTML = win ? `<h2 style="color:#00ff88">VICTORY!</h2>` : `<h2 style="color:#ff4d4d">DEFEAT</h2>`;
            document.getElementById("exit-battle-btn").style.display = "block";
            await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: Math.max(0, (userDoc.trophies || 0) + trophyChange), points: increment(win ? 250 : 50) });
            await addDoc(collection(db, "users", auth.currentUser.uid, "logs"), { type: "attack", oppName: targetOpp.username, win, trophyChange, time: serverTimestamp() });
        }, 2000);
    };

    window.saveDefense = async () => { if(tempDef.length < 5) return alert("เลือกให้ครบ!"); await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: tempDef }); alert("บันทึกทีมแล้ว!"); };
    window.toggleModal = (id, show) => {
        document.getElementById(id).style.display = show ? "block" : "none";
        if(id === 'rankModal' && show) {
            document.getElementById("rank-details").innerHTML = [...RANKS].reverse().map(r => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; color:${r.color==='rainbow'?'#ffc831':r.color}"><b>${r.icon} ${r.name}</b> <span>${r.reward.coin.toLocaleString()} 🪙</span></div>`).join('');
        }
    };
    async function loadLeaderboard() { /* โค้ดดึงอันดับเดิม */ }
    async function loadHistory() { /* โค้ดดึงประวัติเดิม */ }
</script>
</body>
</html>
