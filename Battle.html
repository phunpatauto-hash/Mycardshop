<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Rank System (Dynamic Trophies)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
            overflow-x: hidden;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .rank-status { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .rank-status:hover { background: rgba(255,255,255,0.1); border-color: #ffc831; }
        .rank-icon { font-size: 2.5rem; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .season-timer { text-align: center; font-size: 0.8rem; color: #aaa; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 20px; border: 1px solid #333; }

        @keyframes rainbowText {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            20% { color: #ff8000; text-shadow: 0 0 10px #ff8000; }
            40% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            60% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            80% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #8000ff; text-shadow: 0 0 10px #8000ff; }
        }
        .rank-rainbow {
            animation: rainbowText 3s linear infinite;
            font-weight: bold !important;
        }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #1a1a2e; margin: 5% auto; padding: 25px; border: 2px solid #ffc831; width: 90%; max-width: 600px; border-radius: 20px; position: relative; box-shadow: 0 0 30px rgba(255, 200, 49, 0.2); }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.8rem; cursor: pointer; color: #ffc831; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { flex: 1; min-width: 90px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; text-align: center; font-size: 0.9rem; transition: 0.2s; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; box-shadow: 0 4px 15px rgba(255, 200, 49, 0.3); }

        .card-row { display: flex; gap: 8px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 75px; aspect-ratio: 2/3; background: #222; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .rarity-exr { border: 2px solid #ff00ff !important; box-shadow: 0 0 10px #ff00ff; }
        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; padding: 2px; font-size: 0.6rem; text-align: center; color: #ffc831; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.55rem; padding: 1px 4px; border-radius: 4px; font-weight: bold; z-index: 2; }
        .selected-glow { border: 2.5px solid #ffc831 !important; transform: scale(1.05); z-index: 5; box-shadow: 0 0 20px #ffc831; }

        .ui-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s; }
        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; font-size: 1rem; }
        .btn-action:active { transform: scale(0.98); }
        .btn-action:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }

        .bot-tag { background: #ff4d4d; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 5px; }

        .battle-area { position: relative; overflow: hidden; min-height: 450px; display: flex; flex-direction: column; justify-content: center; }
        .ready-up { animation: readyAni 0.6s ease-in-out infinite alternate; }
        @keyframes readyAni {
            from { transform: translateY(0) scale(1); filter: brightness(1); }
            to { transform: translateY(5px) scale(1.02); filter: brightness(1.3); }
        }
        .strike-player { animation: strikeP 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        .strike-opp { animation: strikeO 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        @keyframes strikeP {
            0% { transform: translateY(0); }
            50% { transform: translateY(-120px) scale(1.2); z-index: 10; }
            100% { transform: translateY(0); }
        }
        @keyframes strikeO {
            0% { transform: translateY(0); }
            50% { transform: translateY(120px) scale(1.2); z-index: 10; }
            100% { transform: translateY(0); }
        }
        .arena-shake { animation: shakeEffect 0.4s ease-in-out; }
        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px) rotate(-1deg); }
            40% { transform: translateX(15px) rotate(1deg); }
            60% { transform: translateX(-15px); }
            80% { transform: translateX(15px); }
        }
        .clash-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 50; }
        .flash-active { animation: flashAni 0.5s ease-out; }
        @keyframes flashAni { 0% { opacity: 0; } 10% { opacity: 0.8; } 100% { opacity: 0; } }

        #view-defense, #view-history, #view-leaderboard, #view-battle { display: none; }

        /* --- สไตล์ปุ่มย้อนกลับที่เพิ่มเข้ามา --- */
    .back-btn {
        position: fixed;
        top: 5px;
        left: 20px;
        width: 45px;
        height: 45px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 200, 49, 0.5);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #ffc831;
        text-decoration: none;
        font-size: 1.2rem;
        z-index: 1001; /* ให้อยู่เหนือ Navbar */
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .back-btn:hover {
        background: #ffc831;
        color: #000;
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(255, 200, 49, 0.4);
    }

    /* ปรับ Navbar เล็กน้อยเพื่อให้ไม่เบียดกับปุ่มย้อนกลับ (ถ้าจำเป็น) */
    .navbar { padding-left: 90px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn" title="กลับหน้าหลัก">
        <i class="fas fa-arrow-left"></i>
    </a>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.2rem;">⚔️ Battle ARENA!!</div>
        <div style="display: flex; gap: 15px;">
            <div id="navbar-coins" style="color: #ffc831; font-weight: bold;">🪙 0</div>
        </div>
    </nav>

    <div class="container">
        <div class="season-timer">⏳ จบซีซั่นใน: <span id="season-countdown">-- วัน --:--:--</span></div>

        <div class="rank-status" onclick="toggleModal('rankModal', true)">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div style="flex: 1;">
                <div style="display:flex; justify-content:space-between; font-size: 0.9rem; font-weight: bold;">
                    <span id="rank-name">BRONZE 3</span>
                    <span>🏆 <span id="trophy-count">0</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button id="tab-lobby" class="tab active" onclick="showView('lobby')">🏟️ ท้าดวล</button>
            <button id="tab-defense" class="tab" onclick="showView('defense')">🛡️ ป้องกัน</button>
            <button id="tab-leaderboard" class="tab" onclick="showView('leaderboard')">🏆 อันดับ</button>
            <button id="tab-history" class="tab" onclick="showView('history')">📜 ประวัติ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list" style="text-align: center; padding: 40px; color: #888;">กำลังโหลด...</div></div>
        
        <div id="view-leaderboard">
            <h3 style="color:#ffc831; text-align:center;">🏆 TOP 20 WARRIORS</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="view-defense" class="ui-card" style="text-align: center;">
            <h3 style="color:#00ff88;">🛡️ จัดทีมตั้งรับ (Defense Team)</h3>
            <p style="font-size: 0.8rem; color: #aaa;">ทีมนี้จะใช้ป้องกันเมื่อมีคนอื่นมาท้าดวลคุณ</p>
            <div id="defense-slots" class="card-row" style="min-height: 120px; border: 1px dashed #444; border-radius: 10px; padding: 10px;"></div>
            <button class="btn-action" onclick="saveDefense()">💾 บันทึกทีมป้องกัน</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div id="defense-pool" class="card-row"></div>
        </div>

        <div id="view-history"><div id="history-list"></div></div>

        <div id="view-battle">
            <div class="ui-card battle-area" id="arena-box" style="border: 2px solid #ffc831; background: url('https://www.transparenttextures.com/patterns/dark-matter.png');">
                <div id="flash-effect" class="clash-flash"></div>
                <div id="opp-battle-row" class="card-row"></div>
                <h1 id="vs-label" style="text-align:center; color:#ffc831; margin:40px 0; transition: 0.3s; font-style: italic; font-size: 3rem; text-shadow: 0 0 15px rgba(255,200,49,0.5);">VS</h1>
                <div id="player-battle-row" class="card-row"></div>
                <div id="battle-status" style="text-align:center; min-height: 60px; margin-top: 20px; font-weight: bold;"></div>
                <button id="exit-battle-btn" class="btn-action" style="display:none;" onclick="showView('lobby')">กลับสู่หน้าหลัก</button>
            </div>
        </div>
    </div>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('rankModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🎖️ อันดับและรางวัลซีซั่น</h3>
            <div id="rank-details"></div>
        </div>
    </div>

    <div id="prepModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('prepModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🚩 จัดทีมบุก (เลือก 5 ใบ)</h3>
            <div id="prep-slots" class="card-row" style="min-height: 120px; border: 1px dashed #444; border-radius: 10px; padding: 10px;"></div>
            <button id="start-btn" class="btn-action" disabled onclick="handleStartBattle()">⚔️ เริ่มการท้าดวล!</button>
            <div id="prep-pool" class="card-row" style="margin-top:20px;"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE 3", min: 0, icon: "🥉", color: "#cd7f32", reward: {coin: 1000} },
        { name: "BRONZE 2", min: 100, icon: "🥉", color: "#cd7f32", reward: {coin: 2500} },
        { name: "BRONZE 1", min: 300, icon: "🥉", color: "#cd7f32", reward: {coin: 5000} },
        { name: "SILVER 3", min: 600, icon: "🥈", color: "#c0c0c0", reward: {coin: 10000} },
        { name: "SILVER 2", min: 1000, icon: "🥈", color: "#c0c0c0", reward: {coin: 15000} },
        { name: "SILVER 1", min: 1400, icon: "🥈", color: "#c0c0c0", reward: {coin: 20000} },
        { name: "GOLD 3", min: 1800, icon: "🥇", color: "#ffd700", reward: {coin: 35000} },
        { name: "GOLD 2", min: 2200, icon: "🥇", color: "#ffd700", reward: {coin: 50000} },
        { name: "GOLD 1", min: 2600, icon: "🥇", color: "#ffd700", reward: {coin: 75000} },
        { name: "MASTER 4", min: 3100, icon: "⚔️", color: "#ff4500", reward: {coin: 120000} },
        { name: "MASTER 3", min: 3600, icon: "⚔️", color: "#ff4500", reward: {coin: 180000} },
        { name: "MASTER 2", min: 4200, icon: "⚔️", color: "#ff4500", reward: {coin: 250000} },
        { name: "MASTER 1", min: 5000, icon: "🔥", color: "#ff0000", reward: {coin: 400000} },
        { name: "Supre MASTER 4", min: 6000, icon: "💎", color: "rainbow", reward: {coin: 1000000} },
        { name: "Supre MASTER 3", min: 7500, icon: "💎", color: "rainbow", reward: {coin: 2500000} },
        { name: "Supre MASTER 2", min: 9000, icon: "💎", color: "rainbow", reward: {coin: 5000000} },
        { name: "Supre MASTER 1", min: 12000, icon: "👑", color: "rainbow", reward: {coin: 10000000} },
        { name: "Supre MASTER PRO!!", min: 15000, icon: "👑", color: "rainbow", reward: {coin: 20000000} }
    ];

    let userDoc = null, tempAtk = [], tempDef = [], targetOpp = null;

    const getPower = (c) => {
        if(!c) return 0;
        let base = (Number(c.level || 1) * 50) + 200;
        if(c.rarity === "EXR") base += 800;
        if(c.rarity === "SSR") base += 500;
        return base;
    };

    const getRankInfo = (trophies) => {
        let rank = RANKS[0];
        for (let i = RANKS.length - 1; i >= 0; i--) {
            if (trophies >= RANKS[i].min) {
                rank = RANKS[i];
                break;
            }
        }
        return rank;
    };
    
    const cardHTML = (c, selected = false) => {
        if(!c) return `<div class="mini-card" style="border: 1px dashed #333; background: transparent;"></div>`;
        const imgUrl = c.img || c.image || 'https://via.placeholder.com/150';
        return `
        <div class="mini-card ${c.rarity==='EXR'?'rarity-exr':''} ${selected?'selected-glow':''}">
            <img src="${imgUrl}" onerror="this.src='https://picsum.photos/seed/error/150/225'">
            <div class="lv-badge">Lv.${c.level || 1}</div>
            <div class="stat-overlay">⚡ ${getPower(c).toLocaleString()}</div>
        </div>`;
    };

    onAuthStateChanged(auth, user => {
        if(!user) return;
        onSnapshot(doc(db, "users", user.uid), snap => {
            userDoc = snap.data();
            if(userDoc) {
                document.getElementById("navbar-coins").innerText = `🪙 ${Number(userDoc.points || 0).toLocaleString()}`;
                if(!userDoc.collection) userDoc.collection = [];
                if (tempDef.length === 0 && userDoc.defenseTeam) {
                    tempDef = [...userDoc.defenseTeam];
                }
                updateUI();
            }
        });
        startSeasonTimer();
        setTimeout(() => showView('lobby'), 500);
    });

    function updateUI() {
        if(!userDoc) return;
        document.getElementById("trophy-count").innerText = (userDoc.trophies || 0).toLocaleString();
        const cur = getRankInfo(userDoc.trophies || 0);
        document.getElementById("rank-icon").innerText = cur.icon;
        const rName = document.getElementById("rank-name");
        rName.innerText = cur.name;
        
        if(cur.color === "rainbow") {
            rName.className = "rank-rainbow";
            rName.style.color = ""; 
        } else {
            rName.className = "";
            rName.style.color = cur.color;
        }
        
        const nextRank = RANKS[RANKS.indexOf(cur)+1];
        const progEl = document.getElementById("rank-progress");
        if(nextRank) {
            const prog = ((userDoc.trophies - cur.min) / (nextRank.min - cur.min)) * 100;
            progEl.style.width = Math.min(prog, 100) + "%";
        } else {
            progEl.style.width = "100%";
        }
    }

    function startSeasonTimer() {
        setInterval(() => {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const nextMonth = new Date(year, month + 1, 1);
            let diff = nextMonth - now;
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById("season-countdown").innerText = `${d} วัน ${h}:${m}:${s}`;
        }, 1000);
    }

    async function generateBot() {
        const botNames = ["Shadow_King", "Zero_Bot", "Arena_Master", "Ghost_Rider", "Cyber_Slayer"];
        const botTrophies = Math.max(0, (userDoc?.trophies || 0) + (Math.floor(Math.random() * 500) - 250));
        const botTeam = [];
        
        // --- ส่วนที่ปรับปรุง: ดึงรายการรูปภาพจากการ์ดที่เรามี ---
        const myCollection = userDoc?.collection || [];
        const fallbackImg = "https://picsum.photos/seed/bot/150/225"; // รูปสำรองกรณีไม่มีการ์ดในคอลเลกชัน

        // คำนวณเลเวลบอทตามเงื่อนไขเดิม
        let botLevel;
        if (botTrophies >= 12000) { 
            botLevel = 40; 
        } else {
            botLevel = Math.max(1, Math.floor(botTrophies / 300) + 5); 
        }

        for(let i=0; i<5; i++) {
            // สุ่มเลือกการ์ดหนึ่งใบจากคอลเลกชันของเราเพื่อเอารูปมาใช้
            const randomCard = myCollection.length > 0 
                ? myCollection[Math.floor(Math.random() * myCollection.length)] 
                : null;

            botTeam.push({ 
                name: "BotCard" + i, 
                level: botLevel, 
                rarity: Math.random() > 0.7 ? "SSR" : "SR", 
                // ใช้รูปจากการ์ดที่สุ่มได้ ถ้าไม่มีให้ใช้รูปสำรอง
                img: randomCard ? (randomCard.img || randomCard.image) : `https://picsum.photos/seed/bot${i}/150/225` 
            });
        }
        return { 
            id: "bot_" + Math.random().toString(36).substr(2, 9), 
            username: botNames[Math.floor(Math.random() * botNames.length)], 
            trophies: botTrophies, 
            defenseTeam: botTeam, 
            isBot: true 
        };
    }

    window.showView = function(v) {
        ["lobby", "defense", "history", "leaderboard", "battle"].forEach(id => {
            const el = document.getElementById(`view-${id}`);
            if(el) el.style.display = (id === v) ? 'block' : 'none';
            const tab = document.getElementById(`tab-${id}`);
            if(tab) tab.classList.toggle('active', id === v);
        });
        if(v === 'lobby') loadLobby();
        if(v === 'leaderboard') loadLeaderboard();
        if(v === 'history') loadHistory();
        if(v === 'defense') renderPools(); 
    };

    async function loadLobby() {
        const list = document.getElementById("lobby-list");
        if(!list) return;
        list.innerHTML = "<div style='padding:20px;'>🔍 กำลังค้นหาคู่ต่อสู้...</div>";
        try {
            const snap = await getDocs(query(collection(db, "users"), limit(10)));
            let players = [];
            snap.forEach(d => {
                if(auth.currentUser && d.id !== auth.currentUser.uid) {
                    const data = d.data();
                    if(data.defenseTeam && data.defenseTeam.length === 5) players.push({id: d.id, ...data});
                }
            });
            while(players.length < 5) { players.push(await generateBot()); }
            list.innerHTML = "";
            players.sort((a,b) => (b.trophies || 0) - (a.trophies || 0));
            players.forEach(u => {
                const pwr = u.defenseTeam.reduce((s, c) => s + getPower(c), 0);
                const rInfo = getRankInfo(u.trophies || 0);
                const div = document.createElement("div");
                div.className = "ui-card";
                const rankDisplay = rInfo.color === 'rainbow' 
                    ? `<span class="rank-rainbow">${rInfo.icon} ${u.username}</span>` 
                    : `<b style="color:${rInfo.color}">${rInfo.icon} ${u.username}</b>`;

                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <span>${rankDisplay} ${u.isBot ? '<span class="bot-tag">BOT</span>' : ''}</span>
                        <span style="color:#aaa; font-size:0.8rem;">🏆 ${u.trophies || 0}</span>
                    </div>
                    <div class="card-row" style="justify-content:flex-start; transform: scale(0.85); transform-origin: left center;">
                        ${u.defenseTeam.map(c => cardHTML(c)).join('')}
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <span style="color:#ffc831; font-weight:bold;">DEF: ${pwr.toLocaleString()}</span>
                        <button class="btn-action" style="width:120px; margin:0;" onclick="openPrep('${u.id}', ${u.isBot})">ท้าชิง ⚔️</button>
                    </div>`;
                list.appendChild(div);
                if(u.isBot) window["bot_data_"+u.id] = u;
            });
        } catch (err) { list.innerHTML = "Error: " + err.message; }
    }

    window.openPrep = async function(id, isBot) {
        if(isBot) targetOpp = window["bot_data_"+id];
        else {
            const snap = await getDoc(doc(db, "users", id));
            targetOpp = {id, ...snap.data()};
        }
        tempAtk = []; 
        toggleModal('prepModal', true);
        renderPrep();
    };

    window.handleStartBattle = async function() {
        toggleModal('prepModal', false);
        showView('battle');
        const log = document.getElementById("battle-status");
        const exit = document.getElementById("exit-battle-btn");
        const pRow = document.getElementById("player-battle-row");
        const oRow = document.getElementById("opp-battle-row");
        const arena = document.getElementById("arena-box");
        const flash = document.getElementById("flash-effect");
        const vsLabel = document.getElementById("vs-label");

        exit.style.display = "none";
        log.innerHTML = "<span style='color:#aaa'>⚔️ เตรียมตัวเข้าสู่สนามประลอง...</span>";
        vsLabel.style.transform = "scale(1)";
        oRow.innerHTML = targetOpp.defenseTeam.map(c => cardHTML(c)).join('');
        pRow.innerHTML = tempAtk.map(c => cardHTML(c)).join('');

        setTimeout(() => {
            log.innerHTML = "<span style='color:#ffc831'>🔥 รวบรวมพลัง!</span>";
            pRow.classList.add('ready-up'); oRow.classList.add('ready-up');
        }, 800);

        setTimeout(() => {
            log.innerHTML = "<span style='color:#ff4d4d; font-size:1.5rem;'>EX-BURST ATTACK!!</span>";
            pRow.classList.remove('ready-up'); oRow.classList.remove('ready-up');
            pRow.classList.add('strike-player'); oRow.classList.add('strike-opp');
            vsLabel.style.transform = "scale(1.5)"; vsLabel.style.color = "white";
        }, 2000);

        setTimeout(() => {
            arena.classList.add('arena-shake'); flash.classList.add('flash-active');
        }, 2150);

        setTimeout(async () => {
            const pPwr = tempAtk.reduce((s, c) => s + getPower(c), 0);
            const ePwr = targetOpp.defenseTeam.reduce((s, c) => s + getPower(c), 0);
            const win = pPwr >= ePwr;

            // --- ส่วนที่แก้ไข: ระบบคำนวณถ้วยรางวัลตามเงื่อนไขที่คุณต้องการ ---
            let trophyGain = 30; // ค่าเริ่มต้นเผื่อหลุดช่วง
            const currentRank = getRankInfo(userDoc.trophies || 0).name;

            if (currentRank.includes("BRONZE") || currentRank === "SILVER 3" || currentRank === "SILVER 2") {
                trophyGain = 50;
            } else if (currentRank === "SILVER 1" || currentRank.includes("GOLD")) {
                trophyGain = 120;
            } else if (currentRank.includes("MASTER")) {
                trophyGain = 290;
            }

            const trophyChange = win ? trophyGain : -Math.floor(trophyGain / 2);
            const coinPrize = win ? 250 : 50;

            log.innerHTML = win ? `
                <div style='animation: readyAni 0.3s infinite alternate'>
                    <h2 style='color:#00ff88; margin:0; text-shadow: 0 0 15px #00ff88'>VICTORY !!</h2>
                    <p style="color: #ffc831; margin:5px 0;">+${trophyChange} 🏆 | 🪙 ${coinPrize}</p>
                </div>` : `
                <div>
                    <h2 style='color:#ff4d4d; margin:0; text-shadow: 0 0 15px #ff4d4d'>DEFEAT</h2>
                    <p style="color: #aaa; margin:5px 0;">${trophyChange} 🏆</p>
                </div>`;
            
            exit.style.display = "block";
            pRow.classList.remove('strike-player'); oRow.classList.remove('strike-opp');
            arena.classList.remove('arena-shake'); flash.classList.remove('flash-active');

            await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                trophies: Math.max(0, (userDoc.trophies || 0) + trophyChange), 
                points: increment(coinPrize)
            });
            
            await addDoc(collection(db, "users", auth.currentUser.uid, "logs"), { 
                type: "attack", 
                oppName: targetOpp.username + (targetOpp.isBot ? " (Bot)" : ""), 
                win, 
                trophyChange: trophyChange, 
                time: serverTimestamp() 
            });

            if(!targetOpp.isBot) {
                const oppChange = win ? -15 : 20;
                await updateDoc(doc(db, "users", targetOpp.id), { 
                    trophies: Math.max(0, (targetOpp.trophies||0) + oppChange) 
                });
            }
        }, 2800);
    };

    function renderPrep() {
        if (!userDoc) return;
        const slots = document.getElementById("prep-slots");
        const pool = document.getElementById("prep-pool");
        slots.innerHTML = ""; pool.innerHTML = "";
        for(let i=0; i<5; i++) { 
            slots.innerHTML += tempAtk[i] ? cardHTML(tempAtk[i]) : `<div class="mini-card" style="border:1px dashed #444; background:transparent;"></div>`; 
        }
        const unique = {};
        (userDoc.collection || []).forEach(c => { 
            if(!unique[c.name] || Number(c.level) > Number(unique[c.name].level)) unique[c.name] = c; 
        });
        Object.values(unique).forEach(c => {
            const isSel = tempAtk.some(t => t.name === c.name);
            const div = document.createElement("div");
            div.innerHTML = cardHTML(c, isSel);
            div.onclick = () => {
                const idx = tempAtk.findIndex(t => t.name === c.name);
                if(idx > -1) tempAtk.splice(idx, 1);
                else if(tempAtk.length < 5) tempAtk.push(c);
                renderPrep();
            };
            pool.appendChild(div);
        });
        document.getElementById("start-btn").disabled = tempAtk.length < 5;
    }

    window.saveDefense = async function() {
        if(tempDef.length < 5) return alert("กรุณาเลือกการ์ดป้องกันให้ครบ 5 ใบ!");
        try {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: tempDef });
            alert("✅ บันทึกทีมป้องกันเรียบร้อย!");
        } catch (err) { alert("❌ เกิดข้อผิดพลาดในการบันทึก"); }
    };

    function renderPools() {
        if (!userDoc) return;
        const dSlots = document.getElementById("defense-slots");
        const dPool = document.getElementById("defense-pool");
        if(!dSlots || !dPool) return;
        dSlots.innerHTML = ""; dPool.innerHTML = "";
        for(let i=0; i<5; i++) { 
            dSlots.innerHTML += tempDef[i] ? cardHTML(tempDef[i]) : `<div class="mini-card" style="border:1px dashed #444; background:transparent;"></div>`; 
        }
        const unique = {};
        (userDoc.collection || []).forEach(c => { 
            if(!unique[c.name] || Number(c.level) > Number(unique[c.name].level)) unique[c.name] = c; 
        });
        Object.values(unique).forEach(c => {
            const isSel = tempDef.some(t => t.name === c.name);
            const div = document.createElement("div");
            div.innerHTML = cardHTML(c, isSel);
            div.onclick = () => {
                const idx = tempDef.findIndex(t => t.name === c.name);
                if(idx > -1) tempDef.splice(idx, 1);
                else if(tempDef.length < 5) tempDef.push(c);
                renderPools();
            };
            dPool.appendChild(div); 
        });
    }

    async function loadLeaderboard() {
        const list = document.getElementById("leaderboard-list");
        if(!list) return;
        list.innerHTML = "<p style='text-align:center;'>กำลังโหลดอันดับ...</p>";
        try {
            const q = query(collection(db, "users"), orderBy("trophies", "desc"), limit(20));
            const snap = await getDocs(q);
            list.innerHTML = "";
            let i = 1;
            snap.forEach(d => {
                const u = d.data();
                const r = getRankInfo(u.trophies || 0);
                const rankText = r.color === "rainbow" 
                    ? `<span class="rank-rainbow">${r.icon} ${u.username || 'Unknown'}</span>`
                    : `<span>${r.icon} ${u.username || 'Unknown'}</span>`;

                list.innerHTML += `
                    <div class="ui-card" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid ${r.color === 'rainbow' ? '#ff00ff' : r.color}">
                        <span><b style="color:#aaa; margin-right:10px;">#${i++}</b> ${rankText}</span> 
                        <span style="color:#ffc831; font-weight:bold;">🏆 ${(u.trophies || 0).toLocaleString()}</span>
                    </div>`;
            });
        } catch (e) { list.innerHTML = "Error loading leaderboard"; }
    }

    async function loadHistory() {
        const list = document.getElementById("history-list");
        if(!list) return;
        try {
            const snap = await getDocs(query(collection(db, "users", auth.currentUser.uid, "logs"), orderBy("time", "desc"), limit(10)));
            list.innerHTML = snap.empty ? "<p style='text-align:center; color:#555;'>ยังไม่มีประวัติการต่อสู้</p>" : "";
            snap.forEach(d => {
                const l = d.data();
                const color = l.win ? '#00ff88' : '#ff4d4d';
                list.innerHTML += `
                    <div class="ui-card" style="border-left:5px solid ${color}; padding:10px 15px;">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${l.type==='attack'?'⚔️ บุก':'🛡️ ป้องกัน'} - ${l.win?'ชนะ':'แพ้'}</b>
                            <span style="color:${color}">${l.trophyChange >= 0 ? '+' : ''}${l.trophyChange} 🏆</span>
                        </div>
                        <div style="font-size:0.8rem; color:#aaa;">คู่ต่อสู้: ${l.oppName}</div>
                    </div>`;
            });
        } catch (e) { list.innerHTML = "Error loading history"; }
    }

    window.toggleModal = function(id, show) {
        const el = document.getElementById(id);
        if(el) el.style.display = show ? "block" : "none";
        if(id === 'rankModal' && show) {
            document.getElementById("rank-details").innerHTML = `
                <div style="background:rgba(255,200,49,0.1); padding:10px; border-radius:10px; margin-bottom:15px; font-size:0.85rem; border:1px dashed #ffc831; color:#ffc831; text-align:center;">
                    🎁 รางวัลซีซั่นจะส่งมอบอัตโนมัติเมื่อจบเดือน
                </div>
            ` + RANKS.map(r => {
                const nameStyle = r.color === "rainbow" ? `class="rank-rainbow"` : `style="color:${r.color}"`;
                let winTrophy = 50; 
                if (r.name.includes("SILVER 1") || r.name.includes("GOLD")) winTrophy = 120;
                if (r.name.includes("MASTER")) winTrophy = 290;

                return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #333;">
                    <div ${nameStyle}><b>${r.icon} ${r.name}</b><br><small style="color:#aaa;">${r.min}+ 🏆</small></div>
                    <div style="text-align:right; font-size:0.85rem;">
                        <span style="color:#00ff88;">Win: +${winTrophy} 🏆</span><br>
                        <span style="color:#ffc831;">Coin: ${r.reward.coin.toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
        }
    };

</script>
</body>
