<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Stats & Battle Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Rank Header UI */
        .rank-status { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .rank-icon { font-size: 2.5rem; }
        .progress-container { flex: 1; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s; }

        /* Layout Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { flex: 1; min-width: 80px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: bold; font-size: 0.9rem; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; }

        /* Card System with Stats */
        .card-row { display: flex; gap: 10px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 85px; aspect-ratio: 2/3; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .mini-card.hidden { background: linear-gradient(135deg, #1e1e2f 0%, #111 100%); border: 2px solid #ffc831; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; padding: 2px; font-size: 0.6rem; }
        .stat-hp { color: #00ff88; }
        .stat-atk { color: #ff4d4d; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; }

        /* Battle Logs */
        .log-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .log-win { border-left-color: #00ff88; }
        .log-loss { border-left-color: #ff4d4d; }

        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #view-battle, #view-leaderboard, #view-history { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.1rem;">⚔️ ARENA PRO v2</div>
        <div id="user-points" style="font-size: 0.9rem; color: #aaa;">🪙 0</div>
    </nav>

    <div class="container">
        <div class="rank-status">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div class="progress-container">
                <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
                    <span id="rank-name" style="font-weight:bold; color:#ffc831;">BRONZE</span>
                    <span>🏆 <span id="user-trophies-val">0</span> / <span id="next-rank-val">200</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-lobby" onclick="showView('lobby')">🏟️ ท้าดวล</button>
            <button class="tab" id="tab-defense" onclick="showView('defense')">🛡️ ป้องกัน</button>
            <button class="tab" id="tab-history" onclick="showView('history')">📜 ประวัติ</button>
            <button class="tab" id="tab-leaderboard" onclick="showView('leaderboard')">🏆 อันดับ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list" class="lobby-list"></div></div>

        <div id="view-history">
            <h4 style="color:#ffc831;">ประวัติการต่อสู้ล่าสุด</h4>
            <div id="history-list"></div>
        </div>

        <div id="view-defense" style="display: none;">
            <div id="defense-slots" class="card-row">
                <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
            </div>
            <button class="btn-action" style="width: 100%; margin-bottom: 15px;" onclick="saveDefense()">💾 บันทึกทีมป้องกัน</button>
            <h4 style="color:#ffc831;">🎴 คอลเลกชัน (เลือกการ์ดที่ดีที่สุด)</h4>
            <div id="selection-pool" class="card-row"></div>
        </div>

        <div id="view-battle" style="display: none;">
            <div style="text-align: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;">
                <div id="e-battle-cards" class="card-row"></div>
                <div style="margin: 10px 0; font-weight:bold; color:#ffc831;">VS</div>
                <div id="p-battle-cards" class="card-row"></div>
            </div>
            <h3 id="battle-log" style="text-align: center; color: #ffc831; margin-top: 20px;"></h3>
            <button id="start-fight-btn" class="btn-action" style="display: block; margin: 15px auto;">เริ่มการต่อสู้!</button>
        </div>

        <div id="view-leaderboard" style="display: none;">
            <table style="width:100%; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;">
                <thead style="background:#ffc831; color:black;"><tr><th style="padding:10px;">#</th><th>ผู้เล่น</th><th>ถ้วย</th></tr></thead>
                <tbody id="leaderboard-body" style="text-align:center;"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32" },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0" },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700" },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2" }
    ];

    let myData = null, selectedForDefense = [];

    window.showView = (v) => {
        ["view-lobby", "view-defense", "view-battle", "view-leaderboard", "view-history"].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(`view-${v}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(v !== 'battle') document.getElementById(`tab-${v}`).classList.add('active');
        if(v === 'lobby') loadLobby();
        if(v === 'leaderboard') loadLeaderboard();
        if(v === 'history') loadHistory();
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), snap => {
                myData = snap.data();
                document.getElementById("user-points").innerText = `🪙 ${myData.points || 0}`;
                updateRankUI(myData.trophies || 0);
                if(selectedForDefense.length === 0) selectedForDefense = myData.defenseTeam || [];
                renderDefenseSetup();
                renderSelectionPool();
            });
        }
    });

    function updateRankUI(trophies) {
        let currentRank = RANKS.findLast(r => trophies >= r.min) || RANKS[0];
        document.getElementById("rank-icon").innerText = currentRank.icon;
        document.getElementById("rank-name").innerText = currentRank.name;
        document.getElementById("user-trophies-val").innerText = trophies;
        document.getElementById("rank-progress").style.width = Math.min(100, (trophies / 500) * 100) + "%";
    }

    // --- ระบบจำลองค่าพลังการ์ด ---
    function getCardStats(card) {
        const lv = card.level || 1;
        return {
            hp: 200 + (lv * 50),
            atk: 50 + (lv * 15)
        };
    }

    function createCardHTML(card, isHidden = false) {
        if(isHidden) return `<div class="mini-card hidden"></div>`;
        const stats = getCardStats(card);
        return `
            <div class="mini-card">
                <img src="${card.img || card.image}">
                <div class="lv-badge">Lv.${card.level}</div>
                <div class="stat-overlay">
                    <span class="stat-hp">❤️ ${stats.hp}</span>
                    <span class="stat-atk">⚔️ ${stats.atk}</span>
                </div>
            </div>`;
    }

    function renderSelectionPool() {
        const pool = document.getElementById("selection-pool");
        pool.innerHTML = "";
        const uniqueCards = {};
        (myData.collection || []).forEach(card => {
            if (!uniqueCards[card.name] || card.level > uniqueCards[card.name].level) uniqueCards[card.name] = card;
        });
        Object.values(uniqueCards).forEach((card) => {
            const div = document.createElement("div");
            div.innerHTML = createCardHTML(card);
            div.firstChild.onclick = () => {
                if(selectedForDefense.length < 5) { selectedForDefense.push(card); renderDefenseSetup(); }
                else { selectedForDefense = []; renderDefenseSetup(); }
            };
            pool.appendChild(div);
        });
    }

    function renderDefenseSetup() {
        const slots = document.getElementById("defense-slots").children;
        for(let i=0; i<5; i++) {
            slots[i].innerHTML = selectedForDefense[i] ? createCardHTML(selectedForDefense[i]) : "";
        }
    }

    window.saveDefense = async () => {
        if(selectedForDefense.length < 5) return alert("เลือกให้ครบ 5 ใบ!");
        await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: selectedForDefense });
        alert("🛡️ ตั้งทีมสำเร็จ!");
    };

    async function loadHistory() {
        const q = query(collection(db, "users", auth.currentUser.uid, "logs"), orderBy("time", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById("history-list");
        list.innerHTML = snap.empty ? "<p>ยังไม่มีประวัติการต่อสู้</p>" : "";
        snap.forEach(d => {
            const log = d.data();
            list.innerHTML += `
                <div class="log-item ${log.win ? 'log-win' : 'log-loss'}">
                    <div>
                        <b>${log.win ? '🛡️ ป้องกันสำเร็จ' : '💀 พ่ายแพ้'}</b><br>
                        <small>คู่ต่อสู้: ${log.oppName}</small>
                    </div>
                    <div style="font-weight:bold; color:${log.win ? '#00ff88' : '#ff4d4d'}">
                        ${log.trophyChange > 0 ? '+' : ''}${log.trophyChange} 🏆
                    </div>
                </div>`;
        });
    }

    async function startPvPFlow(oppId) {
        const oppSnap = await getDoc(doc(db, "users", oppId));
        const opponent = oppSnap.data();
        showView('battle');
        const pSide = document.getElementById("p-battle-cards");
        const eSide = document.getElementById("e-battle-cards");
        pSide.innerHTML = ""; eSide.innerHTML = "";
        
        myData.defenseTeam.forEach(c => pSide.innerHTML += createCardHTML(c));
        opponent.defenseTeam.forEach((c, idx) => eSide.innerHTML += createCardHTML(c, true));

        document.getElementById("start-fight-btn").style.display = "block";
        document.getElementById("start-fight-btn").onclick = async () => {
            document.getElementById("start-fight-btn").style.display = "none";
            const log = document.getElementById("battle-log");
            
            // คำนวณพลังรวม (Stats Calculation)
            let pPower = myData.defenseTeam.reduce((s, c) => s + getCardStats(c).hp + getCardStats(c).atk, 0);
            let ePower = opponent.defenseTeam.reduce((s, c) => s + getCardStats(c).hp + getCardStats(c).atk, 0);

            for(let i=0; i<5; i++) {
                await new Promise(r => setTimeout(r, 500));
                eSide.children[i].outerHTML = createCardHTML(opponent.defenseTeam[i]);
            }

            const isWin = pPower >= ePower;
            const tChange = isWin ? 50 : -25;
            
            log.innerText = isWin ? `🎉 ชนะ! +${tChange} 🏆` : `💀 แพ้! ${tChange} 🏆`;
            
            // บันทึกถ้วยรางวัล
            await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: increment(tChange) });
            await updateDoc(doc(db, "users", oppId), { trophies: increment(isWin ? -25 : 50) });

            // บันทึกประวัติ (Logs)
            await addDoc(collection(db, "users", auth.currentUser.uid, "logs"), {
                oppName: opponent.username, win: isWin, trophyChange: tChange, time: serverTimestamp()
            });
            await addDoc(collection(db, "users", oppId, "logs"), {
                oppName: myData.username, win: !isWin, trophyChange: isWin ? -25 : 50, time: serverTimestamp()
            });

            setTimeout(() => showView('history'), 3000);
        };
    }

    async function loadLobby() {
        const snap = await getDocs(query(collection(db, "users"), limit(10)));
        const list = document.getElementById("lobby-list");
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.id === auth.currentUser.uid) return;
            const u = d.data();
            if(!u.defenseTeam) return;
            list.innerHTML += `<div class="opponent-card"><div><b>${u.username}</b><br><small>🏆 ${u.trophies}</small></div><button class="btn-action" onclick="startPvP('${d.id}')">⚔️ ท้าดวล</button></div>`;
        });
        window.startPvP = (id) => startPvPFlow(id);
    }

    async function loadLeaderboard() {
        const snap = await getDocs(query(collection(db, "users"), orderBy("trophies", "desc"), limit(5)));
        const body = document.getElementById("leaderboard-body");
        body.innerHTML = "";
        let i = 1;
        snap.forEach(d => {
            body.innerHTML += `<tr><td>${i++}</td><td>${d.data().username}</td><td>🏆 ${d.data().trophies}</td></tr>`;
        });
    }

</script>
</body>
</html>
