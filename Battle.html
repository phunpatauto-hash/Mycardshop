<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Ultimate Battle System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Rank UI */
        .rank-status { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .rank-icon { font-size: 2.5rem; filter: drop-shadow(0 0 5px rgba(255,200,49,0.5)); }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #1a1a2e; margin: 2% auto; padding: 25px; border: 2px solid #ffc831; width: 90%; max-width: 800px; border-radius: 20px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.8rem; cursor: pointer; color: #ffc831; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; text-align: center; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; }

        /* Cards Style */
        .card-row { display: flex; gap: 8px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 75px; aspect-ratio: 2/3; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.2s; cursor: pointer; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .rarity-exr { border: 2px solid #ff00ff !important; box-shadow: 0 0 10px #ff00ff; }
        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; padding: 2px; font-size: 0.55rem; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.55rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        .selected-glow { border: 2px solid #ffc831 !important; box-shadow: 0 0 15px #ffc831; opacity: 0.5; }

        /* Lobby Cards */
        .opponent-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .opp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .power-tag { background: #ff4d4d; color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-action:disabled { background: #444; color: #888; }

        #view-history, #view-defense, #view-battle { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.1rem;">⚔️ CARD ARENA PRO</div>
        <div id="user-points" style="font-size: 0.9rem; color: #aaa;">🪙 0</div>
    </nav>

    <div class="container">
        <div class="rank-status" onclick="toggleRankModal(true)">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div style="flex: 1;">
                <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
                    <span id="rank-name" style="font-weight:bold;">BRONZE</span>
                    <span>🏆 <span id="user-trophies-val">0</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-lobby" onclick="showView('lobby')">🏟️ ลานประลอง</button>
            <button class="tab" id="tab-defense" onclick="showView('defense')">🛡️ ป้องกันบ้าน</button>
            <button class="tab" id="tab-history" onclick="showView('history')">📜 ประวัติ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list"></div></div>

        <div id="prepModal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closePrepModal()">&times;</span>
                <h3 style="color:#ffc831; text-align:center;">🚩 จัดทีมบุกของคุณ</h3>
                <div id="prep-slots" class="card-row">
                    <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
                </div>
                <div style="text-align: center; margin: 15px 0;">
                    <button class="btn-action" id="go-battle-btn" disabled onclick="startBattle()">⚔️ เริ่มการต่อสู้!</button>
                </div>
                <hr style="border:0; border-top:1px solid #333;">
                <h4 style="color:#aaa;">🎴 เลือกการ์ด (ห้ามตัวซ้ำ)</h4>
                <div id="prep-selection" class="card-row"></div>
            </div>
        </div>

        <div id="view-battle">
            <div style="background: rgba(0,0,0,0.5); padding: 25px; border-radius: 20px; border: 1px solid #ffc831;">
                <div id="e-battle-cards" class="card-row"></div>
                <h2 style="text-align:center; color:#ffc831; margin: 20px 0;">VS</h2>
                <div id="p-battle-cards" class="card-row"></div>
                <h3 id="battle-log" style="text-align:center; min-height: 40px;">...</h3>
                <button id="battle-exit-btn" class="btn-action" style="display:none; margin-top: 20px;" onclick="showView('history')">กลับหน้าหลัก</button>
            </div>
        </div>

        <div id="view-defense">
             <div style="text-align: center; margin-bottom: 20px;">
                <h3 style="color:#00ff88;">🛡️ ตั้งค่าทีมป้องกัน</h3>
                <div id="defense-slots" class="card-row">
                    <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
                </div>
                <button class="btn-action" onclick="saveDefenseToDB()">💾 บันทึกทีมเฝ้าบ้าน</button>
             </div>
             <div id="defense-pool" class="card-row"></div>
        </div>

        <div id="view-history">
            <h3 style="color:#ffc831;">📜 ประวัติล่าสุด</h3>
            <div id="history-list"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32" },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0" },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700" },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2" },
        { name: "DIAMOND", min: 2000, icon: "💠", color: "#b9f2ff" },
        { name: "MASTER", min: 2200, icon: "⚔️", color: "#ff4500" },
        { name: "SUPER MASTER", min: 2500, icon: "🔥", color: "#ff0000" },
        { name: "SUPERSTAR", min: 3000, icon: "🌟", color: "#ffff00" }
    ];

    let myData = null, tempAttackTeam = [], tempDefenseTeam = [], targetOpponent = null;

    function getStats(c) {
        let hp = 200 + (c.level * 40);
        let atk = 60 + (c.level * 12);
        if(c.rarity === "EXR") { hp += 500; atk += 150; }
        return { hp, atk, total: hp + atk };
    }

    function createCardHTML(c, hide = false, isSelected = false) {
        if(!c || hide) return `<div class="mini-card" style="background:#222"></div>`;
        const s = getStats(c);
        return `
            <div class="mini-card ${c.rarity === 'EXR' ? 'rarity-exr' : ''} ${isSelected ? 'selected-glow' : ''}">
                <img src="${c.img || c.image}">
                <div class="lv-badge">Lv.${c.level}</div>
                <div class="stat-overlay">
                    <span style="color:#00ff88">❤️ ${s.hp}</span>
                    <span style="color:#ff4d4d">⚔️ ${s.atk}</span>
                </div>
            </div>`;
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), snap => {
                myData = snap.data();
                tempDefenseTeam = myData.defenseTeam || [];
                document.getElementById("user-points").innerText = `🪙 ${myData.points || 0}`;
                document.getElementById("user-trophies-val").innerText = myData.trophies || 0;
                updateRankHeader(myData.trophies || 0);
                renderPools();
                renderDefenseUI();
            });
        }
    });

    function updateRankHeader(trophies) {
        let cur = RANKS.findLast(r => trophies >= r.min) || RANKS[0];
        let nxt = RANKS[RANKS.indexOf(cur) + 1] || { min: trophies + 100 };
        document.getElementById("rank-icon").innerText = cur.icon;
        document.getElementById("rank-name").innerText = cur.name;
        document.getElementById("rank-name").style.color = cur.color;
        document.getElementById("rank-progress").style.width = Math.min(100, ((trophies - cur.min) / (nxt.min - cur.min)) * 100) + "%";
    }

    async function loadLobby() {
        const snap = await getDocs(query(collection(db, "users"), limit(10)));
        const list = document.getElementById("lobby-list");
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.id === auth.currentUser.uid) return;
            const u = d.data();
            if(!u.defenseTeam || u.defenseTeam.length < 5) return;
            
            const totalPower = u.defenseTeam.reduce((sum, c) => sum + getStats(c).total, 0);
            const div = document.createElement("div");
            div.className = "opponent-card";
            div.innerHTML = `
                <div class="opp-header">
                    <b>${u.username} (🏆 ${u.trophies || 0})</b>
                    <span class="power-tag">POWER: ${totalPower.toLocaleString()}</span>
                </div>
                <div class="card-row" style="justify-content: flex-start;">
                    ${u.defenseTeam.map(c => createCardHTML(c)).join('')}
                </div>
                <button class="btn-action" onclick="openPrepModal('${d.id}')">⚔️ ท้าชิง</button>
            `;
            list.appendChild(div);
        });
    }

    window.openPrepModal = async (id) => {
        const snap = await getDoc(doc(db, "users", id));
        targetOpponent = { id, ...snap.data() };
        tempAttackTeam = [];
        document.getElementById("prepModal").style.display = "block";
        renderPrepUI();
        renderPools();
    };

    window.closePrepModal = () => document.getElementById("prepModal").style.display = "none";

    function handleSelection(card, type) {
        let team = type === 'attack' ? tempAttackTeam : tempDefenseTeam;
        const idx = team.findIndex(t => t.name === card.name);
        if(idx > -1) team.splice(idx, 1);
        else if(team.length < 5) team.push(card);
        
        type === 'attack' ? renderPrepUI() : renderDefenseUI();
        renderPools();
    }

    function renderPrepUI() {
        const slots = document.getElementById("prep-slots").children;
        for(let i=0; i<5; i++) slots[i].innerHTML = tempAttackTeam[i] ? createCardHTML(tempAttackTeam[i]) : "";
        document.getElementById("go-battle-btn").disabled = tempAttackTeam.length < 5;
    }

    function renderDefenseUI() {
        const slots = document.getElementById("defense-slots").children;
        for(let i=0; i<5; i++) slots[i].innerHTML = tempDefenseTeam[i] ? createCardHTML(tempDefenseTeam[i]) : "";
    }

    function renderPools() {
        const pPool = document.getElementById("prep-selection");
        const dPool = document.getElementById("defense-pool");
        pPool.innerHTML = ""; dPool.innerHTML = "";
        
        const unique = {};
        (myData.collection || []).forEach(c => { if(!unique[c.name] || c.level > unique[c.name].level) unique[c.name] = c; });

        Object.values(unique).forEach(c => {
            const isAtk = tempAttackTeam.some(t => t.name === c.name);
            const isDef = tempDefenseTeam.some(t => t.name === c.name);

            const pEl = document.createElement("div");
            pEl.innerHTML = createCardHTML(c, false, isAtk);
            pEl.onclick = () => handleSelection(c, 'attack');
            pPool.appendChild(pEl);

            const dEl = document.createElement("div");
            dEl.innerHTML = createCardHTML(c, false, isDef);
            dEl.onclick = () => handleSelection(c, 'defense');
            dPool.appendChild(dEl);
        });
    }

    window.startBattle = async () => {
        closePrepModal();
        showView('battle');
        const log = document.getElementById("battle-log");
        const exitBtn = document.getElementById("battle-exit-btn");
        exitBtn.style.display = "none";
        log.innerText = "กำลังคำนวณพลัง...";

        document.getElementById("e-battle-cards").innerHTML = targetOpponent.defenseTeam.map(c => createCardHTML(c)).join('');
        document.getElementById("p-battle-cards").innerHTML = tempAttackTeam.map(c => createCardHTML(c)).join('');

        let pPwr = tempAttackTeam.reduce((s, c) => s + getStats(c).total, 0);
        let ePwr = targetOpponent.defenseTeam.reduce((s, c) => s + getStats(c).total, 0);
        const win = pPwr >= ePwr;

        setTimeout(async () => {
            log.innerHTML = win ? "<span style='color:#00ff88'>🎉 ชนะการต่อสู้!</span>" : "<span style='color:#ff4d4d'>💀 พ่ายแพ้แก่ศัตรู</span>";
            exitBtn.style.display = "block";
            
            // Firebase Updates
            const pChg = win ? 50 : -25;
            const eChg = win ? -25 : 50;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: Math.max(0, myData.trophies + pChg), points: increment(win ? 100 : 20) });
            await addDoc(collection(db, "users", auth.currentUser.uid, "logs"), { type: "attack", oppName: targetOpponent.username, win, trophyChange: pChg, time: serverTimestamp() });
            await updateDoc(doc(db, "users", targetOpponent.id), { trophies: Math.max(0, targetOpponent.trophies + eChg) });
            await addDoc(collection(db, "users", targetOpponent.id, "logs"), { type: "defense", oppName: myData.username, win: !win, trophyChange: eChg, time: serverTimestamp() });
        }, 2000);
    };

    window.showView = (v) => {
        ["view-lobby", "view-defense", "view-battle", "view-history"].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(`view-${v}`).style.display = 'block';
        if(v === 'lobby') loadLobby();
        if(v === 'history') loadHistory();
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${v}`)?.classList.add('active');
    };

    async function loadHistory() {
        const list = document.getElementById("history-list");
        const snap = await getDocs(query(collection(db, "users", auth.currentUser.uid, "logs"), orderBy("time", "desc"), limit(10)));
        list.innerHTML = snap.empty ? "ไม่มีข้อมูล" : "";
        snap.forEach(d => {
            const l = d.data();
            list.innerHTML += `<div class="opponent-card" style="border-left:5px solid ${l.win ? '#00ff88' : '#ff4d4d'}">
                <b>${l.type === 'attack' ? '⚔️ บุก' : '🛡️ ป้องกัน'} ${l.win ? 'ชนะ' : 'แพ้'}</b> vs ${l.oppName}
                <span style="float:right; color:${l.trophyChange>=0?'#00ff88':'#ff4d4d'}">${l.trophyChange>=0?'+':''}${l.trophyChange} 🏆</span>
            </div>`;
        });
    }

    window.saveDefenseToDB = async () => {
        if(tempDefenseTeam.length < 5) return alert("เลือกให้ครบ 5 ใบ!");
        await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: tempDefenseTeam });
        alert("บันทึกทีมสำเร็จ!");
    };
    
    // Initial Load
    setTimeout(() => showView('lobby'), 1000);
</script>
</body>
</html>
