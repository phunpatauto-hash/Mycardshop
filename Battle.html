<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD BATTLE - Rank Arena & Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }
        .navbar { 
            background: rgba(10, 10, 15, 0.9); padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ffc831; backdrop-filter: blur(10px);
        }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #ffc831; color: black; border-color: #ffc831; font-weight: bold; }

        .container { max-width: 1000px; margin: 20px auto; padding: 20px; text-align: center; }
        .view-section { display: none; animation: fadeIn 0.5s; }
        .view-section.active { display: block; }

        /* Rank & Leaderboard Styles */
        .rank-card {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(255, 200, 49, 0.3); display: flex; align-items: center; 
            gap: 20px; margin-bottom: 30px; text-align: left; position: relative;
        }
        .rank-icon { font-size: 3.5rem; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 1.5rem; font-weight: bold; color: #ffc831; display: flex; align-items: center; gap: 10px; }
        .top-badge { background: #ff00ff; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; animation: pulse 1.5s infinite; }
        .rank-progress-bg { width: 100%; height: 10px; background: #222; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .rank-progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s; }

        /* Board Table */
        .leaderboard-table { width: 100%; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; border-collapse: collapse; margin-top: 20px; }
        .leaderboard-table th { background: #ffc831; color: black; padding: 15px; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid #333; }
        .top-3 { color: #ffc831; font-weight: bold; }

        /* Arena Styles */
        .arena { display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 2px solid rgba(255,200,49,0.1); margin-bottom: 30px; }
        .card-slot { width: 130px; aspect-ratio: 2/3; background: rgba(0,0,0,0.5); border: 2px dashed #444; border-radius: 15px; display: flex; justify-content: center; align-items: center; transition: 0.3s; overflow: hidden; }
        .card-active { border: 2px solid #ffc831; box-shadow: 0 0 15px #ffc831; }
        .card-active img { width: 100%; height: 100%; object-fit: cover; }
        .hp-bar-bg { width: 180px; height: 12px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #555; margin-bottom: 10px; }
        .hp-bar-fill { height: 100%; background: #00ff88; width: 100%; transition: 0.4s; }

        /* Modal & Buttons */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; margin: 10% auto; padding: 30px; border-radius: 20px; width: 85%; max-width: 500px; border: 2px solid #ffc831; }
        .btn-battle { background: linear-gradient(45deg, #ffc831, #ff9000); color: #000; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-battle:disabled { background: #444; color: #888; cursor: not-allowed; }
        .selection-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; }
        .select-card img { width: 100%; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .select-card img:hover { transform: scale(1.1); border: 2px solid #ffc831; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-atk-p { animation: atk-p 0.3s; }
        @keyframes atk-p { 0% { transform: translateX(0); } 50% { transform: translateX(30px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: bold; color: #ffc831; font-size: 1.2rem;">⚔️ ARENA PRO v2</div>
        <a href="Collection.html" style="color: white; text-decoration: none; font-size: 0.9rem;">🔙 Collection</a>
    </nav>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('arena-view')">🏟️ BATTLE</button>
        <button class="tab-btn" onclick="switchTab('board-view')">🏆 LEADERBOARD</button>
    </div>

    <div class="container">
        <section id="board-view" class="view-section">
            <h2 style="color: #ffc831;">HALL OF FAME</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>อันดับ</th>
                        <th>ผู้เล่น</th>
                        <th>แรงค์</th>
                        <th>ถ้วยรางวัล</th>
                    </tr>
                </thead>
                <tbody id="board-list">
                    </tbody>
            </table>
        </section>

        <section id="arena-view" class="view-section active">
            <div class="rank-card">
                <div id="rank-emoji" class="rank-icon">🥉</div>
                <div class="rank-info">
                    <div class="rank-name">
                        <span id="rank-display-name">BRONZE</span>
                        <span id="top-global" class="top-badge" style="display: none;">TOP GLOBAL</span>
                    </div>
                    <div style="font-size: 0.9rem; margin-top: 5px;">🏆 <span id="current-trophies">0</span> / <span id="next-rank-at">200</span></div>
                    <div class="rank-progress-bg"><div id="rank-progress" class="rank-progress-fill"></div></div>
                </div>
                <button class="tab-btn" style="font-size: 0.7rem;" onclick="toggleModal('rankModal', true)">🎁 INFO</button>
            </div>

            <h2 id="battle-status" style="color: #ffc831; min-height: 40px;">พร้อมจะลุยหรือยัง?</h2>
            
            <div class="arena">
                <div class="side">
                    <div class="hp-bar-bg"><div id="p-hp" class="hp-bar-fill"></div></div>
                    <div id="p-slot" class="card-slot">?</div>
                    <div id="p-power" style="color: #00d4ff; font-weight: bold; font-size: 0.8rem;">ATK: 0</div>
                </div>
                <div style="font-size: 2rem; font-weight: 900; color: #ff4d4d;">VS</div>
                <div class="side">
                    <div class="hp-bar-bg"><div id="e-hp" class="hp-bar-fill" style="background: #ff4d4d;"></div></div>
                    <div id="e-slot" class="card-slot">?</div>
                    <div id="e-power" style="color: #ff4d4d; font-weight: bold; font-size: 0.8rem;">ATK: 0</div>
                </div>
            </div>

            <button id="startBtn" class="btn-battle" disabled>⚔️ เริ่มการต่อสู้!</button>
            <h3 style="margin-top: 30px; text-align: left; color: #ffc831; font-size: 1rem;">🎴 เลือกการ์ดของคุณ</h3>
            <div id="selection" class="selection-list"></div>
        </section>
    </div>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #ffc831;">รางวัลประจำระดับแรงค์</h2>
            <div id="reward-info-list" style="text-align: left;"></div>
            <button class="btn-battle" style="width: 100%;" onclick="toggleModal('rankModal', false)">ตกลง</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32", reward: 200 },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0", reward: 500 },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700", reward: 1000 },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2", reward: 2000 },
        { name: "DIAMOND", min: 2000, icon: "💠", color: "#b9f2ff", reward: 5000 },
        { name: "GRANDMASTER", min: 4000, icon: "👑", color: "#ff00ff", reward: 10000 }
    ];

    let userCards = [], currentUID = null, userTrophies = 0, currentRankIndex = 0;
    let selectedCard = null, isBattling = false;

    // ระบบสลับ Tab
    window.switchTab = (viewId) => {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(viewId === 'board-view') loadLeaderboard();
    };

    window.toggleModal = (id, show) => {
        document.getElementById(id).style.display = show ? "block" : "none";
        if(id === 'rankModal' && show) {
            document.getElementById("reward-info-list").innerHTML = RANKS.map(r => 
                `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;">
                    <span>${r.icon} ${r.name}</span> <span style="color:#ffc831;">+${r.reward} 🪙</span>
                </div>`
            ).join('');
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUID = user.uid;
            const userRef = doc(db, "users", user.uid);
            
            // --- ระบบ Reset แรงค์ทุกต้นเดือน ---
            const now = new Date();
            const monthId = `${now.getFullYear()}-${now.getMonth() + 1}`;
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                const data = snap.data();
                if (data.lastResetMonth !== monthId) {
                    // ลดแรงค์ลง 1 ขั้น (แต่ไม่ต่ำกว่า Bronze) และให้ของรางวัลปลอบใจ
                    let newTrophies = Math.max(0, (data.trophies || 0) - 300);
                    await updateDoc(userRef, { 
                        trophies: newTrophies, 
                        lastResetMonth: monthId,
                        points: increment(1000) // รางวัลรีเซ็ตซีซั่น
                    });
                    alert("📢 ซีซั่นใหม่เริ่มแล้ว! แรงค์ของคุณถูกปรับ และคุณได้รับ 1,000 🪙");
                }
            }

            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    userCards = data.collection || [];
                    userTrophies = data.trophies || 0;
                    updateRankUI(userTrophies);
                    renderSelection();
                }
            });
        }
    });

    function updateRankUI(trophies) {
        let currentRank = RANKS[0];
        let nextRank = RANKS[1];
        let foundIndex = 0;
        for (let i = 0; i < RANKS.length; i++) {
            if (trophies >= RANKS[i].min) {
                currentRank = RANKS[i];
                foundIndex = i;
                nextRank = RANKS[i+1] || { min: trophies + 1000 }; 
            }
        }
        
        // รางวัลเลื่อนแรงค์ (เมื่อแรงค์ปัจจุบันสูงกว่าแรงค์ที่บันทึกไว้ครั้งล่าสุดใน Session)
        if(foundIndex > currentRankIndex && isBattling === false) {
             updateDoc(doc(db, "users", currentUID), { points: increment(currentRank.reward) });
             alert(`🎊 ยินดีด้วย! คุณเลื่อนสู่แรงค์ ${currentRank.name} รับรางวัล ${currentRank.reward} 🪙`);
        }
        currentRankIndex = foundIndex;

        document.getElementById("rank-emoji").innerText = currentRank.icon;
        document.getElementById("rank-display-name").innerText = currentRank.name;
        document.getElementById("rank-display-name").style.color = currentRank.color;
        document.getElementById("current-trophies").innerText = trophies;
        document.getElementById("next-rank-at").innerText = nextRank.min;
        document.getElementById("top-global").style.display = currentRank.name === "GRANDMASTER" ? "inline" : "none";
        
        const range = nextRank.min - currentRank.min;
        const progress = ((trophies - currentRank.min) / range) * 100;
        document.getElementById("rank-progress").style.width = Math.min(100, progress) + "%";
    }

    async function loadLeaderboard() {
        const q = query(collection(db, "users"), orderBy("trophies", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById("board-list");
        list.innerHTML = "";
        let i = 1;
        snap.forEach(d => {
            const data = d.data();
            let rankTag = RANKS.findLast(r => data.trophies >= r.min) || RANKS[0];
            const row = `<tr class="${i <= 3 ? 'top-3' : ''}">
                <td>#${i}</td>
                <td>${data.username || "Unknown"}</td>
                <td>${rankTag.icon} ${rankTag.name}</td>
                <td>${data.trophies || 0}</td>
            </tr>`;
            list.innerHTML += row;
            i++;
        });
    }

    // --- ส่วน Battle Logic (เหมือนเดิมแต่เพิ่มรางวัลพิเศษ) ---
    function renderSelection() {
        const container = document.getElementById("selection");
        container.innerHTML = "";
        const unique = {};
        userCards.forEach(c => { if(!unique[c.name] || c.level > unique[c.name].level) unique[c.name] = c; });
        Object.values(unique).forEach(card => {
            const div = document.createElement("div");
            div.className = "select-card";
            div.innerHTML = `<img src="${card.img || card.image}">`;
            div.onclick = () => {
                selectedCard = card;
                document.getElementById("p-slot").innerHTML = `<img src="${card.img || card.image}">`;
                document.getElementById("p-slot").classList.add("card-active");
                const atk = 100 + ((card.level || 1) * 50);
                document.getElementById("p-power").innerText = `ATK: ${atk}`;
                document.getElementById("startBtn").disabled = false;
                setupEnemy();
            };
            container.appendChild(div);
        });
    }

    let enemyAtk = 0;
    function setupEnemy() {
        enemyAtk = 300 + Math.floor(Math.random() * (userTrophies / 2 + 500));
        document.getElementById("e-slot").innerHTML = `<img src="https://via.placeholder.com/150/000/ffc831?text=ENEMY">`;
        document.getElementById("e-power").innerText = `ATK: ${enemyAtk}`;
    }

    document.getElementById("startBtn").onclick = async () => {
        isBattling = true;
        document.getElementById("startBtn").disabled = true;
        let pHP = 100, eHP = 100;
        const pAtk = 100 + ((selectedCard.level || 1) * 50);
        const status = document.getElementById("battle-status");

        const fight = setInterval(async () => {
            document.getElementById("p-slot").classList.add("animate-atk-p");
            eHP -= Math.floor(pAtk / 10);
            document.getElementById("e-hp").style.width = Math.max(0, eHP) + "%";
            
            if (eHP <= 0) {
                clearInterval(fight);
                const winTrophies = currentRankIndex >= 3 ? 45 : 25; // Platinum ขึ้นไปได้ถ้วยเยอะขึ้น
                status.innerText = `WIN! +${winTrophies} 🏆`;
                await updateDoc(doc(db, "users", currentUID), { trophies: increment(winTrophies), points: increment(300) });
                isBattling = false;
                return;
            }

            setTimeout(() => {
                pHP -= Math.floor(enemyAtk / 15);
                document.getElementById("p-hp").style.width = Math.max(0, pHP) + "%";
                if (pHP <= 0) {
                    clearInterval(fight);
                    const loseTrophy = userTrophies > 200 ? -15 : 0;
                    status.innerText = `DEFEAT! ${loseTrophy} 🏆`;
                    updateDoc(doc(db, "users", currentUID), { trophies: increment(loseTrophy) });
                    isBattling = false;
                }
            }, 500);
            setTimeout(() => document.getElementById("p-slot").classList.remove("animate-atk-p"), 300);
        }, 1000);
    };
</script>
</body>
</html>
