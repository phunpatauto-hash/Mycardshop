<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Battle System v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Rank UI - Added Clickable */
        .rank-status { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .rank-status:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .rank-icon { font-size: 2.5rem; }
        .progress-container { flex: 1; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s; }

        /* Modal Style for Rank Info */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1a1a2e; margin: 10% auto; padding: 25px; border: 2px solid #ffc831;
            width: 80%; max-width: 500px; border-radius: 20px; position: relative;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.5rem; cursor: pointer; color: #ffc831; }
        
        .rank-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .rank-list-item:last-child { border: none; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { flex: 1; min-width: 80px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: bold; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; }

        /* Cards & Stats */
        .card-row { display: flex; gap: 10px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 85px; aspect-ratio: 2/3; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.3s; }
        .mini-card.hidden { background: linear-gradient(135deg, #1e1e2f 0%, #111 100%); border: 2px solid #ffc831; box-shadow: 0 0 10px rgba(255, 200, 49, 0.3); }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; padding: 2px; font-size: 0.6rem; }
        .stat-hp { color: #00ff88; }
        .stat-atk { color: #ff4d4d; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; }

        /* Lobby List */
        .opponent-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #222; }
        .opp-preview { display: flex; gap: 5px; margin-top: 10px; opacity: 0.6; pointer-events: none; }
        .opp-preview .mini-card { width: 40px; }

        /* General UI */
        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.05); }
        .btn-action:disabled { background: #444; color: #888; transform: none; }

        #view-battle, #view-leaderboard, #view-history, #view-prep { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.1rem;">⚔️ CARD ARENA PRO</div>
        <div id="user-points" style="font-size: 0.9rem; color: #aaa;">🪙 0</div>
    </nav>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleRankModal(false)">&times;</span>
            <h3 style="color: #ffc831; text-align: center; margin-bottom: 20px;">🎖️ ระดับแรงค์และรางวัล</h3>
            <div id="rank-info-list">
                </div>
            <p style="font-size: 0.7rem; color: #888; text-align: center; margin-top: 15px;">สะสมถ้วยรางวัลจากการชนะการดวลเพื่อเลื่อนขั้น!</p>
        </div>
    </div>

    <div class="container">
        <div class="rank-status" onclick="toggleRankModal(true)">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div class="progress-container">
                <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
                    <span id="rank-name" style="font-weight:bold; color:#ffc831;">BRONZE</span>
                    <span>🏆 <span id="user-trophies-val">0</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-lobby" onclick="showView('lobby')">🏟️ ท้าดวล</button>
            <button class="tab" id="tab-defense" onclick="showView('defense')">🛡️ ทีมป้องกัน</button>
            <button class="tab" id="tab-history" onclick="showView('history')">📜 ประวัติ</button>
            <button class="tab" id="tab-leaderboard" onclick="showView('leaderboard')">🏆 อันดับ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list"></div></div>

        <div id="view-prep">
            <div style="text-align: center; margin-bottom: 20px;">
                <h3 style="color: #ff4d4d;">🚩 ทีมบุกของคุณ (เลือก 5 ใบ)</h3>
                <div id="prep-slots" class="card-row">
                    <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn-action" id="go-battle-btn" disabled>⚔️ เข้าสู่ลานประลอง</button>
                    <button class="btn-action" style="background: #333; color: white;" onclick="showView('lobby')">ยกเลิก</button>
                </div>
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <h4 style="color: #ffc831;">🎴 เลือกการ์ดเข้าทีมบุก</h4>
            <div id="prep-selection" class="card-row"></div>
        </div>

        <div id="view-battle">
            <div style="background: rgba(0,0,0,0.4); padding: 30px; border-radius: 30px; border: 1px solid #333;">
                <div id="enemy-side">
                    <div id="e-battle-cards" class="card-row"></div>
                    <p id="opp-name-display" style="text-align:center; color:#ff4d4d; font-weight:bold;"></p>
                </div>
                <div style="text-align:center; margin: 20px 0; font-weight:900; color:#ffc831; font-size: 2rem; text-shadow: 0 0 10px rgba(255,200,49,0.5);">VS</div>
                <div id="player-side">
                    <div id="p-battle-cards" class="card-row"></div>
                    <p style="text-align:center; color:#00ff88; font-weight:bold;">YOUR ATTACKERS</p>
                </div>
            </div>
            <h2 id="battle-log" style="text-align: center; color: #ffc831; margin-top: 25px;">วิเคราะห์ทีมคู่ต่อสู้...</h2>
            <button id="run-battle-btn" class="btn-action" style="display: block; margin: 20px auto; font-size: 1.2rem; padding: 15px 50px;">ลุยเลย!</button>
        </div>

        <div id="view-defense">
            <div id="defense-slots" class="card-row">
                <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
            </div>
            <button class="btn-action" style="width: 100%;" onclick="saveDefense()">💾 บันทึกทีมป้องกัน (เฝ้าบ้าน)</button>
            <h4 style="color:#ffc831; margin-top: 30px;">🎴 เลือกการ์ดป้องกัน</h4>
            <div id="defense-pool" class="card-row"></div>
        </div>

        <div id="view-history"><div id="history-list"></div></div>
        <div id="view-leaderboard"><div id="leaderboard-body"></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32", reward: "100 🪙" },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0", reward: "300 🪙" },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700", reward: "500 🪙" },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2", reward: "1,000 🪙" },
        { name: "DIAMOND", min: 2000, icon: "💠", color: "#b9f2ff", reward: "2,500 🪙" }
    ];

    let myData = null, tempAttackTeam = [], targetOpponent = null;

    // --- Rank Modal Functions ---
    window.toggleRankModal = (show) => {
        const modal = document.getElementById("rankModal");
        modal.style.display = show ? "block" : "none";
        if(show) {
            const list = document.getElementById("rank-info-list");
            list.innerHTML = RANKS.map(r => `
                <div class="rank-list-item" style="border-left: 4px solid ${r.color}; margin-bottom: 8px; padding-left: 15px; background: rgba(255,255,255,0.02);">
                    <div>
                        <span style="font-size: 1.2rem;">${r.icon}</span> 
                        <b style="color: ${r.color}">${r.name}</b><br>
                        <small style="color: #888;">ต้องการ 🏆 ${r.min}+</small>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 0.7rem; color: #ffc831;">รางวัลขั้นถัดไป:</span><br>
                        <b>${r.reward}</b>
                    </div>
                </div>
            `).join('');
        }
    };

    window.showView = (v) => {
        ["view-lobby", "view-defense", "view-battle", "view-leaderboard", "view-history", "view-prep"].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = 'none';
        });
        document.getElementById(`view-${v}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(document.getElementById(`tab-${v}`)) document.getElementById(`tab-${v}`).classList.add('active');
        
        if(v === 'lobby') loadLobby();
        if(v === 'history') loadHistory();
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), snap => {
                myData = snap.data();
                document.getElementById("user-points").innerText = `🪙 ${myData.points || 0}`;
                document.getElementById("user-trophies-val").innerText = myData.trophies || 0;
                updateRankHeader(myData.trophies || 0);
                renderPools();
            });
        }
    });

    function updateRankHeader(trophies) {
        let currentRank = RANKS.findLast(r => trophies >= r.min) || RANKS[0];
        let nextRank = RANKS[RANKS.indexOf(currentRank) + 1] || { min: trophies + 100 };
        
        document.getElementById("rank-icon").innerText = currentRank.icon;
        document.getElementById("rank-name").innerText = currentRank.name;
        document.getElementById("rank-name").style.color = currentRank.color;
        
        const progress = ((trophies - currentRank.min) / (nextRank.min - currentRank.min)) * 100;
        document.getElementById("rank-progress").style.width = Math.min(100, progress) + "%";
    }

    function getStats(c) {
        return { hp: 200 + (c.level * 40), atk: 60 + (c.level * 12) };
    }

    function createCardHTML(c, hide = false) {
        if(hide) return `<div class="mini-card hidden"></div>`;
        const s = getStats(c);
        return `
            <div class="mini-card">
                <img src="${c.img || c.image}">
                <div class="lv-badge">Lv.${c.level}</div>
                <div class="stat-overlay">
                    <span class="stat-hp">❤️ ${s.hp}</span>
                    <span class="stat-atk">⚔️ ${s.atk}</span>
                </div>
            </div>`;
    }

    function renderPools() {
        const unique = {};
        (myData.collection || []).forEach(c => { if(!unique[c.name] || c.level > unique[c.name].level) unique[c.name] = c; });
        const cards = Object.values(unique);

        const dPool = document.getElementById("defense-pool");
        const pPool = document.getElementById("prep-selection");
        dPool.innerHTML = ""; pPool.innerHTML = "";

        cards.forEach(c => {
            const cardEl = document.createElement("div");
            cardEl.innerHTML = createCardHTML(c);
            
            const dClone = cardEl.cloneNode(true);
            dClone.onclick = () => {
                let current = myData.defenseTeam || [];
                if(current.length < 5) current.push(c); else current = [];
                updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: current });
            };
            dPool.appendChild(dClone);

            const pClone = cardEl.cloneNode(true);
            pClone.onclick = () => {
                if(tempAttackTeam.length < 5) tempAttackTeam.push(c); else tempAttackTeam = [];
                renderPrepSlots();
            };
            pPool.appendChild(pClone);
        });

        const dSlots = document.getElementById("defense-slots").children;
        for(let i=0; i<5; i++) dSlots[i].innerHTML = (myData.defenseTeam && myData.defenseTeam[i]) ? createCardHTML(myData.defenseTeam[i]) : "";
    }

    function renderPrepSlots() {
        const slots = document.getElementById("prep-slots").children;
        for(let i=0; i<5; i++) slots[i].innerHTML = tempAttackTeam[i] ? createCardHTML(tempAttackTeam[i]) : "";
        document.getElementById("go-battle-btn").disabled = tempAttackTeam.length < 5;
    }

    async function loadLobby() {
        const snap = await getDocs(query(collection(db, "users"), limit(15)));
        const list = document.getElementById("lobby-list");
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.id === auth.currentUser.uid) return;
            const u = d.data();
            if(!u.defenseTeam || u.defenseTeam.length < 5) return;

            const div = document.createElement("div");
            div.className = "opponent-card";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${u.username}</b> <span style="color:#ffc831;">🏆 ${u.trophies || 0}</span></div>
                    <button class="btn-action" onclick="goToPrep('${d.id}')">⚔️ ท้าดวล</button>
                </div>
                <div class="opp-preview">
                    ${u.defenseTeam.map(c => `<div class="mini-card"><img src="${c.img || c.image}"></div>`).join('')}
                </div>
            `;
            list.appendChild(div);
        });
    }

    window.goToPrep = async (oppId) => {
        const snap = await getDoc(doc(db, "users", oppId));
        targetOpponent = { id: oppId, ...snap.data() };
        tempAttackTeam = [];
        renderPrepSlots();
        showView('prep');
    };

    document.getElementById("go-battle-btn").onclick = () => {
        showView('battle');
        const pSide = document.getElementById("p-battle-cards");
        const eSide = document.getElementById("e-battle-cards");
        pSide.innerHTML = ""; eSide.innerHTML = "";
        document.getElementById("opp-name-display").innerText = `${targetOpponent.username} (DEFENDERS)`;
        tempAttackTeam.forEach(c => pSide.innerHTML += createCardHTML(c));
        targetOpponent.defenseTeam.forEach(() => eSide.innerHTML += createCardHTML({}, true));
        document.getElementById("run-battle-btn").style.display = "block";
    };

    document.getElementById("run-battle-btn").onclick = async () => {
        document.getElementById("run-battle-btn").style.display = "none";
        const log = document.getElementById("battle-log");
        const eCardsUI = document.getElementById("e-battle-cards").children;
        let pTotal = tempAttackTeam.reduce((s, c) => s + getStats(c).hp + getStats(c).atk, 0);
        let eTotal = targetOpponent.defenseTeam.reduce((s, c) => s + getStats(c).hp + getStats(c).atk, 0);

        for(let i=0; i<5; i++) {
            await new Promise(r => setTimeout(r, 600));
            eCardsUI[i].outerHTML = createCardHTML(targetOpponent.defenseTeam[i]);
        }

        const win = pTotal >= eTotal;
        const change = win ? 50 : -25;
        log.innerText = win ? `🎉 ชนะ! +${change} 🏆` : `💀 แพ้! ${change} 🏆`;
        
        await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: increment(change), points: increment(win ? 100 : 20) });
        await updateDoc(doc(db, "users", targetOpponent.id), { trophies: increment(win ? -25 : 50) });
        setTimeout(() => showView('history'), 3000);
    };

    async function loadHistory() {
        const snap = await getDocs(query(collection(db, "users", auth.currentUser.uid, "logs"), orderBy("time", "desc"), limit(10)));
        const list = document.getElementById("history-list");
        list.innerHTML = snap.empty ? "<p>ยังไม่มีประวัติ</p>" : "";
        snap.forEach(d => {
            const l = d.data();
            list.innerHTML += `<div class="opponent-card" style="border-left: 5px solid ${l.win ? '#00ff88' : '#ff4d4d'}">
                <b>${l.win ? '🛡️ ชนะ' : '💀 แพ้'}</b> vs ${l.oppName} <span style="float:right;">${l.trophyChange > 0 ? '+' : ''}${l.trophyChange} 🏆</span>
            </div>`;
        });
    }

    window.saveDefense = () => alert("ทีมป้องกันถูกบันทึกแล้ว!");

</script>
</body>
</html>
