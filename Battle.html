<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA - PvP Defense System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: #050505; color: white; min-height: 100vh;
        }
        .navbar { background: #0a0a0f; padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Layout Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .tab.active { background: #ffc831; color: black; font-weight: bold; border-color: #ffc831; }

        /* PvP Lobby List */
        .lobby-list { display: grid; gap: 12px; }
        .opponent-card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; transition: 0.3s;
        }
        .opponent-card:hover { border-color: #ffc831; background: rgba(255,200,49,0.05); }

        /* Battle Field */
        .battle-arena { display: flex; flex-direction: column; align-items: center; padding: 40px; background: rgba(255,255,255,0.02); border-radius: 30px; margin-top: 20px; border: 1px solid #333; }
        .card-row { display: flex; gap: 10px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 80px; aspect-ratio: 2/3; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; overflow: hidden; position: relative; transition: 0.5s; }
        .mini-card.hidden { background: linear-gradient(135deg, #1e1e2f 0%, #111 100%); border: 2px solid #ffc831; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }

        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,200,49,0.3); }
        .btn-action:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

        #view-battle { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold; font-size: 1.2rem;">⚔️ ARENA PVP PRO</div>
        <div id="user-trophies" style="font-weight: bold;">🏆 0</div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab active" id="tab-lobby" onclick="showView('lobby')">🏰 ล็อบบี้ท้าดวล</button>
            <button class="tab" id="tab-defense" onclick="showView('defense')">🛡️ ทีมป้องกัน (5 ใบ)</button>
        </div>

        <div id="view-lobby">
            <h3 style="color: #ffc831; text-align: left;">เลือกคู่ต่อสู้ที่ต้องการท้าดวล</h3>
            <div id="lobby-list" class="lobby-list">
                <p>กำลังค้นหาผู้ท้าชิง...</p>
            </div>
        </div>

        <div id="view-defense" style="display: none;">
            <div style="background: rgba(255,200,49,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #ffc831;">
                <b>คำแนะนำ:</b> เลือกการ์ด 5 ใบที่ดีที่สุดเพื่อเฝ้าบ้าน เมื่อคนอื่นมาสู้กับคุณ ทีมนี้จะสู้แทนคุณโดยอัตโนมัติ!
            </div>
            <div id="defense-slots" class="card-row">
                <div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div>
            </div>
            <button class="btn-action" style="margin-top: 20px; width: 100%;" onclick="saveDefense()">💾 บันทึกทีมป้องกัน</button>
            
            <h3 style="margin-top: 40px; text-align: left; color: #ffc831;">🎴 คอลเลกชันของคุณ (คลิกเพื่อเลือก)</h3>
            <div id="selection-pool" class="card-row" style="justify-content: flex-start; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px;"></div>
        </div>

        <div id="view-battle" style="display: none;">
            <div class="battle-arena">
                <div id="enemy-battle-side">
                    <p id="enemy-name" style="color: #ff4d4d; font-weight: bold;">คู่ต่อสู้ (DEFENDER)</p>
                    <div id="e-battle-cards" class="card-row"></div>
                </div>

                <div style="margin: 20px 0; font-size: 2.5rem; font-weight: 900; color: #ffc831; text-shadow: 0 0 20px rgba(255,200,49,0.5);">VS</div>

                <div id="player-battle-side">
                    <div id="p-battle-cards" class="card-row"></div>
                    <p style="color: #00ff88; font-weight: bold;">ทีมของคุณ (CHALLENGER)</p>
                </div>
            </div>
            <h2 id="battle-log" style="text-align: center; color: #ffc831; margin-top: 30px;">เตรียมตัวให้พร้อม!</h2>
            <button id="start-fight-btn" class="btn-action" style="display: block; margin: 20px auto; font-size: 1.5rem; padding: 15px 60px;">ลุยเลย!</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, limit, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myData = null, selectedForDefense = [];

    window.showView = (v) => {
        ["view-lobby", "view-defense", "view-battle"].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(`view-${v}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(v !== 'battle') document.getElementById(`tab-${v}`).classList.add('active');
        if(v === 'lobby') loadLobby();
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), snap => {
                myData = snap.data();
                document.getElementById("user-trophies").innerText = `🏆 ${myData.trophies || 0}`;
                if(selectedForDefense.length === 0) selectedForDefense = myData.defenseTeam || [];
                renderDefenseSetup();
                renderSelectionPool();
            });
        } else { window.location.href = "login.html"; }
    });

    async function loadLobby() {
        const q = query(collection(db, "users"), limit(20));
        const snap = await getDocs(q);
        const list = document.getElementById("lobby-list");
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.id === auth.currentUser.uid) return;
            const user = d.data();
            if(!user.defenseTeam || user.defenseTeam.length === 0) return;

            const div = document.createElement("div");
            div.className = "opponent-card";
            div.innerHTML = `
                <div style="text-align: left;">
                    <span style="font-size: 1.1rem; font-weight: bold;">${user.username || 'นักแข่งไร้นาม'}</span><br>
                    <span style="color: #ffc831;">🏆 ${user.trophies || 0}</span>
                </div>
                <button class="btn-action" onclick="initBattle('${d.id}')">⚔️ ท้าดวล</button>
            `;
            list.appendChild(div);
        });
        window.initBattle = (id) => startPvPFlow(id);
    }

    function renderSelectionPool() {
        const pool = document.getElementById("selection-pool");
        pool.innerHTML = "";
        (myData.collection || []).forEach((card) => {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.innerHTML = `<img src="${card.img || card.image}">`;
            div.onclick = () => {
                if(selectedForDefense.length < 5) {
                    selectedForDefense.push(card);
                    renderDefenseSetup();
                } else {
                    alert("ทีมป้องกันเต็มแล้ว (5 ใบ) กรุณากดเริ่มใหม่ถ้าต้องการเปลี่ยน");
                    selectedForDefense = [];
                    renderDefenseSetup();
                }
            };
            pool.appendChild(div);
        });
    }

    function renderDefenseSetup() {
        const slots = document.getElementById("defense-slots").children;
        for(let i=0; i<5; i++) {
            slots[i].innerHTML = selectedForDefense[i] ? `<img src="${selectedForDefense[i].img || selectedForDefense[i].image}">` : "";
        }
    }

    window.saveDefense = async () => {
        if(selectedForDefense.length < 5) return alert("โปรดเลือกการ์ดให้ครบ 5 ใบ!");
        await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: selectedForDefense });
        alert("🛡️ ตั้งทีมป้องกันสำเร็จ!");
    };

    async function startPvPFlow(oppId) {
        const oppSnap = await getDoc(doc(db, "users", oppId));
        const opponent = oppSnap.data();

        showView('battle');
        const pSide = document.getElementById("p-battle-cards");
        const eSide = document.getElementById("e-battle-cards");
        pSide.innerHTML = ""; eSide.innerHTML = "";
        document.getElementById("enemy-name").innerText = `${opponent.username || "คู่ต่อสู้"} (DEFENSE TEAM)`;
        document.getElementById("battle-log").innerText = "ศัตรูหมอบการ์ด 5 ใบ... พร้อมจะบุกหรือยัง?";

        (myData.defenseTeam || []).forEach(c => {
            pSide.innerHTML += `<div class="mini-card"><img src="${c.img || c.image}"></div>`;
        });
        opponent.defenseTeam.forEach((c, idx) => {
            eSide.innerHTML += `<div id="opp-card-${idx}" class="mini-card hidden"></div>`;
        });

        document.getElementById("start-fight-btn").style.display = "block";
        document.getElementById("start-fight-btn").onclick = () => processBattle(opponent, oppId);
    }

    async function processBattle(opponent, oppId) {
        document.getElementById("start-fight-btn").style.display = "none";
        const log = document.getElementById("battle-log");
        
        // คำนวณพลังแบบง่าย (พลัง = เลเวลการ์ดทั้งหมดรวมกัน)
        let pAtk = (myData.defenseTeam || []).reduce((s, c) => s + (100 + (c.level * 20)), 0);
        let eAtk = opponent.defenseTeam.reduce((s, c) => s + (100 + (c.level * 20)), 0);

        // ค่อยๆ หงายการ์ดศัตรู
        for(let i=0; i<5; i++) {
            await new Promise(r => setTimeout(r, 500));
            log.innerText = `กำลังตรวจสอบการ์ดใบที่ ${i+1}...`;
            const cardUI = document.getElementById(`opp-card-${i}`);
            cardUI.classList.remove("hidden");
            cardUI.innerHTML = `<img src="${opponent.defenseTeam[i].img || opponent.defenseTeam[i].image}">`;
        }

        setTimeout(async () => {
            if(pAtk >= eAtk) {
                log.innerText = "🎉 ชัยชนะเป็นของคุณ! +50 🏆";
                log.style.color = "#00ff88";
                await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: increment(50) });
                await updateDoc(doc(db, "users", oppId), { trophies: increment(-25) }); // ฝั่งแพ้เสียเล็กน้อย
            } else {
                log.innerText = "💀 คุณพ่ายแพ้! -25 🏆";
                log.style.color = "#ff4d4d";
                await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: increment(-25) });
                await updateDoc(doc(db, "users", oppId), { trophies: increment(50) }); // ฝั่งป้องกันได้แต้มฟรี
            }
            setTimeout(() => {
                log.style.color = "#ffc831";
                showView('lobby');
            }, 3000);
        }, 1000);
    }
</script>
</body>
</html>
