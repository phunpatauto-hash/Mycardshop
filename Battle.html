<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD ARENA PRO - Ultimate Battle System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh;
        }
        .navbar { background: rgba(10, 10, 15, 0.9); padding: 15px 25px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Rank Header */
        .rank-status { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,200,49,0.3); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .rank-icon { font-size: 2.5rem; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s; }

        /* Modal Settings */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #1a1a2e; margin: 5% auto; padding: 25px; border: 2px solid #ffc831; width: 90%; max-width: 600px; border-radius: 20px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.8rem; cursor: pointer; color: #ffc831; }

        /* Tabs Navigation */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .tab { flex: 1; min-width: 90px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; cursor: pointer; border-radius: 10px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .tab.active { background: #ffc831; color: black; border-color: #ffc831; }

        /* Card Visuals */
        .card-row { display: flex; gap: 6px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
        .mini-card { width: 70px; aspect-ratio: 2/3; background: #222; border-radius: 6px; border: 1px solid #444; overflow: hidden; position: relative; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .rarity-exr { border: 2px solid #ff00ff !important; box-shadow: 0 0 8px #ff00ff; }
        .stat-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; padding: 2px; font-size: 0.5rem; text-align: center; }
        .lv-badge { position: absolute; top: 2px; right: 2px; background: #ffc831; color: black; font-size: 0.5rem; padding: 1px 3px; border-radius: 3px; font-weight: bold; }
        .selected-glow { border: 2px solid #ffc831 !important; box-shadow: 0 0 15px #ffc831; }

        /* UI Blocks */
        .ui-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; }
        .btn-action { background: linear-gradient(45deg, #ffc831, #ff9000); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-action:disabled { background: #444; color: #888; cursor: not-allowed; }

        #view-defense, #view-history, #view-leaderboard, #view-battle { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #ffc831; font-weight: bold;">⚔️ CARD ARENA PRO</div>
        <div id="user-points">🪙 0</div>
    </nav>

    <div class="container">
        <div class="rank-status" onclick="toggleModal('rankModal', true)">
            <div id="rank-icon" class="rank-icon">🥉</div>
            <div style="flex: 1;">
                <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
                    <span id="rank-name">BRONZE</span>
                    <span>🏆 <span id="trophy-count">0</span></span>
                </div>
                <div class="progress-bar"><div id="rank-progress" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showView('lobby')">🏟️ ท้าดวล</button>
            <button class="tab" onclick="showView('defense')">🛡️ ป้องกัน</button>
            <button class="tab" onclick="showView('leaderboard')">🏆 อันดับ</button>
            <button class="tab" onclick="showView('history')">📜 ประวัติ</button>
        </div>

        <div id="view-lobby"><div id="lobby-list">กำลังโหลดคู่ต่อสู้...</div></div>
        
        <div id="view-leaderboard">
            <h3 style="color:#ffc831; text-align:center;">🏆 อันดับ MASTER ขึ้นไป</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="view-defense" class="ui-card" style="text-align: center;">
            <h3 style="color:#00ff88;">🛡️ ทีมเฝ้าบ้าน</h3>
            <div id="defense-slots" class="card-row"></div>
            <button class="btn-action" onclick="saveDefense()">💾 บันทึกทีมป้องกัน</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div id="defense-pool" class="card-row"></div>
        </div>

        <div id="view-history"><div id="history-list"></div></div>

        <div id="view-battle">
            <div class="ui-card" style="border: 2px solid #ffc831;">
                <div id="opp-battle-row" class="card-row"></div>
                <h1 style="text-align:center; color:#ffc831; margin:20px 0;">VS</h1>
                <div id="player-battle-row" class="card-row"></div>
                <h3 id="battle-status" style="text-align:center;">คำนวณผล...</h3>
                <button id="exit-battle-btn" class="btn-action" style="display:none;" onclick="showView('lobby')">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('rankModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🎖️ ข้อมูลระดับแรงค์</h3>
            <div id="rank-details"></div>
        </div>
    </div>

    <div id="prepModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('prepModal', false)">&times;</span>
            <h3 style="color:#ffc831; text-align:center;">🚩 จัดทีมบุก (5 ใบ)</h3>
            <div id="prep-slots" class="card-row"></div>
            <button id="start-btn" class="btn-action" disabled onclick="handleStartBattle()">⚔️ เริ่มสู้!</button>
            <div id="prep-pool" class="card-row" style="margin-top:20px;"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs, getDoc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32" },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0" },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700" },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2" },
        { name: "DIAMOND", min: 2000, icon: "💠", color: "#b9f2ff" },
        { name: "MASTER", min: 2200, icon: "⚔️", color: "#ff4500" },
        { name: "SUPER MASTER", min: 2500, icon: "🔥", color: "#ff0000" },
        { name: "SUPERSTAR", min: 3000, icon: "🌟", color: "#ffff00" }
    ];

    let userDoc = null, tempAtk = [], tempDef = [], targetOpp = null;

    // Helper functions
    const getPower = (c) => (200 + c.level * 40) + (60 + c.level * 12) + (c.rarity === "EXR" ? 650 : 0);
    
    const cardHTML = (c, selected = false) => `
        <div class="mini-card ${c.rarity==='EXR'?'rarity-exr':''} ${selected?'selected-glow':''}">
            <img src="${c.img || c.image}">
            <div class="lv-badge">Lv.${c.level}</div>
            <div class="stat-overlay">⚡ ${getPower(c)}</div>
        </div>`;

    // Auth & Init
    onAuthStateChanged(auth, user => {
        if(!user) return;
        onSnapshot(doc(db, "users", user.uid), snap => {
            userDoc = snap.data();
            tempDef = userDoc.defenseTeam || [];
            updateUI();
        });
    });

    function updateUI() {
        document.getElementById("user-points").innerText = `🪙 ${userDoc.points || 0}`;
        document.getElementById("trophy-count").innerText = userDoc.trophies || 0;
        
        const cur = RANKS.findLast(r => userDoc.trophies >= r.min) || RANKS[0];
        document.getElementById("rank-icon").innerText = cur.icon;
        document.getElementById("rank-name").innerText = cur.name;
        document.getElementById("rank-name").style.color = cur.color;
        
        const nxt = RANKS[RANKS.indexOf(cur)+1] || {min: userDoc.trophies + 100};
        const prog = ((userDoc.trophies - cur.min) / (nxt.min - cur.min)) * 100;
        document.getElementById("rank-progress").style.width = Math.min(prog, 100) + "%";
        
        renderPools();
    }

    // Views Controller
    window.showView = (v) => {
        ["lobby", "defense", "history", "leaderboard", "battle"].forEach(id => {
            document.getElementById(`view-${id}`).style.display = (id === v) ? 'block' : 'none';
        });
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(v==='lobby'?'ท้าดวล':v==='defense'?'ป้องกัน':v==='leaderboard'?'อันดับ':'ประวัติ')));
        
        if(v === 'lobby') loadLobby();
        if(v === 'leaderboard') loadLeaderboard();
        if(v === 'history') loadHistory();
    };

    // Lobby Logic
    async function loadLobby() {
        const list = document.getElementById("lobby-list");
        const snap = await getDocs(query(collection(db, "users"), limit(10)));
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.id === auth.currentUser.uid) return;
            const u = d.data();
            if(!u.defenseTeam || u.defenseTeam.length < 5) return;
            
            const pwr = u.defenseTeam.reduce((s, c) => s + getPower(c), 0);
            const div = document.createElement("div");
            div.className = "ui-card";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b>${u.username} (🏆 ${u.trophies || 0})</b>
                    <span style="color:#ff4d4d">พลัง: ${pwr.toLocaleString()}</span>
                </div>
                <div class="card-row" style="justify-content:flex-start;">
                    ${u.defenseTeam.map(c => cardHTML(c)).join('')}
                </div>
                <button class="btn-action" onclick="openPrep('${d.id}')">⚔️ ท้าชิง</button>`;
            list.appendChild(div);
        });
    }

    // Team Selection
    window.openPrep = async (id) => {
        const snap = await getDoc(doc(db, "users", id));
        targetOpp = {id, ...snap.data()};
        tempAtk = [];
        toggleModal('prepModal', true);
        renderPrep();
    };

    function renderPrep() {
        const slots = document.getElementById("prep-slots");
        const pool = document.getElementById("prep-pool");
        slots.innerHTML = ""; pool.innerHTML = "";
        
        for(let i=0; i<5; i++) slots.innerHTML += tempAtk[i] ? cardHTML(tempAtk[i]) : `<div class="mini-card"></div>`;
        
        const unique = {};
        (userDoc.collection || []).forEach(c => { if(!unique[c.name] || c.level > unique[c.name].level) unique[c.name] = c; });
        
        Object.values(unique).forEach(c => {
            const isSel = tempAtk.some(t => t.name === c.name);
            const div = document.createElement("div");
            div.innerHTML = cardHTML(c, isSel);
            div.onclick = () => {
                const idx = tempAtk.findIndex(t => t.name === c.name);
                if(idx > -1) tempAtk.splice(idx, 1);
                else if(tempAtk.length < 5) tempAtk.push(c);
                renderPrep();
            };
            pool.appendChild(div);
        });
        document.getElementById("start-btn").disabled = tempAtk.length < 5;
    }

    // Battle Engine
    window.handleStartBattle = async () => {
        toggleModal('prepModal', false);
        showView('battle');
        const log = document.getElementById("battle-status");
        const exit = document.getElementById("exit-battle-btn");
        exit.style.display = "none";
        
        document.getElementById("opp-battle-row").innerHTML = targetOpp.defenseTeam.map(c => cardHTML(c)).join('');
        document.getElementById("player-battle-row").innerHTML = tempAtk.map(c => cardHTML(c)).join('');

        const pPwr = tempAtk.reduce((s, c) => s + getPower(c), 0);
        const ePwr = targetOpp.defenseTeam.reduce((s, c) => s + getPower(c), 0);
        const win = pPwr >= ePwr;

        setTimeout(async () => {
            log.innerHTML = win ? "<h2 style='color:#00ff88'>🎉 ชนะการต่อสู้! (+50 🏆)</h2>" : "<h2 style='color:#ff4d4d'>💀 พ่ายแพ้ (-25 🏆)</h2>";
            exit.style.display = "block";
            
            const pMod = win ? 50 : -25;
            const eMod = win ? -25 : 50;
            
            await updateDoc(doc(db, "users", auth.currentUser.uid), { trophies: Math.max(0, userDoc.trophies + pMod), points: increment(win ? 100 : 20) });
            await addDoc(collection(db, "users", auth.currentUser.uid, "logs"), { type:"attack", oppName: targetOpp.username, win, trophyChange: pMod, time: serverTimestamp() });
            
            await updateDoc(doc(db, "users", targetOpp.id), { trophies: Math.max(0, (targetOpp.trophies||0) + eMod) });
            await addDoc(collection(db, "users", targetOpp.id, "logs"), { type:"defense", oppName: userDoc.username, win: !win, trophyChange: eMod, time: serverTimestamp() });
        }, 1500);
    };

    // Leaderboard
    async function loadLeaderboard() {
        const list = document.getElementById("leaderboard-list");
        list.innerHTML = "กำลังโหลด...";
        try {
            // หมายเหตุ: บรรทัดนี้จะพังถ้าไม่ได้สร้าง Composite Index ใน Firebase
            const q = query(collection(db, "users"), where("trophies", ">=", 2200), orderBy("trophies", "desc"), limit(10));
            const snap = await getDocs(q);
            list.innerHTML = snap.empty ? "ไม่มีผู้เล่นระดับ MASTER" : "";
            let i = 1;
            snap.forEach(d => {
                const u = d.data();
                list.innerHTML += `<div class="ui-card" style="display:flex; justify-content:space-between;">
                    <span>#${i++} ${u.username}</span> <span>🏆 ${u.trophies}</span>
                </div>`;
            });
        } catch (e) {
            list.innerHTML = "<p style='font-size:0.8rem; color:#aaa;'>กรุณาสร้าง Index ใน Firebase Console เพื่อดูอันดับ<br><small>หรือลดเงื่อนไขเพื่อดูแบบไม่เรียงลำดับ</small></p>";
            // Fallback: ดึงแบบไม่เรียงถ้า Index ยังไม่พร้อม
            const snap = await getDocs(query(collection(db, "users"), limit(10)));
            snap.forEach(d => { if(d.data().trophies >= 2200) list.innerHTML += `<div class="ui-card">${d.data().username} - 🏆 ${d.data().trophies}</div>`; });
        }
    }

    // Defense & History (Standard)
    window.saveDefense = async () => {
        if(tempDef.length < 5) return alert("ต้องเลือก 5 ใบ!");
        await updateDoc(doc(db, "users", auth.currentUser.uid), { defenseTeam: tempDef });
        alert("บันทึกสำเร็จ!");
    };

    function renderPools() {
        const dSlots = document.getElementById("defense-slots");
        const dPool = document.getElementById("defense-pool");
        if(!dSlots) return;
        dSlots.innerHTML = ""; dPool.innerHTML = "";
        for(let i=0; i<5; i++) dSlots.innerHTML += tempDef[i] ? cardHTML(tempDef[i]) : `<div class="mini-card"></div>`;
        const unique = {};
        (userDoc.collection || []).forEach(c => { if(!unique[c.name] || c.level > unique[c.name].level) unique[c.name] = c; });
        Object.values(unique).forEach(c => {
            const isSel = tempDef.some(t => t.name === c.name);
            const div = document.createElement("div");
            div.innerHTML = cardHTML(c, isSel);
            div.onclick = () => {
                const idx = tempDef.findIndex(t => t.name === c.name);
                if(idx > -1) tempDef.splice(idx, 1);
                else if(tempDef.length < 5) tempDef.push(c);
                renderPools();
            };
            dPool.appendChild(div);
        });
    }

    async function loadHistory() {
        const list = document.getElementById("history-list");
        const snap = await getDocs(query(collection(db, "users", auth.currentUser.uid, "logs"), orderBy("time", "desc"), limit(10)));
        list.innerHTML = snap.empty ? "ไม่มีประวัติ" : "";
        snap.forEach(d => {
            const l = d.data();
            list.innerHTML += `<div class="ui-card" style="border-left:5px solid ${l.win?'#00ff88':'#ff4d4d'}">
                ${l.type==='attack'?'⚔️ บุก':'🛡️ ป้องกัน'} ${l.win?'ชนะ':'แพ้'} vs ${l.oppName} (${l.trophyChange>=0?'+':''}${l.trophyChange} 🏆)
            </div>`;
        });
    }

    window.toggleModal = (id, show) => {
        document.getElementById(id).style.display = show ? "block" : "none";
        if(id === 'rankModal' && show) {
            document.getElementById("rank-details").innerHTML = RANKS.map(r => `
                <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333; color:${r.color}">
                    <b>${r.icon} ${r.name}</b> <span>${r.min}+ 🏆</span>
                </div>`).join('');
        }
    };
    
    // Auto Load
    setTimeout(() => showView('lobby'), 1000);
</script>
</body>
</html>
