<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD BATTLE - Rank Arena Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }
        .navbar { 
            background: rgba(10, 10, 15, 0.9); padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ffc831; backdrop-filter: blur(10px);
        }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; text-align: center; }
        
        /* Enhanced Rank Card */
        .rank-card {
            background: rgba(255, 255, 255, 0.05); padding: 20px;
            border-radius: 20px; border: 1px solid rgba(255, 200, 49, 0.3);
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px; text-align: left;
            position: relative; overflow: hidden;
        }
        .rank-icon { font-size: 3.5rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .rank-info { flex: 1; }
        .rank-name { font-size: 1.5rem; font-weight: bold; color: #ffc831; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .top-badge { background: #ff00ff; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; animation: pulse 1.5s infinite; }
        .trophy-count { color: #fff; font-size: 1.1rem; margin-top: 5px; }
        .rank-progress-bg { width: 100%; height: 10px; background: #222; border-radius: 10px; margin-top: 12px; overflow: hidden; border: 1px solid #333; }
        .rank-progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff9000); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        .btn-info {
            background: rgba(255, 255, 255, 0.1); border: 1px solid #ffc831; color: #ffc831;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .btn-info:hover { background: #ffc831; color: #000; }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; margin: 10% auto; padding: 30px; border-radius: 20px; width: 80%; max-width: 500px; border: 2px solid #ffc831; }
        .rank-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }

        /* Battle Arena & Slots */
        .arena { display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 2px solid rgba(255,200,49,0.1); margin-bottom: 30px; min-height: 300px; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .vs-badge { font-size: 3rem; font-weight: 900; color: #ff4d4d; text-shadow: 0 0 20px #ff4d4d; }
        .card-slot { width: 140px; aspect-ratio: 2/3; background: rgba(0,0,0,0.5); border: 2px dashed #444; border-radius: 15px; display: flex; justify-content: center; align-items: center; }
        .card-active { border: 2px solid #ffc831; box-shadow: 0 0 15px #ffc831; overflow: hidden; }
        .card-active img { width: 100%; height: 100%; object-fit: cover; }
        .hp-bar-bg { width: 180px; height: 12px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #555; }
        .hp-bar-fill { height: 100%; background: #00ff88; width: 100%; transition: 0.4s; }

        /* Selection List */
        .selection-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; max-height: 300px; overflow-y: auto; border: 1px solid #333; }
        .select-card { cursor: pointer; border-radius: 10px; overflow: hidden; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .select-card:hover { border-color: #ffc831; transform: scale(1.05); }
        .select-card img { width: 100%; display: block; }

        .btn-battle { background: linear-gradient(45deg, #ffc831, #ff9000); color: #000; padding: 15px 50px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-battle:disabled { background: #444; color: #888; cursor: not-allowed; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes attack-player { 0% { transform: translateX(0); } 50% { transform: translateX(40px); } 100% { transform: translateX(0); } }
        @keyframes attack-enemy { 0% { transform: translateX(0); } 50% { transform: translateX(-40px); } 100% { transform: translateX(0); } }
        .animate-atk-p { animation: attack-player 0.3s; }
        .animate-atk-e { animation: attack-enemy 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: bold; color: #ffc831; font-size: 1.2rem;">⚔️ CARD ARENA PRO</div>
        <a href="Collection.html" style="color: white; text-decoration: none; font-weight: bold;">🔙 กลับหน้าคอลเลกชัน</a>
    </nav>

    <div class="container">
        <div class="rank-card">
            <div id="rank-emoji" class="rank-icon">🥉</div>
            <div class="rank-info">
                <div class="rank-name">
                    <span id="rank-display-name">BRONZE</span>
                    <span id="top-global" class="top-badge" style="display: none;">TOP GLOBAL #1</span>
                </div>
                <div class="trophy-count">🏆 <span id="current-trophies">0</span> / <span id="next-rank-at">200</span></div>
                <div class="rank-progress-bg"><div id="rank-progress" class="rank-progress-fill"></div></div>
            </div>
            <button class="btn-info" onclick="toggleModal(true)">🎁 รางวัลแรงค์</button>
        </div>

        <h2 id="battle-status" style="color: #ffc831;">เตรียมความพร้อมก่อนต่อสู้!</h2>
        
        <div class="arena">
            <div class="side">
                <div class="hp-bar-bg"><div id="p-hp" class="hp-bar-fill"></div></div>
                <div id="p-slot" class="card-slot">?</div>
                <div id="p-power" style="color: #00d4ff; font-weight: bold;">ATK: 0</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="side">
                <div class="hp-bar-bg"><div id="e-hp" class="hp-bar-fill" style="background: #ff4d4d;"></div></div>
                <div id="e-slot" class="card-slot">?</div>
                <div id="e-power" style="color: #ff4d4d; font-weight: bold;">ATK: 0</div>
            </div>
        </div>

        <button id="startBtn" class="btn-battle" disabled>⚔️ เริ่มการต่อสู้!</button>
        <h3 style="margin-top: 30px; text-align: left; color: #ffc831;">🎴 เลือกการ์ดที่จะส่งออกไป</h3>
        <div id="selection" class="selection-list"></div>
    </div>

    <div id="rankModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #ffc831;">Rank Details & Rewards</h2>
            <div id="reward-list"></div>
            <button class="btn-battle" style="width: 100%; margin-top: 20px;" onclick="toggleModal(false)">ปิดหน้าต่าง</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RANKS = [
        { name: "BRONZE", min: 0, icon: "🥉", color: "#cd7f32", reward: "100 🪙" },
        { name: "SILVER", min: 200, icon: "🥈", color: "#c0c0c0", reward: "300 🪙" },
        { name: "GOLD", min: 500, icon: "🥇", color: "#ffd700", reward: "500 🪙 + Common Card" },
        { name: "PLATINUM", min: 1000, icon: "💎", color: "#e5e4e2", reward: "1,000 🪙 + Rare Card" },
        { name: "DIAMOND", min: 2000, icon: "💠", color: "#b9f2ff", reward: "2,500 🪙 + Epic Card" },
        { name: "GRANDMASTER", min: 4000, icon: "👑", color: "#ff00ff", reward: "5,000 🪙 + Legend Card" }
    ];

    let userCards = [], currentUID = null, userTrophies = 0, currentRankName = "BRONZE";
    let selectedCard = null, isBattling = false;

    // ระบบแสดงรายละเอียดแรงค์
    window.toggleModal = (show) => {
        const modal = document.getElementById("rankModal");
        modal.style.display = show ? "block" : "none";
        if(show) {
            const list = document.getElementById("reward-list");
            list.innerHTML = RANKS.map(r => `
                <div class="rank-row">
                    <span>${r.icon} <b>${r.name}</b> (${r.min}+)</span>
                    <span style="color: #00ff88; font-size: 0.8rem;">${r.reward}</span>
                </div>
            `).join('');
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    userCards = data.collection || [];
                    userTrophies = data.trophies || 0;
                    updateRankUI(userTrophies);
                    renderSelection();
                }
            });
        } else { window.location.href = "login.html"; }
    });

    function updateRankUI(trophies) {
        let currentRank = RANKS[0];
        let nextRank = RANKS[1];
        for (let i = 0; i < RANKS.length; i++) {
            if (trophies >= RANKS[i].min) {
                currentRank = RANKS[i];
                nextRank = RANKS[i+1] || { min: trophies + 1000 }; 
            }
        }
        currentRankName = currentRank.name;
        document.getElementById("rank-emoji").innerText = currentRank.icon;
        document.getElementById("rank-display-name").innerText = currentRank.name;
        document.getElementById("rank-display-name").style.color = currentRank.color;
        document.getElementById("current-trophies").innerText = trophies;
        document.getElementById("next-rank-at").innerText = nextRank.min;
        document.getElementById("top-global").style.display = currentRank.name === "GRANDMASTER" ? "inline" : "none";

        const range = nextRank.min - currentRank.min;
        const progress = ((trophies - currentRank.min) / range) * 100;
        document.getElementById("rank-progress").style.width = Math.min(100, progress) + "%";
    }

    function renderSelection() {
        const container = document.getElementById("selection");
        container.innerHTML = "";
        const seen = {};
        userCards.forEach(c => {
            const key = c.name + (c.rarity || 'C');
            if (!seen[key] || (c.level > seen[key].level)) seen[key] = c;
        });
        Object.values(seen).forEach(card => {
            const div = document.createElement("div");
            div.className = "select-card";
            div.innerHTML = `<img src="${card.img || card.image}">`;
            div.onclick = () => selectMyCard(card);
            container.appendChild(div);
        });
    }

    function selectMyCard(card) {
        if (isBattling) return;
        selectedCard = card;
        const slot = document.getElementById("p-slot");
        slot.innerHTML = `<img src="${card.img || card.image}">`;
        slot.classList.add("card-active");
        const atk = 100 + ((card.level || 1) * 50) + ((card.stars || 0) * 200);
        document.getElementById("p-power").innerText = `ATK: ${atk}`;
        document.getElementById("startBtn").disabled = false;
        setupEnemy();
    }

    let enemyAtk = 0;
    function setupEnemy() {
        const bosses = [
            { img: "https://via.placeholder.com/150/000/fff?text=BOSS_X", atk: 600 },
            { img: "https://via.placeholder.com/150/500/fff?text=ELITE", atk: 1500 }
        ];
        const boss = bosses[Math.floor(Math.random() * bosses.length)];
        document.getElementById("e-slot").innerHTML = `<img src="${boss.img}">`;
        document.getElementById("e-slot").classList.add("card-active");
        enemyAtk = boss.atk;
        document.getElementById("e-power").innerText = `ATK: ${enemyAtk}`;
    }

    document.getElementById("startBtn").onclick = async () => {
        if (!selectedCard || isBattling) return;
        isBattling = true;
        document.getElementById("startBtn").disabled = true;
        
        let pHP = 100, eHP = 100;
        const pAtk = 100 + ((selectedCard.level || 1) * 50) + ((selectedCard.stars || 0) * 200);
        const status = document.getElementById("battle-status");

        const fight = setInterval(async () => {
            document.getElementById("p-slot").classList.add("animate-atk-p");
            eHP -= Math.floor(pAtk / 10);
            document.getElementById("e-hp").style.width = Math.max(0, eHP) + "%";
            setTimeout(() => document.getElementById("p-slot").classList.remove("animate-atk-p"), 300);

            if (eHP <= 0) {
                clearInterval(fight);
                // ระบบโบนัสถ้วย: Platinum ขึ้นไปได้ +50
                const bonusRanks = ["PLATINUM", "DIAMOND", "GRANDMASTER"];
                const winTrophies = bonusRanks.includes(currentRankName) ? 50 : 25;
                const winPoints = 500;
                
                status.innerText = `🎉 WIN! +${winPoints} 🪙 | +${winTrophies} 🏆 (RANK BONUS!)`;
                await updateDoc(doc(db, "users", currentUID), { 
                    points: increment(winPoints),
                    trophies: increment(winTrophies)
                });
                endBattle();
                return;
            }

            setTimeout(async () => {
                document.getElementById("e-slot").classList.add("animate-atk-e");
                pHP -= Math.floor(enemyAtk / 10);
                document.getElementById("p-hp").style.width = Math.max(0, pHP) + "%";
                setTimeout(() => document.getElementById("e-slot").classList.remove("animate-atk-e"), 200);

                if (pHP <= 0) {
                    clearInterval(fight);
                    const loseTrophy = userTrophies > 200 ? -12 : 0;
                    status.innerText = `💀 DEFEAT! ${loseTrophy !== 0 ? loseTrophy + ' 🏆' : ''}`;
                    if(loseTrophy !== 0) await updateDoc(doc(db, "users", currentUID), { trophies: increment(loseTrophy) });
                    endBattle();
                }
            }, 500);
        }, 1000);
    };

    function endBattle() {
        isBattling = false;
        setTimeout(() => {
            document.getElementById("p-hp").style.width = "100%";
            document.getElementById("e-hp").style.width = "100%";
            document.getElementById("startBtn").disabled = false;
        }, 3000);
    }
</script>
</body>
</html>
