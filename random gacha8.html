        .modal-card-img { width: 45px; height: 65px; object-fit: cover; border-radius: 5px; border: 1px solid #444; display: block; }
        #rate-list-body tr { border-bottom: 1px solid #222; }
        #rate-list-body td { padding: 10px 5px; vertical-align: middle; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: #050505; color: white; text-align: center; overflow-x: hidden; }
        .navbar { background-color: rgba(15, 15, 15, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #1a1a1a; color: #ffc831; border: 1px solid #ffc831; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-nav:hover { background: #ffc831; color: #000; }
        .points-box { background: #000; color: #ffc831; border: 1px solid #ffc831; padding: 8px 20px; border-radius: 25px; font-weight: bold; }
        .diamond-box { background: #000; color: #00d4ff; border: 1px solid #00d4ff; padding: 8px 20px; border-radius: 25px; font-weight: bold; margin-left: 10px; }
        
        .ticket-box { background: #000; color: #cbd5e1; border: 1px solid #cbd5e1; padding: 8px 20px; border-radius: 25px; font-weight: bold; margin-left: 10px; }
        .premium-ticket-box { background: #000; color: #ffc831; border: 1px solid #ffc831; padding: 8px 20px; border-radius: 25px; font-weight: bold; margin-left: 10px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .gacha-box { flex: 2; background-color: #111; border-radius: 30px; padding: 30px; border: 1px solid #222; min-height: 500px; position: relative; background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); min-width: 320px; }
        .preview-box { flex: 0.7; background: #111; border-radius: 30px; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; align-items: center; min-width: 250px; min-height: 600px; }
        .scroll-window { width: 100%; height: 320px; overflow: hidden; position: relative; margin: 10px 0; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        .slide-track-v { display: flex; flex-direction: column; gap: 15px; animation: scroll-up 20s linear infinite; }
        @keyframes scroll-up { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .preview-card-item { width: 140px; margin: 0 auto; border-radius: 10px; border: 2px solid #222; overflow: hidden; }
        .preview-card-item img { width: 100%; display: block; }
        .quick-rate-table { width: 100%; margin: 15px 0; font-size: 0.85rem; border-top: 1px solid #333; padding-top: 15px; }
        .rate-row { display: flex; justify-content: space-between; padding: 5px 15px; border-bottom: 1px solid #222; }
        .rate-label { font-weight: bold; }

        /* --- Colors & Glows --- */
        .color-exr { color: #00d4ff; text-shadow: 0 0 5px #00d4ff; }
        .color-sec { color: #a020f0; text-shadow: 0 0 5px #a020f0; }
        .color-sur { color: #ff4500; text-shadow: 0 0 5px #ffc831; }
        .color-ur { color: #39ff14; text-shadow: 0 0 5px #39ff14; }
        .color-ssr { color: #ff4444; }
        .color-sr { color: #ffc831; }
        .color-r { color: #007bff; text-shadow: 0 0 5px #007bff; }
        .color-uc { color: #aaaaaa; }

        .pity-area { max-width: 500px; margin: 0 auto 20px auto; display: flex; flex-direction: column; gap: 10px; }
        .pity-container { background: #1a1a1a; height: 10px; border-radius: 10px; border: 1px solid #333; overflow: hidden; position: relative; }
        .pity-bar-sec { height: 100%; background: linear-gradient(90deg, #a020f0, #ff00ff); width: 0%; transition: 0.5s; box-shadow: 0 0 10px #a020f0; }
        .pity-bar-exr { height: 100%; background: linear-gradient(90deg, #ffffff, #00d4ff); width: 0%; transition: 0.5s; box-shadow: 0 0 15px #fff; }
        .pity-label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-bottom: 30px; justify-items: center; }
        
        /* ==================== 📦 ระบบซองการ์ดและการ์ดใหม่ 📦 ==================== */
        .pack-wrapper { width: 130px; aspect-ratio: 2/3; position: relative; cursor: pointer; perspective: 1000px; }
        
        /* สไตล์ของซองการ์ดฟอยล์ */
        .card-pack { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 10; transition: 0.6s ease-in-out; transform-style: preserve-3d; }
        .pack-half { position: absolute; width: 100%; height: 50%; left: 0; background: linear-gradient(135deg, #2c3e50, #0f172a); border: 2px solid #ffc831; overflow: hidden; transition: transform 0.5s ease-in-out, opacity 0.4s ease-in-out; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .pack-top { top: 0; border-radius: 12px 12px 0 0; border-bottom: 1px dashed #ffc831; align-items: flex-end; }
        .pack-bottom { bottom: 0; border-radius: 0 0 12px 12px; border-top: 1px dashed #ffc831; align-items: flex-start; }
        
        /* ลายและตัวหนังสือบนซองการ์ด */
        .pack-design { font-size: 0.8rem; font-weight: bold; color: #ffc831; text-shadow: 0 0 5px #ffc831; letter-spacing: 2px; transform: scale(1.1); pointer-events: none; }
        .pack-top .pack-design { margin-bottom: -10px; }
        .pack-bottom .pack-design { margin-top: -10px; }

        /* เอฟเฟกต์ฉีกซองออกด้านบน-ล่าง */
        .pack-wrapper.ripped .pack-top { transform: translateY(-110%) rotate(-5deg); opacity: 0; }
        .pack-wrapper.ripped .pack-bottom { transform: translateY(110%) rotate(5deg); opacity: 0; }
        .pack-wrapper.ripped .card-pack { pointer-events: none; }

        /* ตัวการ์ดด้านใน */
        .card { width: 100%; height: 100%; position: absolute; top:0; left:0; perspective: 1000px; opacity: 0; transform: scale(0.8); transition: opacity 0.3s, transform 0.5s; }
        .pack-wrapper.ripped .card { opacity: 1; transform: scale(1); }
        
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; transform: rotateY(180deg); }
        .card.revealed .card-inner { transform: rotateY(0deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 12px; border: 2px solid #333; overflow: hidden; }
        .card-back { background: radial-gradient(circle, #222, #000); transform: rotateY(180deg); border: 2px solid #ffc831; box-shadow: inset 0 0 15px rgba(255,200,49,0.3); }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ข้อความแจ้งเตือนให้กดฉีกซอง */
        .hint-rip { position: absolute; bottom: -22px; width: 100%; font-size: 0.65rem; color: #ffc831; animation: pulse 1s infinite alternate; font-weight: bold; pointer-events: none; }
        .pack-wrapper.ripped .hint-rip { display: none; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 5% auto; padding: 20px; width: 95%; max-width: 500px; border-radius: 20px; text-align: left; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .btn-pull { padding: 12px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; border: none; background: #ffc831; color: #000; margin: 5px; }
        .btn-pull:disabled { background: #444; color: #888; }
        #cutscene-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .exr-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; animation: flash-out 0.8s forwards; }
        @keyframes flash-out { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        /* เพิ่มคลาสเขย่าแบบรุนแรง */
        .shake-heavy { animation: shake-heavy-anim 0.4s ease-in-out infinite; }
        @keyframes shake-heavy-anim {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-4px, -2px) rotate(-2deg); }
            20% { transform: translate(3px, 3px) rotate(2deg); }
            30% { transform: translate(-3px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -3px) rotate(3deg); }
            50% { transform: translate(-2px, 3px) rotate(-2deg); }
            60% { transform: translate(3px, -1px) rotate(1deg); }
            70% { transform: translate(-3px, -3px) rotate(-3deg); }
            80% { transform: translate(2px, 2px) rotate(2deg); }
            90% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* เพิ่มคลาสเขย่าแบบเบา */
        .shake-light { animation: shake-light-anim 0.4s ease-in-out both; }
        @keyframes shake-light-anim {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-2px, -1px); }
            40% { transform: translate(2px, 1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -1px); }
        }
    </style>

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) { userData = snap.data(); updateUI(); }
            });
        } else { window.location.href = 'login.html'; }
    });

    function updateUI() {
        if (!userData) return;
        document.getElementById("balance").innerText = (userData.points || 0).toLocaleString();
        document.getElementById("user-diamonds").innerText = (userData.diamonds || 0).toLocaleString();
        
        document.getElementById("user-normal-tickets").innerText = (userData.normal_tickets || 0).toLocaleString();
        document.getElementById("user-premium-tickets").innerText = (userData.premium_tickets || 0).toLocaleString();

        const ps = userData.pitySEC || 0, pe = userData.pityEXR || 0;
        document.getElementById("pity-bar-sec").style.width = (Math.min(ps, 550) / 550 * 100) + "%";
        document.getElementById("pity-text-sec").innerText = `${ps} / 550`;
        document.getElementById("pity-bar-exr").style.width = (Math.min(pe, 900) / 900 * 100) + "%";
        document.getElementById("pity-text-exr").innerText = `${pe} / 900`;
    }

    // ฟังก์ชันจัดการคลิกฉีกซองการ์ด ปรับปรุงระบบสั่นตามเงื่อนไข EXR
    window.ripPack = function(wrapperEl, winRarity) {
        if (wrapperEl.classList.contains('ripped')) return;
        
        // กรณีเป็นระดับ EXR: ให้ทำการสั่นตัวซองและหน้าจออย่างรุนแรงทันทีก่อนค่อยฉีก
        if (winRarity === "EXR") {
            wrapperEl.classList.add('shake-heavy');
            document.body.classList.add('shake-heavy');
            
            setTimeout(() => {
                // หยุดสั่นตัวซองกับหน้าจอ แล้วทำการรันคัตซีนฉีกซอง
                wrapperEl.classList.remove('shake-heavy');
                document.body.classList.remove('shake-heavy');
                
                executeRipEffects(wrapperEl, winRarity);
            }, 400); // สั่นรุนแรงเร้าใจเป็นเวลา 0.4 วินาที
        } else {
            // ถ้าระดับอื่น ๆ ให้ทำเอฟเฟกต์เปิดแบบปกติทันที
            executeRipEffects(wrapperEl, winRarity);
        }
    };

    // ฟังก์ชันย่อยในการประมวลผลเอฟเฟกต์การแยกซองและการพลิกการ์ด
    function executeRipEffects(wrapperEl, winRarity) {
        wrapperEl.classList.add('ripped');
        
        setTimeout(() => {
            const cardEl = wrapperEl.querySelector('.card');
            cardEl.classList.add('revealed');
            
            if (winRarity === "EXR") {
                playEXRCutscene();
            } else if (["SEC", "SUR", "SSR", "UR"].includes(winRarity)) {
                triggerLightShake();
            }
        }, 400);
    }

    window.pull = async (amount) => {
        if (isPulling || !userData) return;

        let currentPoints = userData.points || 0;
        let normalTickets = userData.normal_tickets || 0;
        let premiumTickets = userData.premium_tickets || 0;

        let updateFields = {};
        let costPoints = 0;
        let exp = amount === 5 ? 50 : (amount === 50 ? 1500 : 1000); 

        // ==================== ระบบตั๋วสุ่ม ====================
        if (amount === 5) {
            if (normalTickets >= 10) { updateFields["normal_tickets"] = increment(-10); } 
            else if (premiumTickets >= 5) { updateFields["premium_tickets"] = increment(-5); } 
            else {
                costPoints = 100;
                if (currentPoints < costPoints) return alert("แต้มหรือตั๋วสุ่มของคุณไม่เพียงพอ!");
                updateFields["points"] = increment(-costPoints);
            }
        } 
        else if (amount === 10) {
            if (normalTickets >= 15) { updateFields["normal_tickets"] = increment(-15); } 
            else if (premiumTickets >= 10) { updateFields["premium_tickets"] = increment(-10); } 
            else {
                costPoints = 500;
                if (currentPoints < costPoints) return alert("แต้มหรือตั๋วสุ่มของคุณไม่เพียงพอ!");
                updateFields["points"] = increment(-costPoints);
            }
        } 
        else if (amount === 50) {
            if (normalTickets >= 30) { updateFields["normal_tickets"] = increment(-30); } 
            else if (premiumTickets >= 20) { updateFields["premium_tickets"] = increment(-20); } 
            else {
                costPoints = 1000;
                if (currentPoints < costPoints) return alert("แต้มหรือตั๋วสุ่มของคุณไม่เพียงพอ!");
                updateFields["points"] = increment(-costPoints);
            }
        }

        isPulling = true; toggleButtons(true);
        const display = document.getElementById("display");
        const instruction = document.getElementById("pack-instruction");
        display.innerHTML = "";
        instruction.style.display = "block"; 
        
        const results = [];
        let ps = userData.pitySEC || 0, pe = userData.pityEXR || 0;
        const totalWeight = allCards.reduce((s, c) => s + c.rate, 0);

        for (let i = 0; i < amount; i++) {
            ps++; pe++;
            let win = null;
            if (pe >= 900) { win = allCards.filter(c => c.rarity === "EXR")[0]; pe = 0; }
            else if (ps >= 550) { win = allCards.filter(c => c.rarity === "SEC")[0]; ps = 0; }
            else {
                let r = Math.random() * totalWeight, curr = 0;
                for (const c of allCards) { curr += c.rate; if (r <= curr) { win = c; break; } }
            }
            if (win.rarity === "SEC") ps = 0;
            if (win.rarity === "EXR") { pe = 0; ps = 0; }

            results.push({ name: win.name, rarity: win.rarity, img: win.img, obtainedDate: Date.now(), level: 1, source: "Gacha ตู้ที่ 7" });
            
            const wrapperEl = document.createElement("div");
            wrapperEl.className = "pack-wrapper";
            wrapperEl.setAttribute("onclick", `ripPack(this, '${win.rarity}')`);
            
            wrapperEl.innerHTML = `
                <div class="card-pack">
                    <div class="pack-half pack-top"><div class="pack-design">BOOSTER</div></div>
                    <div class="pack-half pack-bottom"><div class="pack-design">PACK</div></div>
                </div>
                <div class="card">
                    <div class="card-inner">
                        <div class="card-front"><img src="${win.img}"></div>
                        <div class="card-back"></div>
                    </div>
                </div>
                <div class="hint-rip">Tap to Rip</div>
            `;
            
            display.appendChild(wrapperEl);
        }

        updateFields["pitySEC"] = ps;
        updateFields["pityEXR"] = pe;
        updateFields["passExp"] = increment(exp);
        updateFields["collection"] = arrayUnion(...results);

        await updateDoc(doc(db, "users", currentUserUID), updateFields);
        
        isPulling = false; toggleButtons(false);
    }

    async function playEXRCutscene() {
        const overlay = document.getElementById("cutscene-overlay");
        overlay.style.display = "flex";
        await new Promise(r => setTimeout(r, 1200));
        overlay.style.display = "none";
        const flash = document.createElement("div"); flash.className="exr-flash";
        document.body.appendChild(flash); setTimeout(() => flash.remove(), 800);
    }

    function triggerLightShake() {
        document.body.classList.add("shake-light");
        setTimeout(() => document.body.classList.remove("shake-light"), 400);
    }

    function toggleButtons(d) {
        document.getElementById("pull-5").disabled = d;
        document.getElementById("pull-10").disabled = d;
        document.getElementById("pull-50").disabled = d;
    }

    window.openModal = () => {
        const body = document.getElementById("rate-list-body");
        body.innerHTML = allCards.map(c => `
            <tr>
                <td><img src="${c.img}" class="modal-card-img"></td>
                <td>
                    <div style="font-weight:bold; color: ${getRarityColor(c.rarity)};">[${c.rarity}]</div>
                    <div style="font-size: 0.9rem;">${c.name}</div>
                </td>
                <td style="text-align:right; font-weight:bold; color:#ffc831;">${c.rate}%</td>
            </tr>
        `).join('');
        document.getElementById("rateModal").style.display = "block";
    }

    window.closeModal = () => document.getElementById("rateModal").style.display = "none";

    function getRarityColor(rarity) {
        const colors = { 
            EXR: '#00d4ff', 
            SEC: '#a020f0', 
            SUR: '#ff4500', 
            UR: '#39ff14', 
            SSR: '#ff4444', 
            SR: '#ffc831',
            R: '#007bff' 
        };
        return colors[rarity] || '#aaaaaa';
    }

    const track = document.getElementById("v-track");
    const rares = allCards.filter(c => ["EXR", "SEC", "SUR", "UR", "SSR", "R"].includes(c.rarity));
    track.innerHTML = [...rares, ...rares].map(c => `<div class="preview-card-item"><img src="${c.img}"></div>`).join('');
</script>
