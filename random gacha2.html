<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCARD GACHA - SSR Pity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- Style หลัก --- */
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: #050505; color: white; text-align: center; overflow-x: hidden; }
        .navbar { background-color: rgba(15, 15, 15, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #1a1a1a; color: #ffc831; border: 1px solid #ffc831; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover { background: #ffc831; color: #000; }
        .points-box { background: #000; color: #ffc831; border: 1px solid #ffc831; padding: 8px 20px; border-radius: 25px; font-weight: bold; }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .gacha-box { flex: 2; background-color: #111; border-radius: 30px; padding: 30px; border: 1px solid #222; min-height: 500px; position: relative; background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); min-width: 320px; }
        .preview-box { flex: 0.8; background: #111; border-radius: 30px; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 280px; }

        /* --- SSR Pity System --- */
        .pity-area { max-width: 400px; margin: 0 auto 20px auto; }
        .pity-container { background: #1a1a1a; height: 10px; border-radius: 10px; border: 1px solid #333; overflow: hidden; position: relative; margin-bottom: 5px; }
        .pity-bar-ssr { height: 100%; background: linear-gradient(90deg, #ff0000, #ffc831); width: 0%; transition: 0.5s; box-shadow: 0 0 10px #ff0000; }
        .pity-label { font-size: 0.75rem; color: #aaa; }

        /* --- Card Grid --- */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 30px; justify-items: center; }
        .card { width: 120px; position: relative; perspective: 1000px; }
        .card-inner { width: 100%; aspect-ratio: 2/3; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: rotateY(180deg); }
        .card.revealed .card-inner { transform: rotateY(0deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 10px; border: 2px solid #333; overflow: hidden; }
        .card-back { background: linear-gradient(135deg, #222 0%, #000 100%); transform: rotateY(180deg); }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { margin-top: 5px; opacity: 0; transition: 0.5s; font-size: 0.75rem; }
        .card.revealed .card-info { opacity: 1; }

        /* --- Preview Slideshow (ขวา) --- */
        .slideshow-container { width: 180px; aspect-ratio: 2/3; position: relative; margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 2px solid #ffc831; box-shadow: 0 0 20px rgba(255, 200, 49, 0.2); }
        .slide-img { width: 100%; height: 100%; object-fit: cover; display: none; animation: fade 1s; }
        .slide-name { font-weight: bold; color: #ffc831; margin-bottom: 10px; font-size: 0.9rem; height: 1.2em; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        /* --- ส่วนที่เพิ่มใหม่: ตารางแบ่งเรทระดับ --- */
        .rate-summary { width: 100%; margin: 15px 0; border-top: 1px solid #333; padding-top: 15px; }
        .rate-summary-row { display: flex; justify-content: space-between; padding: 5px 20px; font-size: 0.85rem; }
        .color-ssr { color: #ff0000; font-weight: bold; }
        .color-sr { color: #ffc831; font-weight: bold; }

        /* --- Buttons --- */
        .btn-pull { padding: 12px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; border: none; background: #ffc831; color: #000; transition: 0.3s; margin: 5px; font-size: 0.9rem; }
        .btn-detail { background: none; border: 1px solid #555; color: #aaa; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; width: 100%; }
        .btn-detail:hover { color: #fff; border-color: #fff; }

        /* --- Modal --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #111; margin: 5% auto; padding: 20px; border: 1px solid #333; width: 90%; max-width: 500px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .close-modal { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .rate-table { width: 100%; border-collapse: collapse; text-align: left; }
        .rate-table th { color: #ffc831; padding: 10px; font-size: 0.9rem; border-bottom: 2px solid #222; }
        .rate-table td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .rate-img { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 10px; }
        .tag-ssr { background: #ff0000; color: #fff; padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; }
        .tag-sr { background: #ffc831; color: #000; padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="rateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; color:#ffc831;">รายละเอียดการ์ดในตู้</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <table class="rate-table">
                <thead>
                    <tr>
                        <th>การ์ด</th>
                        <th>ระดับ</th>
                        <th style="text-align:right;">เรทออก</th>
                    </tr>
                </thead>
                <tbody id="rate-list-body"></tbody>
            </table>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="btn-nav">🏠 เมนูหลัก</a>
            <a href="Banner Selection.html" class="btn-nav">ย้อนกลับ</a>
            <a href="collection.html" class="btn-nav" style="border-color: #fff; color: #fff;">📖 สมุดสะสม</a>
        </div>
        <div class="points-box">🪙 <span id="balance">0</span></div>
    </nav>

    <div class="container">
        <div class="main-layout">
            
            <div class="gacha-box" id="gacha-box">
                <div class="pity-area">
                    <div class="pity-container">
                        <div id="pity-bar-ssr" class="pity-bar-ssr"></div>
                    </div>
                    <div class="pity-label">สะสมการันตี SSR: <b id="pity-text-ssr" style="color: #ff0000;">0 / 100</b></div>
                </div>

                <div id="display" class="card-grid"></div>

                <div class="btn-group">
                    <button class="btn-pull" onclick="pull(5)">สุ่ม 5 ใบ (100)</button>
                    <button class="btn-pull" style="background: linear-gradient(90deg, #ffc831, #ff0000); color: white;" onclick="pull(10)">สุ่ม 10 ใบ (500) 🔥</button>
                </div>
            </div>

            <div class="preview-box">
                <div style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">PICK UP CARDS</div>
                <div id="slide-name" class="slide-name"></div>
                <div class="slideshow-container" id="slideshow"></div>
                
                <div class="rate-summary">
                    <div class="rate-summary-row">
                        <span class="color-ssr">ระดับ SSR</span>
                        <span id="total-ssr-rate">0%</span>
                    </div>
                    <div class="rate-summary-row">
                        <span class="color-sr">ระดับ SR</span>
                        <span id="total-sr-rate">0%</span>
                    </div>
                </div>

                <button class="btn-detail" onclick="openModal()">ℹ️ ดูรายละเอียดทั้งหมด</button>
            </div>

        </div>
    </div>

    <script>
        const allCards = [
            { rarity: "SSR", name: "Dark Cacao Cookie", rate: 1, img: "https://cookierunbraverse.com/data/en_storage/-UZDTp8mPp0-5ubqd_qcIg.webp" },
            { rarity: "SSR", name: "Black Sapphire Cookie", rate: 1, img: "https://cookierunbraverse.com/data/en_storage/p52hMJ6jTXHZwqfEppFsGQ.webp" },
            { rarity: "SSR", name: "Candy Apple Cookie", rate: 1, img: "https://cookierunbraverse.com/data/en_storage/W8TEwa3kZkK9SBB3t_lxRA.webp" },
            { rarity: "SR", name: "Candy Apple Cookie", rate: 32.3, img: "https://cookierunbraverse.com/data/en_storage/yrWULauHM6gqu9JVK0UZWA.webp" },
            { rarity: "SR", name: "Black Sapphire Cookie", rate: 32.3, img: "https://cookierunbraverse.com/data/en_storage/bDXFDM2gzk5tgDBzFOxZig.webp" },
            { rarity: "SR", name: "Dark Cacao Cookie", rate: 32.4, img: "https://cookierunbraverse.com/data/en_storage/nq-PxImd2X-hB-uLDmYKOA.webp" }
        ];

        function checkAuth() {
            const user = localStorage.getItem("currentUser") || localStorage.getItem("registeredUser");
            if (!user) { window.location.href = "login.html"; return null; }
            return user;
        }
        const currentUser = checkAuth();

        function getPoints() { return parseInt(localStorage.getItem(`points_${currentUser}`)) || 0; }
        function setPoints(val) {
            localStorage.setItem(`points_${currentUser}`, val);
            document.getElementById("balance").innerText = val.toLocaleString();
        }

        let pitySSR = parseInt(localStorage.getItem(`pitySSR_${currentUser}`)) || 0;

        function updateUI() {
            document.getElementById("balance").innerText = getPoints().toLocaleString();
            const progress = (Math.min(pitySSR, 100) / 100 * 100);
            document.getElementById("pity-bar-ssr").style.width = progress + "%";
            document.getElementById("pity-text-ssr").innerText = `${pitySSR} / 100`;
            localStorage.setItem(`pitySSR_${currentUser}`, pitySSR);

            // คำนวณเรทรวมแต่ละระดับ
            const ssrRate = allCards.filter(c => c.rarity === "SSR").reduce((sum, c) => sum + c.rate, 0);
            const srRate = allCards.filter(c => c.rarity === "SR").reduce((sum, c) => sum + c.rate, 0);
            
            document.getElementById("total-ssr-rate").innerText = ssrRate.toFixed(1) + "%";
            document.getElementById("total-sr-rate").innerText = srRate.toFixed(1) + "%";
        }

        let slideIndex = 0;
        function initSlideshow() {
            const container = document.getElementById("slideshow");
            const pickupCards = allCards.filter(c => c.rarity === "SSR");
            
            pickupCards.forEach((card, index) => {
                const img = document.createElement("img");
                img.src = card.img;
                img.className = "slide-img";
                container.appendChild(img);
            });
            showSlides();
        }

        function showSlides() {
            let slides = document.getElementsByClassName("slide-img");
            let nameText = document.getElementById("slide-name");
            const pickupCards = allCards.filter(c => c.rarity === "SSR");

            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            
            if(slides.length > 0) {
                slides[slideIndex-1].style.display = "block";
                nameText.innerText = pickupCards[slideIndex-1].name;
            }
            setTimeout(showSlides, 3000);
        }

        function openModal() {
            const tbody = document.getElementById("rate-list-body");
            tbody.innerHTML = allCards.map(card => `
                <tr>
                    <td><img src="${card.img}" class="rate-img"> ${card.name}</td>
                    <td><span class="tag-${card.rarity.toLowerCase()}">${card.rarity}</span></td>
                    <td style="text-align:right;">${card.rate}%</td>
                </tr>
            `).join('');
            document.getElementById("rateModal").style.display = "block";
        }
        function closeModal() { document.getElementById("rateModal").style.display = "none"; }

        function pull(amount) {
            const cost = (amount === 10 ? 500 : 100);
            let points = getPoints();
            if (points < cost) return alert("แต้มไม่พอ!");
            
            setPoints(points - cost);
            const display = document.getElementById("display");
            display.innerHTML = "";
            
            let collection = JSON.parse(localStorage.getItem("myCollection")) || [];
            const totalWeight = allCards.reduce((sum, card) => sum + card.rate, 0);

            for (let i = 0; i < amount; i++) {
                pitySSR++;
                let winCard = null;

                if (pitySSR >= 100) {
                    const ssrs = allCards.filter(c => c.rarity === "SSR");
                    winCard = ssrs[Math.floor(Math.random() * ssrs.length)];
                    pitySSR = 0;
                } else {
                    let rand = Math.random() * totalWeight;
                    let cum = 0;
                    for (const card of allCards) {
                        cum += card.rate;
                        if (rand <= cum) { winCard = card; break; }
                    }
                }

                if (winCard.rarity === "SSR") {
                    pitySSR = 0;
                    document.getElementById("gacha-box").classList.add("shake");
                    setTimeout(() => document.getElementById("gacha-box").classList.remove("shake"), 500);
                }

                collection.push({ 
                    name: winCard.name, 
                    rarity: winCard.rarity, 
                    img: winCard.img,
                    date: new Date().toLocaleDateString() 
                });

                const cardEl = document.createElement("div");
                cardEl.className = `card card-${winCard.rarity}`;
                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"><img src="${winCard.img}"></div>
                        <div class="card-back"></div>
                    </div>
                    <div class="card-info">
                        <div style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${winCard.name}</div>
                        <div style="color:${winCard.rarity==='SSR'?'#ff0000':'#ffc831'}">${winCard.rarity}</div>
                    </div>`;
                display.appendChild(cardEl);
                setTimeout(() => cardEl.classList.add("revealed"), i * 150);
            }
            
            localStorage.setItem("myCollection", JSON.stringify(collection));
            updateUI();
        }

        window.onload = () => {
            updateUI();
            initSlideshow();
        };
    </script>
</body>
</html>
