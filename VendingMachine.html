<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD VENDING MACHINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --machine-bg: #2c3e50;
            --screen-color: #2ecc71;
            --accent: #e74c3c;
        }
        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.8);
        }

        /* --- Vending Machine Structure --- */
        .vending-container {
            width: 350px;
            background: var(--machine-bg);
            border: 10px solid #34495e;
            border-radius: 20px;
            margin-top: 30px;
            padding: 20px;
            box-shadow: 0 20px 0 #1a252f;
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 15px;
        }

        /* Glass Area for Cards */
        .display-window {
            background: #1e272e;
            height: 350px;
            border-radius: 10px;
            border: 4px solid #000;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            padding: 10px;
            gap: 10px;
        }

        .item-slot {
            border-bottom: 3px solid #57606f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 5px;
        }
        .card-pack {
            width: 60px;
            height: 90px;
            background: linear-gradient(135deg, #ff9f43, #ee5253);
            border-radius: 5px;
            border: 2px solid white;
            transition: transform 0.5s ease-in;
        }
        .slot-id { font-size: 12px; color: #aaa; margin-top: 5px; }

        /* Control Side */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .digital-screen {
            background: #000;
            height: 50px;
            border: 2px solid #57606f;
            color: var(--screen-color);
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--screen-color);
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
        }
        .num-btn {
            background: #ecf0f1;
            color: #2c3e50;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .num-btn:active { background: #bdc3c7; }

        /* Delivery Port (ช่องรับของ) */
        .delivery-port {
            grid-column: span 2;
            height: 80px;
            background: #1a1a1a;
            border: 5px inset #2c3e50;
            margin-top: 20px;
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .dropped-card {
            width: 50px;
            height: 70px;
            position: absolute;
            top: -150px; /* ซ่อนไว้ข้างบนก่อนหล่น */
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Result Popup */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card-showcase {
            width: 240px;
            border-radius: 15px;
            border: 5px solid gold;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 10px gold; } to { box-shadow: 0 0 30px gold; } }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="location.href='index.html'" style="background:none; border:none; color:white; cursor:pointer;">🏠 Home</button>
        <div style="color: #f1c40f;">💎 <span id="user-diamonds">0</span></div>
    </div>

    <h2 style="margin: 20px 0 5px;">🏧 Card Vending Machine</h2>
    <p style="color: #7f8c8d; font-size: 0.8rem;">เลือกหมายเลขเพื่อกดการ์ด (100 💎)</p>

    <div class="vending-container">
        <div class="display-window">
            <div class="item-slot"><div class="card-pack" id="pack-A1"></div><div class="slot-id">A1</div></div>
            <div class="item-slot"><div class="card-pack" id="pack-A2" style="filter: hue-rotate(90deg);"></div><div class="slot-id">A2</div></div>
            <div class="item-slot"><div class="card-pack" id="pack-B1" style="filter: hue-rotate(180deg);"></div><div class="slot-id">B1</div></div>
            <div class="item-slot"><div class="card-pack" id="pack-B2" style="filter: hue-rotate(270deg);"></div><div class="slot-id">B2</div></div>
        </div>

        <div class="control-panel">
            <div class="digital-screen" id="display">READY</div>
            <div class="numpad">
                <button class="num-btn" onclick="press('A')">A</button>
                <button class="num-btn" onclick="press('B')">B</button>
                <button class="num-btn" onclick="press('1')">1</button>
                <button class="num-btn" onclick="press('2')">2</button>
            </div>
            <button onclick="buyCard()" style="background: var(--accent); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">PUSH</button>
        </div>

        <div class="delivery-port">
            <div id="drop-animation" class="card-pack dropped-card"></div>
            <p id="take-label" style="display:none; color:#2ecc71; font-size:12px;">คลิกเพื่อรับของ!</p>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <h2 id="rarity-text">NEW CARD!</h2>
        <img id="resultImg" src="" class="card-showcase">
        <h3 id="resultName">Card Name</h3>
        <button onclick="closeModal()" style="margin-top:20px; padding:10px 40px; border-radius:25px; border:none; background:white; font-weight:bold;">ใส่คลังการ์ด</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- ใส่ Config Firebase ของคุณตรงนี้ ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        projectId: "YOUR_PROJECT_ID",
        // ... อื่นๆ
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let diamonds = 0;
    let selection = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                diamonds = snap.data()?.diamonds || 0;
                document.getElementById('user-diamonds').innerText = diamonds;
            });
        }
    });

    // ระบบปุ่มกด
    window.press = (val) => {
        if (selection.length < 2) {
            selection += val;
            document.getElementById('display').innerText = selection;
        }
    };

    window.buyCard = async () => {
        if (selection.length < 2) return alert("กรุณากดรหัสสินค้า (เช่น A1)");
        if (diamonds < 100) return alert("เพชรไม่พอ!");

        document.getElementById('display').innerText = "WAIT...";
        
        // สุ่มการ์ด
        const pool = [
            { name: "Pikachu VMAX", rarity: "SUR", img: "https://images.pokemontcg.io/swsh4/44_hires.png" },
            { name: "Charizard", rarity: "EXR", img: "https://images.pokemontcg.io/swsh9/18_hires.png" }
        ];
        const card = pool[Math.floor(Math.random() * pool.length)];

        // Animation การหล่น
        const dropBox = document.getElementById('drop-animation');
        dropBox.style.opacity = "1";
        dropBox.style.top = "10px";
        
        setTimeout(() => {
            document.getElementById('take-label').style.display = "block";
            dropBox.onclick = () => showCard(card);
        }, 700);
    };

    async function showCard(card) {
        // อัปเดต Firebase
        await updateDoc(doc(db, "users", currentUID), {
            diamonds: increment(-100),
            collection: arrayUnion({ ...card, date: new Date().toISOString() })
        });

        document.getElementById('resultImg').src = card.img;
        document.getElementById('resultName').innerText = card.name;
        document.getElementById('resultModal').style.display = "flex";
    }

    window.closeModal = () => {
        location.reload(); // รีเซ็ตหน้าตู้
    };
</script>
</body>
</html>
