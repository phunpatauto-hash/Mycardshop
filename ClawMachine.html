<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY GASHAPON - หมุนลุ้นโชค</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --machine-red: #e74c3c;
            --machine-dark: #c0392b;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- UI Header --- */
        .header {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .diamond-display {
            background: #000;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #ffc831;
            font-weight: bold;
        }

        /* --- Gashapon Machine Structure --- */
        .gasha-container {
            position: relative;
            width: 300px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* โดมแก้วใส่บอล */
        .glass-dome {
            width: 260px;
            height: 260px;
            background: var(--glass-bg);
            border-radius: 50%;
            border: 8px solid #ddd;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.2);
            z-index: 2;
        }

        /* กองลูกบอลในตู้ (จำลอง) */
        .balls-pile {
            position: absolute;
            bottom: 10px;
            left: 20px;
            right: 20px;
            height: 100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .ball-static {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.2);
        }

        /* ตัวเครื่องส่วนล่าง */
        .machine-body {
            width: 280px;
            height: 220px;
            background: var(--machine-red);
            border-radius: 0 0 20px 20px;
            margin-top: -130px; /* ให้เกยขึ้นไปหาโดมแก้ว */
            border: 8px solid var(--machine-dark);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 140px; /* เว้นที่ให้โดมแก้ว */
            box-sizing: border-box;
            z-index: 1;
        }

        /* คันโยกหมุน (Knob) */
        .knob-container {
            width: 80px;
            height: 80px;
            background: #ddd;
            border-radius: 50%;
            border: 4px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .knob-handle {
            width: 60px;
            height: 15px;
            background: #555;
            border-radius: 10px;
            position: relative;
        }

        /* แอนิเมชันหมุนคันโยก */
        .rotate-knob {
            animation: rotateKnobAnimate 1s ease-out;
        }

        @keyframes rotateKnobAnimate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ช่องปล่อยบอล */
        .exit-port {
            width: 80px;
            height: 60px;
            background: #222;
            border-radius: 10px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            border: 4px inset var(--machine-dark);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ลูกบอลที่กลิ้งตกลงมา */
        .falling-ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: -50px;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        /* ผลลัพธ์ Popup */
        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-showcase {
            width: 220px;
            border-radius: 15px;
            border: 4px solid #ffc831;
            box-shadow: 0 0 25px #ffc831;
            margin-bottom: 20px;
            animation: ballOpen 0.6s ease-out;
        }

        @keyframes ballOpen {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="Collection.html" style="color: white; text-decoration: none;">⬅️ กลับคอลเลกชัน</a>
        <div class="diamond-display">💎 <span id="user-diamonds">0</span></div>
    </div>

    <h2 style="color: #ffc831; text-shadow: 0 0 10px #ffc831; margin-top: 30px;">🔴 LUCKY GASHAPON</h2>
    <p style="font-size: 0.8rem; margin: -10px 0 30px; color: #bbb;">ใช้ 100 💎 ต่อการหมุน 1 ครั้ง</p>

    <div class="gasha-container">
        <div id="fallingBall" class="falling-ball"></div>

        <div class="glass-dome">
            <div class="balls-pile">
                <div class="ball-static" style="background: #ff4757; transform: translateY(-5px);"></div>
                <div class="ball-static" style="background: #1e90ff;"></div>
                <div class="ball-static" style="background: #2ed573; transform: translateY(-8px);"></div>
                <div class="ball-static" style="background: #ffa502;"></div>
                <div class="ball-static" style="background: #eccc68; transform: translateY(-3px);"></div>
                <div class="ball-static" style="background: #ff4757;"></div>
                <div class="ball-static" style="background: #1e90ff; transform: translateY(-6px);"></div>
            </div>
        </div>

        <div class="machine-body">
            <div id="knob" class="knob-container" onclick="startGasha()">
                <div class="knob-handle"></div>
            </div>
            <div class="exit-port">
                <p style="font-size: 10px; color: #555; margin: 0;">EXIT</p>
            </div>
        </div>
    </div>

    <div style="text-align: center; font-size: 0.7rem; color: #ced4da; margin-top: 20px;">
        หมุนคันโยกเพื่อลุ้นรับการ์ดระดับ EXR - SUR!
    </div>

    <div id="resultOverlay" class="result-overlay">
        <h1 style="color: #ffc831; margin-bottom: 10px;">คุณได้รับ!</h1>
        <img id="resultImg" src="" class="card-showcase">
        <h3 id="resultName" style="margin: 5px 0;">Card Name</h3>
        <p id="resultRarity" style="font-weight: bold; margin-top: 0;"></p>
        <button onclick="closeResult()" style="padding: 10px 40px; border-radius: 20px; border: none; background: #2ed573; color: white; cursor: pointer; font-weight: bold; margin-top: 20px;">เก็บเข้าคลัง</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- ตั้งค่า Firebase (ใช้ Config เดิมของคุณ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let userDiamonds = 0;
    const GASHA_COST = 100;
    let isPlaying = false;

    // --- ข้อมูลการ์ดในตู้กาชา (ตัวอย่าง) ---
    const gashaPool = [
        { name: "Mega Charizard", rarity: "EXR", img: "https://images.pokemontcg.io/xy12/13_hires.png" },
        { name: "Golden Pikachu", rarity: "SUR", img: "https://images.pokemontcg.io/base1/58_hires.png" },
        { name: "Ancient Dragon", rarity: "SEC", img: "https://images.pokemontcg.io/sm12/236_hires.png" }
    ];

    // สีลูกบอลกาชา
    const ballColors = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#eccc68"];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    userDiamonds = snap.data().diamonds || 0;
                    document.getElementById("user-diamonds").innerText = userDiamonds.toLocaleString();
                }
            });
        } else { window.location.href = 'login.html'; }
    });

    window.startGasha = async () => {
        if (isPlaying) return;
        if (userDiamonds < GASHA_COST) return alert("เพชรไม่พอ!");

        isPlaying = true;
        const knob = document.getElementById("knob");
        const fallingBall = document.getElementById("fallingBall");

        // 1. แอนิเมชันหมุนคันโยก
        knob.classList.add("rotate-knob");

        // สุ่มสีลูกบอลที่ตกลงมา
        const randomBallColor = ballColors[Math.floor(Math.random() * ballColors.length)];
        fallingBall.style.background = `radial-gradient(circle at 30% 30%, ${randomBallColor}, #000)`;
        fallingBall.style.border = "2px solid rgba(255,255,255,0.3)";

        setTimeout(() => {
            // 2. ลูกบอลเริ่มกลิ้งตกลงมา
            fallingBall.style.opacity = "1";
            fallingBall.style.top = "280px"; // ตำแหน่งช่องทางออก
            fallingBall.style.transform = "rotate(360deg)";

            setTimeout(async () => {
                // 3. เตรียมผลลัพธ์ (สุ่มการ์ด)
                const winCard = gashaPool[Math.floor(Math.random() * gashaPool.length)];
                
                // 4. แสดงผลลัพธ์
                showResult(winCard);

                // รีเซ็ตสถานะตู้
                knob.classList.remove("rotate-knob");
                fallingBall.style.opacity = "0";
                fallingBall.style.top = "-50px";
                fallingBall.style.transform = "rotate(0deg)";
            }, 1000);
        }, 1000); // รอให้คันโยกหมุนเสร็จก่อนบอลตก
    };

    async function showResult(card) {
        // หักเงินและเพิ่มการ์ดลง Firebase
        await updateDoc(doc(db, "users", currentUID), {
            diamonds: increment(-GASHA_COST),
            collection: arrayUnion({
                ...card,
                level: 1,
                stars: 0,
                obtainedDate: new Date().toISOString()
            })
        });

        document.getElementById("resultImg").src = card.img;
        document.getElementById("resultName").innerText = card.name;
        document.getElementById("resultRarity").innerText = "Grade: " + card.rarity;
        document.getElementById("resultOverlay").style.display = "flex";
    }

    window.closeResult = () => {
        document.getElementById("resultOverlay").style.display = "none";
        isPlaying = false;
    };
</script>
</body>
</html>
