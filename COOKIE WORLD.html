<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOKIE WORLD - LIVE IMAGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
        }

        #game-screen {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* พื้นหลังดึงจาก URL โดยตรง */
        #scrolling-bg {
            width: 5000px; /* ความกว้างจำลอง */
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            background-image: url('https://www.shutterstock.com/shutterstock/videos/1109982421/thumb/1.jpg?ip=x480');
            background-size: cover;
            background-position: center bottom;
            background-repeat: repeat-x;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        /* ตัวละคร */
        #player {
            position: absolute;
            width: 110px;
            bottom: 120px; /* ปรับระดับให้ยืนบนทางเดินในรูปพอดี */
            z-index: 100;
            transition: left 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
        }

        #player img {
            width: 100%;
            border: 3px solid gold;
            border-radius: 12px;
            background: white;
        }

        .flip-char { transform: scaleX(-1); }

        /* UI */
        .header {
            height: 70px;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-bottom: 2px solid gold;
            z-index: 500;
            color: gold;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="header">COOKIE CITY EXPLORER</div>

    <div id="scrolling-bg">
        <div id="player">
            <img src="https://via.placeholder.com/100x150?text=COOKIE" alt="player">
            <div style="background:rgba(0,0,0,0.7); color:white; font-size:12px; padding:2px; border-radius:4px; margin-top:5px;">YOU</div>
        </div>
    </div>
</div>

<script>
    const bg = document.getElementById('scrolling-bg');
    const player = document.getElementById('player');
    const screen = document.getElementById('game-screen');
    
    let currentX = 500; // ตำแหน่งเริ่มต้น

    screen.onclick = (e) => {
        const screenW = window.innerWidth;
        const clickXInWorld = e.clientX - bg.getBoundingClientRect().left;

        // 1. หันหน้าตัวละคร
        if (e.clientX < (player.getBoundingClientRect().left + 55)) {
            player.classList.add('flip-char');
        } else {
            player.classList.remove('flip-char');
        }

        // 2. เคลื่อนที่ตัวละคร
        currentX = clickXInWorld;
        player.style.left = (currentX - 55) + 'px';

        // 3. เลื่อนกล้องตามตัวละคร (Camera Follow)
        let camOffset = (screenW / 2) - currentX;
        
        // จำกัดไม่ให้เห็นขอบดำ
        if (camOffset > 0) camOffset = 0;
        if (camOffset < -(5000 - screenW)) camOffset = -(5000 - screenW);

        bg.style.transform = `translateX(${camOffset}px)`;
    };
</script>

</body>
</html>
