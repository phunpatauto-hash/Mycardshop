<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOKIE PARK ADVENTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background: #2d4c1e; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .navbar { 
            background-color: rgba(20, 40, 10, 0.9); 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #a4c639; 
            height: 80px; 
            z-index: 1000;
        }

        #game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* ตรวจสอบว่าไฟล์ 1.jpg อยู่ในโฟลเดอร์เดียวกับไฟล์นี้ */
        #city-map {
            width: 5000px; 
            height: 100%;
            background-image: url('1.jpg'); /* ตรวจสอบชื่อไฟล์ให้ตรงกัน */
            background-color: #4CAF50; /* สีสำรองกรณีรูปไม่ขึ้น */
            background-size: cover;
            background-position: bottom;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: transform 0.6s ease-out;
            will-change: transform;
        }

        .card-avatar {
            position: absolute;
            width: 100px; 
            bottom: 80px; 
            transition: left 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            z-index: 50;
            text-align: center;
        }

        .card-avatar img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 3px solid #fff;
            border-radius: 10px;
        }

        .facing-left img { transform: scaleX(-1); }

        #selection-menu {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 10px;
            background: rgba(0, 0, 0, 0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #a4c639;
            z-index: 1000;
        }
        .mini-card-select {
            width: 50px; height: 75px; object-fit: cover;
            border-radius: 6px; cursor: pointer; opacity: 0.5;
        }
        .mini-card-select.active { opacity: 1; border: 2px solid #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color:#a4c639; font-weight:bold;">COOKIE PARK ADVENTURE</div>
        <button onclick="window.history.back()" style="color:white; background:#388e3c; border:none; padding:8px 20px; border-radius:10px; cursor:pointer;">BACK</button>
    </nav>

    <div id="game-area">
        <div id="city-map">
            <div id="player" class="card-avatar">
                <img id="player-img" src="" alt="Player">
                <div style="background: rgba(0,0,0,0.7); font-size: 12px; margin-top:5px;" id="player-name"></div>
            </div>
        </div>
    </div>

    <div id="selection-menu"></div>

    <script>
        const map = document.getElementById('city-map');
        const player = document.getElementById('player');
        const gameArea = document.getElementById('game-area');
        let currentPlayerX = 500;

        // ฟังก์ชันคลิกเพื่อเดิน
        gameArea.onclick = (e) => {
            const rect = map.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            
            if (clickX < currentPlayerX) player.classList.add('facing-left');
            else player.classList.remove('facing-left');

            currentPlayerX = clickX;
            player.style.left = (currentPlayerX - 50) + 'px';
            
            // เลื่อนกล้องตาม
            const viewW = gameArea.offsetWidth;
            let offsetX = (viewW / 2) - currentPlayerX;
            offsetX = Math.min(0, Math.max(viewW - 5000, offsetX));
            map.style.transform = `translateX(${offsetX}px)`;
        };

        // แสดงข้อความเตือนถ้าโหลดรูปไม่สำเร็จ
        const imgTest = new Image();
        imgTest.src = '1.jpg';
        imgTest.onerror = () => {
            alert("ไม่พบไฟล์ภาพ '1.jpg' กรุณาตรวจสอบว่าชื่อไฟล์ถูกต้องและอยู่ในโฟลเดอร์เดียวกันกับโค้ดนี้ครับ");
        };
    </script>
</body>
</html>
