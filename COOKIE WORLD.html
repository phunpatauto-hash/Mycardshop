<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOKIE PARK - FIX LOAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background: #1a1a1a; 
            overflow: hidden; 
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ส่วนแสดงผลแผนที่ */
        #viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #2d4c1e; /* สีสำรองถ้าภาพ 1.jpg ไม่โหลด */
        }

        #world-map {
            width: 5000px; /* ความกว้างของสวนสาธารณะ */
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            /* ดึงภาพ 1.jpg มาใช้ */
            background-image: url('1.jpg'); 
            background-size: cover;
            background-position: bottom center;
            background-repeat: no-repeat;
            transition: transform 0.5s ease-out;
            will-change: transform;
        }

        /* ตัวละคร */
        .character {
            position: absolute;
            width: 100px;
            bottom: 15%; /* ปรับให้ยืนบนทางเดินในภาพ */
            left: 500px;
            z-index: 100;
            transition: left 0.6s ease-out;
            text-align: center;
        }

        .character img {
            width: 100%;
            border: 4px solid white;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .flip { transform: scaleX(-1); }

        /* UI */
        .controls-hint {
            position: fixed;
            top: 100px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <nav style="height:70px; background:#222; display:flex; align-items:center; padding:0 20px; border-bottom:2px solid #a4c639;">
        <span style="color:#a4c639; font-weight:bold;">PARK EXPLORER</span>
    </nav>

    <div id="viewport">
        <div id="world-map">
            <div id="player" class="character">
                <img id="p-img" src="https://via.placeholder.com/100x150?text=Cookie" alt="player">
                <div style="background:rgba(0,0,0,0.8); margin-top:5px; border-radius:5px; font-size:12px;">YOU</div>
            </div>
        </div>
        <div class="controls-hint">คลิกที่พื้นเพื่อเดินสำรวจ</div>
    </div>
</div>

<script>
    const worldMap = document.getElementById('world-map');
    const player = document.getElementById('player');
    const viewport = document.getElementById('viewport');
    
    let pX = 500; // ตำแหน่งเริ่มต้น

    // ตรวจสอบไฟล์ภาพ 1.jpg
    const checkImg = new Image();
    checkImg.src = '1.jpg';
    checkImg.onerror = () => {
        console.error("หาไฟล์ 1.jpg ไม่เจอ!");
        document.body.insertAdjacentHTML('beforeend', `
            <div style="position:fixed; top:80px; right:20px; background:red; color:white; padding:10px; z-index:9999;">
                ⚠️ ไม่พบไฟล์ '1.jpg' ในโฟลเดอร์เดียวกับ HTML
            </div>
        `);
    };

    viewport.onclick = (e) => {
        const rect = worldMap.getBoundingClientRect();
        const clickX = e.clientX - rect.left;

        // หันหน้า
        if (clickX < pX) player.classList.add('flip');
        else player.classList.remove('flip');

        // เดิน
        pX = clickX;
        player.style.left = (pX - 50) + 'px';

        // กล้องเลื่อนตาม
        const viewW = viewport.offsetWidth;
        let camX = (viewW / 2) - pX;
        
        // ล็อคขอบแมพ
        if (camX > 0) camX = 0;
        if (camX < -(5000 - viewW)) camX = -(5000 - viewW);

        worldMap.style.transform = `translateX(${camX}px)`;
    };
</script>
</body>
</html>
