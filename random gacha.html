<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Gacha System - Evolution (Cloud Connected)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- Style คงเดิมของคุณทั้งหมด --- */
        .modal-card-img { width: 45px; height: 65px; object-fit: cover; border-radius: 5px; border: 1px solid #444; display: block; }
        #rate-list-body tr { border-bottom: 1px solid #222; }
        #rate-list-body td { padding: 10px 5px; vertical-align: middle; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: #050505; color: white; text-align: center; overflow-x: hidden; }
        .navbar { background-color: rgba(15, 15, 15, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #1a1a1a; color: #ffc831; border: 1px solid #ffc831; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-nav:hover { background: #ffc831; color: #000; }
        .points-box { background: #000; color: #ffc831; border: 1px solid #ffc831; padding: 8px 20px; border-radius: 25px; font-weight: bold; }
        .diamond-box { background: #000; color: #00d4ff; border: 1px solid #00d4ff; padding: 8px 20px; border-radius: 25px; font-weight: bold; margin-left: 10px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .gacha-box { flex: 2; background-color: #111; border-radius: 30px; padding: 30px; border: 1px solid #222; min-height: 500px; position: relative; background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); min-width: 320px; }
        .preview-box { flex: 0.7; background: #111; border-radius: 30px; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; align-items: center; min-width: 250px; min-height: 600px; }
        .scroll-window { width: 100%; height: 320px; overflow: hidden; position: relative; margin: 10px 0; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        .slide-track-v { display: flex; flex-direction: column; gap: 15px; animation: scroll-up 20s linear infinite; }
        @keyframes scroll-up { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .preview-card-item { width: 140px; margin: 0 auto; border-radius: 10px; border: 2px solid #222; overflow: hidden; }
        .preview-card-item img { width: 100%; display: block; }
        .quick-rate-table { width: 100%; margin: 15px 0; font-size: 0.85rem; border-top: 1px solid #333; padding-top: 15px; }
        .rate-row { display: flex; justify-content: space-between; padding: 5px 15px; border-bottom: 1px solid #222; }
        .rate-label { font-weight: bold; }
        .color-exr { color: #00d4ff; text-shadow: 0 0 5px #00d4ff; }
        .color-sec { color: #a020f0; text-shadow: 0 0 5px #a020f0; }
        .color-ssr { color: #ff4444; }
        .color-sr { color: #ffc831; }
        .color-uc { color: #aaaaaa; }
        .pity-area { max-width: 500px; margin: 0 auto 20px auto; display: flex; flex-direction: column; gap: 10px; }
        .pity-container { background: #1a1a1a; height: 10px; border-radius: 10px; border: 1px solid #333; overflow: hidden; position: relative; }
        .pity-bar-sec { height: 100%; background: linear-gradient(90deg, #a020f0, #ff00ff); width: 0%; transition: 0.5s; box-shadow: 0 0 10px #a020f0; }
        .pity-bar-exr { height: 100%; background: linear-gradient(90deg, #ffffff, #00d4ff); width: 0%; transition: 0.5s; box-shadow: 0 0 15px #fff; }
        .pity-label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-bottom: 30px; justify-items: center; }
        .card { width: 130px; position: relative; perspective: 1000px; }
        .card-inner { width: 100%; aspect-ratio: 2/3; position: relative; transform-style: preserve-3d; transition: transform 0.8s; transform: rotateY(180deg); }
        .card.revealed .card-inner { transform: rotateY(0deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 12px; border: 2px solid #333; overflow: hidden; }
        .card-back { background: #222; transform: rotateY(180deg); }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 5% auto; padding: 20px; width: 95%; max-width: 500px; border-radius: 20px; text-align: left; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .btn-pull { padding: 12px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; border: none; background: #ffc831; color: #000; margin: 5px; }
        .btn-pull:disabled { background: #444; color: #888; }
        #cutscene-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .exr-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; animation: flash-out 0.8s forwards; }
        @keyframes flash-out { 0% { opacity: 1; } 100% { opacity: 0; } }
        .shake-heavy { animation: shake-heavy 0.8s both; }
        @keyframes shake-heavy { 0%, 100% { transform: translate(0,0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -3px); } 20%, 40%, 60%, 80% { transform: translate(5px, 3px); } }
    </style>
</head>
<body id="body-main">

    <div id="cutscene-overlay"><div class="cutscene-text" style="font-size:3rem; font-weight:bold; text-shadow: 0 0 20px #ffc831; color: white;">EXR EVOLUTION</div></div>

    <div id="rateModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:24px; color:#aaa;" onclick="closeModal()">&times;</span>
            <h3 style="color:#ffc831; margin-top: 0;">รายชื่อการ์ดและเรทแยกใบ</h3>
            <table style="width:100%; border-collapse: collapse;" id="rate-list-body"></table>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="btn-nav">🏠 เมนูหลัก</a>
            <a href="collection.html" class="btn-nav" style="border-color: #fff; color: #fff;">📖 สมุดสะสม</a>
        </div>
        <div style="display: flex; align-items: center;">
            <div class="points-box" style="margin-left: 10px;">🪙 <span id="balance">0</span></div>
            <div class="diamond-box">💎 <span id="user-diamonds">0</span></div>
        </div>
    </nav>

    <div class="container">
        <div class="main-layout">
            <div class="gacha-box">
                <div class="pity-area">
                    <div class="pity-label">การันตี SEC: <b id="pity-text-sec">0 / 550</b></div>
                    <div class="pity-container"><div id="pity-bar-sec" class="pity-bar-sec"></div></div>
                    <div class="pity-label">การันตี EXR: <b id="pity-text-exr">0 / 900</b></div>
                    <div class="pity-container"><div id="pity-bar-exr" class="pity-bar-exr"></div></div>
                </div>
                <div id="display" class="card-grid"></div>
                <div class="btn-group">
                    <button id="pull-5" class="btn-pull" onclick="pull(5)">สุ่ม 5 ใบ (500) | +10 EXP</button>
                    <button id="pull-10" class="btn-pull" style="background: #ff00ff; color: white;" onclick="pull(10)">สุ่ม 10 ใบ (1500) | +50 EXP</button>
                    <button id="pull-50" class="btn-pull" style="background: #00d4ff; color: white;" onclick="pull(50)">สุ่ม 50 ใบ (3000) | +300 EXP</button>
                </div>
            </div>
            
            <div class="preview-box">
                <div style="font-size: 0.8rem; color: #ffc831; font-weight: bold; margin-bottom: 5px;">RARE PREVIEW</div>
                <div class="scroll-window"><div class="slide-track-v" id="v-track"></div></div>
                
                <div class="quick-rate-table">
                    <div style="font-size: 0.7rem; color: #666; margin-bottom: 8px;">RATE BY RARITY</div>
                    <div class="rate-row"><span class="rate-label color-exr">EXR (Extreme)</span><span id="rate-exr">0.2%</span></div>
                    <div class="rate-row"><span class="rate-label color-sec">SEC (Secret)</span><span id="rate-sec">2.0%</span></div>
                    <div class="rate-row"><span class="rate-label color-ssr">SSR</span><span id="rate-ssr">8.0%</span></div>
                    <div class="rate-row"><span class="rate-label color-sr">SR</span><span id="rate-sr">40.0%</span></div>
                    <div class="rate-row"><span class="rate-label color-uc">U / C (Normal)</span><span id="rate-uc">49.8%</span></div>
                </div>
                <button class="btn-nav" style="width: 100%; font-size: 0.8rem;" onclick="openModal()">ℹ️ ดูเรทแยกใบ</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc, arrayUnion, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userData = null;
    let currentUserUID = null;
    let isPulling = false;

    const allCards = [
        { id: 1, rarity: "EXR", name: "Golden Cheese", rate: 0.01, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS8_027@2.png.webp" },
        { id: 2, rarity: "EXR", name: "Pure Vanilla", rate: 0.01, img: "https://cookierunbraverse.com/data/en_storage/eXN_QVTcLFL7hr0_HG0jVg.webp" },
        { id: 3, rarity: "SEC", name: "Pure Vanilla (SEC)", rate: 0.5, img: "https://cookierunbraverse.com/data/en_storage/n216nqrESeGD3vqTr5tPEg.webp" },
        { id: 4, rarity: "SEC", name: "Golden Cheese (SEC)", rate: 0.5, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS8_026@1.png.webp" },
        { id: 5, rarity: "SEC", name: "Cookiemals (SEC)", rate: 0.5, img: "https://cookierunbraverse.com/data/en_storage/eYzBPU7vPznUOLqF3sChUg.webp" },
        { id: 6, rarity: "SEC", name: "Melted Choco Cookie (SEC)", rate: 0.5, img: "https://cookierunbraverse.com/data/en_storage/06wzuO5gMbda53ZIk5lf5w.webp" },
        { id: 7, rarity: "SSR", name: "White Lily", rate: 2.0, img: "https://cookierunbraverse.com/data/en_storage/PROSFwH4wlkFjSC9nn3nyg.webp" },
        { id: 8, rarity: "SSR", name: "Pure Vanilla Cookie", rate: 2.0, img: "https://cookierunbraverse.com/data/en_storage/FLfwxLrQcMCD7Y51Wu5UvA.webp" },
        { id: 9, rarity: "SSR", name: "Milky Way Cookie", rate: 2.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS4_092@1.png.webp" },
        { id: 10, rarity: "SSR", name: "Cookiemals", rate: 2.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS4_059@1.png.webp" },
        { id: 11, rarity: "SR", name: "White Lily (SR)", rate: 10.0, img: "https://cookierunbraverse.com/data/en_storage/4jRaQLO9rqksjrgbkvLDMg.webp" },
        { id: 12, rarity: "SR", name: "Pure Vanilla Cookie (SR)", rate: 10.0, img: "https://cookierunbraverse.com/data/en_storage/qwIOz3Udf_iFsoy3efogQw.webp" },
        { id: 13, rarity: "SR", name: "Milky Way Cookie(SR)", rate: 10.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS4_092.png.webp" },
        { id: 14, rarity: "SR", name: "Cookiemals (SR)", rate: 10.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS4_059.png.webp" },
        { id: 15, rarity: "U", name: "Knight Cookie", rate: 20.0, img: "https://cookierunbraverse.com/data/en_storage/5AoOrNORvc6gfCZGNMzPgA.webp" },
        { id: 16, rarity: "U", name: "Potato Cookie", rate: 20.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS5_045.png.webp" },
        { id: 17, rarity: "U", name: "Cinnamon Cookie", rate: 20.0, img: "https://cookierunbraverse.com/data/en_storage/bix5fJI4le2jr-zoCiQfCQ.webp" },
        { id: 18, rarity: "U", name: "Fairy Cookie", rate: 20.0, img: "https://cookierunbraverse.com/data/en_storage/vHvbL3qhwV434IXg4UsVQQ.webp" },
        { id: 19, rarity: "U", name: "Carol Cookie", rate: 20.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS5_015.png.webp" },
        { id: 20, rarity: "C", name: "GingerBrave", rate: 30.0, img: "https://cookierunbraverse.com/data/en_storage/SanpRMNOlZcJ2q6Z61i5Zg.webp" },
        { id: 21, rarity: "C", name: "Clown Faerie Cookie 1", rate: 30.0, img: "https://cookierunbraverse.com/data/en_storage/UJCdabin2vafU1h4gTVKAw.webp" },
        { id: 22, rarity: "C", name: "Clown Faerie Cookie 2", rate: 30.0, img: "https://cookierunbraverse.com/data/en_storage/jSTrJYVSB9O8IZN1KN2FhQ.webp" },
        { id: 23, rarity: "C", name: "Clown Faerie Cookie 3", rate: 30.0, img: "https://cookierunbraverse.com/data/en_storage/pM6AIgnDkZg746CaNoHJ2g.webp" },
        { id: 24, rarity: "C", name: "Adventurer Cookie", rate: 30.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS8_042.png.webp" },
        { id: 25, rarity: "C", name: "Vagabond Cookie", rate: 30.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS8_057.png.webp" },
        { id: 26, rarity: "C", name: "Wizard Cookie", rate: 30.0, img: "https://assets.cookierunbraverse.com/braverse/images/card_webp/card/en/BS8_107.png.webp" }
    ];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUID = user.uid;
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    updateUI();
                }
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    function updateUI() {
        if (!userData) return;
        document.getElementById("balance").innerText = (userData.points || 0).toLocaleString();
        document.getElementById("user-diamonds").innerText = (userData.diamonds || 0).toLocaleString();

        const pitySEC = userData.pitySEC || 0;
        const pityEXR = userData.pityEXR || 0;

        document.getElementById("pity-bar-sec").style.width = (Math.min(pitySEC, 550) / 550 * 100) + "%";
        document.getElementById("pity-text-sec").innerText = `${pitySEC} / 550`;
        document.getElementById("pity-bar-exr").style.width = (Math.min(pityEXR, 900) / 900 * 100) + "%";
        document.getElementById("pity-text-exr").innerText = `${pityEXR} / 900`;
    }

    window.pull = async (amount) => {
        if (isPulling || !userData || !currentUserUID) return;
        
        let cost = 0;
        let expReward = 0;

        // คำนวณราคาและค่า EXP ที่ได้รับ
        if (amount === 5) { cost = 500; expReward = 10; }
        else if (amount === 10) { cost = 1500; expReward = 50; }
        else if (amount === 50) { cost = 3000; expReward = 300; }
        
        if (userData.points < cost) return alert(`แต้มไม่พอ! (ต้องการ ${cost} มี ${userData.points})`);

        isPulling = true;
        toggleButtons(true);
        
        const display = document.getElementById("display");
        display.innerHTML = "";
        
        const results = [];
        let currentPitySEC = userData.pitySEC || 0;
        let currentPityEXR = userData.pityEXR || 0;
        const totalWeight = allCards.reduce((s, c) => s + c.rate, 0);

        for (let i = 0; i < amount; i++) {
            currentPitySEC++; currentPityEXR++;
            let win = null;

            if (currentPityEXR >= 900) { 
                let pool = allCards.filter(c => c.rarity === "EXR");
                win = pool[Math.floor(Math.random() * pool.length)];
                currentPityEXR = 0;
            } else if (currentPitySEC >= 550) {
                let pool = allCards.filter(c => c.rarity === "SEC");
                win = pool[Math.floor(Math.random() * pool.length)];
                currentPitySEC = 0;
            } else {
                let r = Math.random() * totalWeight, curr = 0;
                for (const c of allCards) {
                    curr += c.rate;
                    if (r <= curr) { win = c; break; }
                }
            }

            if (win.rarity === "SEC") currentPitySEC = 0;
            if (win.rarity === "EXR") { currentPityEXR = 0; currentPitySEC = 0; }
            
            results.push({
                name: win.name,
                rarity: win.rarity,
                img: win.img,
                obtainedDate: Date.now(),
                level: 1,
                source: "Gacha ตู้ที่ 1"
            });

            const cardEl = document.createElement("div");
            cardEl.className = "card";
            cardEl.innerHTML = `<div class="card-inner"><div class="card-front"><img src="${win.img}"></div><div class="card-back"></div></div>`;
            display.appendChild(cardEl);

            setTimeout(() => cardEl.classList.add("revealed"), i * 150);

            if (win.rarity === "EXR") await playEXRCutscene();
            else if (["SEC", "SSR"].includes(win.rarity)) triggerShake();
        }

        try {
            const userRef = doc(db, "users", currentUserUID);
            await updateDoc(userRef, {
                points: userData.points - cost,
                pitySEC: currentPitySEC,
                pityEXR: currentPityEXR,
                passExp: increment(expReward), // เพิ่ม EXP ให้ Pass ตามจำนวนการสุ่ม
                collection: arrayUnion(...results) 
            });
        } catch (error) {
            console.error("Error updating gacha:", error);
            alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
        }

        isPulling = false;
        toggleButtons(false);
    }

    async function playEXRCutscene() {
        const overlay = document.getElementById("cutscene-overlay");
        overlay.style.display = "flex";
        await new Promise(res => setTimeout(res, 1200));
        overlay.style.display = "none";
        const flash = document.createElement("div"); 
        flash.className="exr-flash"; 
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 800);
    }

    function triggerShake() { 
        document.getElementById("body-main").classList.add("shake-heavy"); 
        setTimeout(() => document.getElementById("body-main").classList.remove("shake-heavy"), 500); 
    }

    function toggleButtons(d) { 
        document.getElementById("pull-5").disabled = d; 
        document.getElementById("pull-10").disabled = d; 
        document.getElementById("pull-50").disabled = d; 
    }

    window.openModal = () => {
        const body = document.getElementById("rate-list-body");
        body.innerHTML = allCards.map(c => `
            <tr>
                <td><img src="${c.img}" class="modal-card-img"></td>
                <td>
                    <div style="font-weight:bold; color: ${getRarityColor(c.rarity)};">[${c.rarity}]</div>
                    <div style="font-size: 0.9rem;">${c.name}</div>
                </td>
                <td style="text-align:right; font-weight:bold; color:#ffc831;">${c.rate}%</td>
            </tr>
        `).join('');
        document.getElementById("rateModal").style.display = "block"; 
    }

    window.closeModal = () => { document.getElementById("rateModal").style.display = "none"; }

    function getRarityColor(rarity) {
        const colors = { EXR: '#00d4ff', SEC: '#a020f0', SSR: '#ff4444', SR: '#ffc831' };
        return colors[rarity] || '#aaaaaa';
    }

    const track = document.getElementById("v-track");
    const rares = allCards.filter(c => ["EXR", "SEC", "SSR"].includes(c.rarity));
    track.innerHTML = [...rares, ...rares].map(c => `<div class="preview-card-item"><img src="${c.img}"></div>`).join('');
</script>
</body>
</html>
