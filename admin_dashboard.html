<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Full Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4747; --bg: #050505; --panel: #151515; --accent: #ffc831; --diamond: #00f2ff; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; margin-bottom: 40px; }
        .header { background: var(--panel); padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; }
        .user-table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        th { background: #111; color: #888; padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .input-dark { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 5px; width: 80px; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin: 2px; }
        .btn-save { background: var(--success); color: white; }
        .btn-reset { background: var(--warning); color: #000; }
        .btn-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; color: var(--accent);">🌐 Admin Dashboard</h1>
            <p style="margin:0; font-size:0.8rem; color:#888;">จัดการระบบครบวงจร</p>
        </div>
        <a href="index.html" style="color:#666; text-decoration:none;">🏠 กลับหน้าหลัก</a>
    </div>

    <h2 style="color: var(--accent);">👥 ระบบจัดการผู้เล่น</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 ค้นหาชื่อผู้เล่น..." onkeyup="filterUsers()">
    <table class="user-table">
        <thead><tr><th>Username</th><th>🪙 Coins</th><th>💎 Diamonds</th><th style="text-align:right">Action</th></tr></thead>
        <tbody id="user-list"><tr><td colspan="4" style="text-align:center; padding:50px;">กำลังโหลด...</td></tr></tbody>
    </table>

    <h2 style="color: var(--accent); margin-top: 50px;">🎟 ระบบจัดการโค้ดรางวัล</h2>
    <div style="background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px;">
        <input type="text" id="newCodeName" placeholder="ชื่อโค้ด" style="background:#000; border:1px solid #333; padding:10px; color:#fff; border-radius:5px; width: 150px;">
        <input type="number" id="newCodePoints" placeholder="แต้ม" style="background:#000; border:1px solid #333; padding:10px; color:#fff; border-radius:5px; width: 80px;">
        <input type="number" id="newCodeDiamonds" placeholder="เพชร" style="background:#000; border:1px solid #333; padding:10px; color:#fff; border-radius:5px; width: 80px;">
        <button class="btn-save" onclick="addCode()">สร้างโค้ดใหม่</button>
    </div>
    <table class="user-table">
        <thead><tr><th>Code Name</th><th>Points</th><th>Diamonds</th><th>Used Count</th><th style="text-align:right">Action</th></tr></thead>
        <tbody id="code-list"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, set, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBx2JfaAGVB7BGRJUW6HEKJCaPNiWU6igg",
        databaseURL: "https://test-3aad7-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "test-3aad7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allUsers = {}; 

    // 1. Logic ผู้เล่น
    onValue(ref(db, 'users'), (snapshot) => {
        allUsers = snapshot.val() || {};
        renderUserTable(allUsers);
    });

    function renderUserTable(data) {
        const container = document.getElementById("user-list");
        let html = "";
        Object.entries(data).forEach(([username, user]) => {
            html += `<tr>
                <td><b style="color: #fff;">${username}</b></td>
                <td><input type="number" id="coin-${username}" class="input-dark" value="${user.points || 0}"></td>
                <td><input type="number" id="dia-${username}" class="input-dark" style="color:var(--diamond)" value="${user.diamonds || 0}"></td>
                <td style="text-align:right">
                    <button class="btn-action btn-save" onclick="updateUser('${username}')">บันทึก</button>
                    <button class="btn-action btn-delete" onclick="deleteUser('${username}')">ลบไอดี</button>
                </td>
            </tr>`;
        });
        container.innerHTML = html;
    }

    window.updateUser = (username) => {
        const coins = document.getElementById(`coin-${username}`).value;
        const dias = document.getElementById(`dia-${username}`).value;
        update(ref(db, 'users/' + username), { points: parseInt(coins), diamonds: parseInt(dias) })
            .then(() => alert("อัปเดตสำเร็จ!"));
    };

    window.deleteUser = (username) => {
        if(confirm(`ลบบัญชี "${username}"?`)) remove(ref(db, 'users/' + username));
    };

    // 2. Logic จัดการโค้ด
    onValue(ref(db, 'codes'), (snapshot) => {
        const codes = snapshot.val() || {};
        const codeContainer = document.getElementById("code-list");
        let html = "";
        Object.entries(codes).forEach(([code, data]) => {
            html += `<tr>
                <td style="color:#ffc831; font-weight:bold;">${code}</td>
                <td>${data.rewardPoints || 0}</td>
                <td>${data.rewardDiamonds || 0}</td>
                <td>${data.usedCount || 0}</td>
                <td style="text-align:right"><button class="btn-delete" onclick="deleteCode('${code}')">ลบ</button></td>
            </tr>`;
        });
        codeContainer.innerHTML = html || '<tr><td colspan="5" style="text-align:center;">ยังไม่มีโค้ด</td></tr>';
    });

    window.addCode = () => {
        const codeName = document.getElementById("newCodeName").value.trim().toUpperCase();
        const points = parseInt(document.getElementById("newCodePoints").value) || 0;
        const diamonds = parseInt(document.getElementById("newCodeDiamonds").value) || 0;

        if(!codeName) return alert("กรุณากรอกชื่อโค้ด");

        set(ref(db, 'codes/' + codeName), { 
            rewardPoints: points, 
            rewardDiamonds: diamonds,
            usedCount: 0 
        }).then(() => {
            alert("เพิ่มโค้ดสำเร็จ!");
            document.getElementById("newCodeName").value = "";
            document.getElementById("newCodePoints").value = "";
            document.getElementById("newCodeDiamonds").value = "";
        });
    };

    window.deleteCode = (code) => {
        if(confirm(`ลบโค้ด "${code}"?`)) remove(ref(db, 'codes/' + code));
    };

    window.filterUsers = () => {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const filtered = {};
        for(let key in allUsers) if(key.toLowerCase().includes(term)) filtered[key] = allUsers[key];
        renderUserTable(filtered);
    };
</script>
</body>
</html>
