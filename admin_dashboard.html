<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ระบบจัดการสมาชิกและดวงดาว</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #ffc831; margin-top: 0; border-left: 5px solid #ffc831; padding-left: 15px; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; margin-top: 10px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #ffc831; background: #252525; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: #252525; }

        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.85rem; }
        
        .btn-green { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-blue { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-right: 5px; }
        .btn-cyan { background: #00e5ff; color: black; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
        .btn-star { background: #4facfe; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
        .btn-delete { background: #ff4747; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        
        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; background: #444; }
        .role-admin { background: #ffc831; color: black; }
        .uid-text { color: #888; font-size: 0.65rem; font-family: monospace; }
        .back-link { color: #888; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <a href="index.html" class="back-link">← กลับหน้าหลัก</a>

    <div class="card">
        <h2>➕ สร้างโค้ดรางวัลใหม่ (รวมระบบดวงดาว)</h2>
        <div class="form-group">
            <label>ชื่อโค้ด</label>
            <input type="text" id="new-code" placeholder="เช่น STARPOWER2026">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;">
            <div>
                <label>พอยท์ (🪙)</label>
                <input type="number" id="reward-points" value="0">
            </div>
            <div>
                <label>เพชร (💎)</label>
                <input type="number" id="reward-diamonds" value="0">
            </div>
            <div>
                <label>ดวงดาว (⭐)</label>
                <input type="number" id="reward-stars" value="0">
            </div>
            <div>
                <label>จำกัดจำนวนครั้ง (0=ไม่จำกัด)</label>
                <input type="number" id="max-use" value="0">
            </div>
        </div>
        <button class="btn-green" id="create-btn" style="margin-top:15px;">บันทึกโค้ดรางวัล</button>
    </div>

    <div class="card">
        <h2>🎫 รายการโค้ดในระบบ</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>โค้ด</th>
                        <th>ของรางวัล</th>
                        <th>การใช้งาน (ใช้ไป/จำกัด)</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="code-table-body">
                    <tr><td colspan="4" style="text-align:center;">กำลังโหลดโค้ด...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>👥 จัดการผู้ใช้</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ชื่อผู้ใช้ / UID</th>
                        <th>สถานะ</th>
                        <th>🪙 พอยท์</th>
                        <th>💎 เพชร</th>
                        <th>⭐ ดวงดาว</th>
                        <th>🛠 จัดการ</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr><td colspan="6" style="text-align:center;">กำลังโหลดข้อมูลผู้ใช้...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ฟังก์ชันสร้างโค้ด ---
    document.getElementById("create-btn").onclick = async () => {
        const codeName = document.getElementById("new-code").value.trim().toUpperCase();
        const points = parseInt(document.getElementById("reward-points").value) || 0;
        const diamonds = parseInt(document.getElementById("reward-diamonds").value) || 0;
        const stars = parseInt(document.getElementById("reward-stars").value) || 0;
        const maxUse = parseInt(document.getElementById("max-use").value) || 0;

        if (!codeName) return alert("กรุณาใส่ชื่อโค้ด");

        try {
            await setDoc(doc(db, "codes", codeName), {
                rewardPoints: points,
                rewardDiamonds: diamonds,
                rewardStars: stars,
                maxUse: maxUse,
                usedCount: 0,
                createdAt: new Date().toISOString()
            });
            alert("สร้างโค้ดสำเร็จ!");
            document.getElementById("new-code").value = "";
        } catch (e) { alert(e.message); }
    };

    // --- ดึงข้อมูลโค้ดแบบ Realtime ---
    onSnapshot(collection(db, "codes"), (snapshot) => {
        const tableBody = document.getElementById("code-table-body");
        tableBody.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;
            const limit = data.maxUse === 0 ? "ไม่จำกัด" : data.maxUse;
            const row = `
                <tr>
                    <td><strong style="color:#ffc831;">${id}</strong></td>
                    <td>🪙 ${data.rewardPoints} | 💎 ${data.rewardDiamonds} | ⭐ ${data.rewardStars || 0}</td>
                    <td>${data.usedCount || 0} / ${limit}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteCode('${id}')">ลบโค้ด</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });

    window.deleteCode = async (id) => {
        if (confirm(`ลบโค้ด "${id}"?`)) {
            await deleteDoc(doc(db, "codes", id));
        }
    };

    // --- ฟังก์ชันจัดการผู้ใช้ ---
    window.adjustPoints = async (uid, username) => {
        const amount = prompt(`เติมพอยท์ 🪙 ให้คุณ ${username}:`);
        const num = parseInt(amount);
        if (isNaN(num)) return;
        updateUser(uid, { points: increment(num) });
    };

    window.adjustDiamonds = async (uid, username) => {
        const amount = prompt(`เติมเพชร 💎 ให้คุณ ${username}:`);
        const num = parseInt(amount);
        if (isNaN(num)) return;
        updateUser(uid, { diamonds: increment(num) });
    };

    window.adjustStars = async (uid, username) => {
        const amount = prompt(`เติมดวงดาว ⭐ ให้คุณ ${username}:`);
        const num = parseInt(amount);
        if (isNaN(num)) return;
        updateUser(uid, { stars: increment(num) });
    };

    async function updateUser(uid, data) {
        try {
            await updateDoc(doc(db, "users", uid), data);
            alert("ดำเนินการสำเร็จ!");
        } catch (e) { alert("Error: " + e.message); }
    }

    window.deleteUser = async (uid, username) => {
        if (confirm(`⚠️ ลบผู้ใช้ "${username}"?`)) {
            try { await deleteDoc(doc(db, "users", uid)); } catch (e) { alert(e.message); }
        }
    };

    // --- ดึงรายชื่อผู้ใช้แบบ Realtime ---
    onSnapshot(collection(db, "users"), (snapshot) => {
        const tableBody = document.getElementById("user-table-body");
        tableBody.innerHTML = "";
        snapshot.forEach((doc) => {
            const user = doc.data();
            const uid = doc.id;
            const isAdmin = user.role === "admin";
            const row = `
                <tr>
                    <td>
                        <strong style="color:#ffc831;">${user.username || "---"}</strong><br>
                        <span class="uid-text">${uid}</span>
                    </td>
                    <td>
                        <span class="role-badge ${isAdmin ? 'role-admin' : ''}">${isAdmin ? 'ADMIN' : 'USER'}</span>
                    </td>
                    <td style="color:#ffc831; font-weight:bold;">${(user.points || 0).toLocaleString()} 🪙</td>
                    <td style="color:#00e5ff; font-weight:bold;">${(user.diamonds || 0).toLocaleString()} 💎</td>
                    <td style="color:#4facfe; font-weight:bold;">${(user.stars || 0).toLocaleString()} ⭐</td>
                    <td>
                        <button class="btn-blue" onclick="adjustPoints('${uid}', '${user.username}')">🪙</button>
                        <button class="btn-cyan" onclick="adjustDiamonds('${uid}', '${user.username}')">💎</button>
                        <button class="btn-star" onclick="adjustStars('${uid}', '${user.username}')">⭐</button>
                        <button class="btn-delete" onclick="deleteUser('${uid}', '${user.username}')">🗑️</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
</body>
</html>
