<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY COLLECTION - Arena Sync System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        /* Navbar */
        .navbar { 
            background-color: rgba(10, 10, 15, 0.9); 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ffc831; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            height: 85px; 
        }
        .user-name-tag { color: #ffc831; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 5px; }
        .btn-nav { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-nav.primary { background: linear-gradient(45deg, #ffc831, #ff9000); color: #000; border: none; }
        .wallet-display { display: flex; gap: 15px; }
        .wallet-box { background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 25px; border: 1.5px solid #333; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        
        /* Rainbow & Visual Effects */
        @keyframes rainbow-rotate { 100% { filter: hue-rotate(360deg); } }
        .rainbow-effect { 
            border: 3px solid transparent !important; 
            background: linear-gradient(#111, #111) padding-box, conic-gradient(from 0deg, red, yellow, lime, aqua, blue, magenta, red) border-box !important; 
            animation: rainbow-rotate 3s linear infinite; 
        }
        .rainbow-text { 
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-size: 200% auto; animation: rainbow-rotate 2s linear infinite; 
        }

        /* Filter Bar */
        .filter-bar { max-width: 1200px; margin: 25px auto; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .filter-btn { padding: 8px 18px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #aaa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { border-color: #ffc831; color: #fff; background: rgba(255,200,49,0.1); }

        /* Grid & Cards */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .col-card { 
            background: #111; border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; cursor: pointer; 
        }
        .col-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .qty-badge { position: absolute; top: 8px; right: 8px; background: #ffc831; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; z-index: 5; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0f; border-radius: 25px; max-width: 800px; width: 100%; display: flex; overflow: hidden; border: 1px solid #333; }
        .modal-left { width: 40%; background: #000; }
        .modal-right { width: 60%; padding: 30px; display: flex; flex-direction: column; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: #ffc831; }
        .btn-action { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sell-all { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) { .modal-content { flex-direction: column; } .modal-left, .modal-right { width: 100%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="user-info">
            <div class="user-name-tag" id="display-username">กำลังโหลด...</div>
            <div class="nav-buttons">
                <a href="index.html" class="btn-nav">🏠 HOME</a>
                <a href="Banner Selection.html" class="btn-nav primary">สุ่มการ์ด</a>
            </div>
        </div>
        <div class="wallet-display">
            <div class="wallet-box" style="color: #ffc831;">🪙 <span id="nav-points">0</span></div>
            <div class="wallet-box" style="color: #00d4ff;">💎 <span id="nav-diamonds">0</span></div>
        </div>
    </nav>

    <div class="filter-bar">
        <div id="filterContainer"></div>
        <button id="btnSellAll" class="btn-sell-all">💰 ขายใบซ้ำทั้งหมด</button>
    </div>

    <div class="container">
        <div id="grid" class="collection-grid"></div>
    </div>

    <div id="cardModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" id="modalMainBox" onclick="event.stopPropagation()">
            <div class="modal-left">
                <img id="modalImg" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="modal-right">
                <h2 id="modalName">Name</h2>
                <div id="modalRarity">GRADE: -</div>
                <div style="margin: 20px 0;">
                    <span id="modalLvlDisplay">LV. 1</span>
                    <div style="background:#222; height:8px; border-radius:4px;"><div id="lvlBarFill" style="background:#00d4ff; height:100%; width:0%;"></div></div>
                </div>
                <div>⚡ Battle Power: <span id="modalPower" class="stat-val">0</span></div>
                <div id="modalUpgradeInfo" style="margin-top:15px; color:#00ff88;"></div>
                
                <div id="lvUpgradeGroup" style="display:flex; gap:10px; margin-top:15px;">
                    <button id="btnUpgradeLV" class="btn-action" style="background:#0066ff; color:white;">เลเวลอัป</button>
                    <button id="btnBulkUpgrade" class="btn-action" style="background:#00ff88;">MAX</button>
                </div>
                <button id="btnUpgradeStar" class="btn-action" style="background:#ff9900; display:none;">⭐ อัปดาว</button>
                <div id="maxLevelMessage" style="display:none; color:#ffc831; text-align:center; font-weight:bold;">MAX</div>
                <button class="btn-nav" style="margin-top:20px;" onclick="document.getElementById('cardModal').style.display='none'">ปิด</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null, userCards = [], userPoints = 0, userDiamonds = 0, currentFilter = 'ALL';
    const MAX_LV = 50;

    // --- การตั้งค่าระดับและพลัง (รวม USEC, CBR, PR) ---
    const RARITY_POWER = {
        "P": {base: 5000, per: 1000}, "USEC": {base: 8500, per: 6500}, "EXR": {base: 4000, per: 2500},
        "CBR": {base: 6600, per: 4000}, "SEC": {base: 3500, per: 2000}, "SUR": {base: 3000, per: 1800},
        "SSR": {base: 2500, per: 1500}, "PR": {base: 2000, per: 1500}, "UR": {base: 1500, per: 1200},
        "SR": {base: 1000, per: 1000}, "R": {base: 600, per: 800}, "U": {base: 300, per: 500}, "C": {base: 100, per: 300}
    };

    const rarityColors = { 
        'P': '#ff00ff', 'USEC': '#ff00ff', 'EXR': '#ff4d4d', 'CBR': '#ff4d4d', 
        'SEC': '#ffac33', 'SUR': '#33ffad', 'SSR': '#ffc831', 'PR': '#ffc831', 
        'UR': '#bf40bf', 'SR': '#33aaff', 'R': '#33ff57', 'U': '#ffffff', 'C': '#ffffff' 
    };

    function getArenaPower(card) {
        const cfg = RARITY_POWER[(card.rarity||'C').toUpperCase()] || RARITY_POWER["C"];
        return Math.floor((cfg.base + ((card.level||1) * cfg.per)) * (1 + ((card.stars||0) * 0.1)));
    }

    function getDynamicSellValue(card) {
        const baseValues = { 'P': 10000, 'USEC': 90000, 'EXR': 55000, 'CBR': 50000, 'SEC': 25000, 'SUR': 15000, 'SSR': 15000, 'PR': 10000, 'UR': 1200, 'SR': 1000, 'R': 500, 'U': 200, 'C': 100 };
        const base = baseValues[(card.rarity||'C').toUpperCase()] || 100;
        return Math.floor(base * (1 + ((Number(card.level)||1) - 1) * 0.1));
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    userPoints = d.points || 0;
                    userDiamonds = d.diamonds || 0;
                    userCards = d.collection || [];
                    document.getElementById("nav-points").innerText = userPoints.toLocaleString();
                    document.getElementById("nav-diamonds").innerText = userDiamonds.toLocaleString();
                    document.getElementById("display-username").innerText = d.username || "COLLECTOR";
                    renderCards();
                }
            });
        }
    });

    function renderCards() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        
        // รวมการ์ดซ้ำ
        const stacked = {};
        userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            if(!stacked[key]) stacked[key] = { ...c, qty: (c.count||1) };
            else stacked[key].qty += (c.count||1);
        });

        let list = Object.values(stacked);
        if(currentFilter !== 'ALL') list = list.filter(c => c.rarity.toUpperCase() === currentFilter);

        list.sort((a,b) => {
            const order = { 'P':13,'USEC':12,'EXR':11,'CBR':10,'SEC':9,'SUR':8,'SSR':7,'PR':6,'UR':5,'SR':4,'R':3,'U':2,'C':1 };
            return (order[b.rarity.toUpperCase()]||0) - (order[a.rarity.toUpperCase()]||0);
        });

        list.forEach(card => {
            const div = document.createElement("div");
            div.className = "col-card";
            div.onclick = () => openModal(card);
            div.innerHTML = `
                ${card.qty > 1 ? `<div class="qty-badge">x${card.qty}</div>` : ''}
                <img src="${card.img || card.image}">
                <div style="padding:10px; font-size:0.8rem;">
                    <b style="color:${rarityColors[card.rarity.toUpperCase()]}">${card.name}</b><br>
                    <small>⚡ ${getArenaPower(card).toLocaleString()}</small>
                </div>`;
            grid.appendChild(div);
        });
    }

    window.openModal = (card) => {
        const r = card.rarity.toUpperCase();
        document.getElementById("modalImg").src = card.img || card.image;
        document.getElementById("modalName").innerText = card.name;
        document.getElementById("modalRarity").innerText = "GRADE: " + r;
        document.getElementById("modalRarity").style.color = rarityColors[r];
        document.getElementById("modalPower").innerText = getArenaPower(card).toLocaleString();
        document.getElementById("modalLvlDisplay").innerText = "LV. " + (card.level || 1);
        document.getElementById("lvlBarFill").style.width = ((card.level||1)/MAX_LV*100) + "%";
        
        // Logic ปุ่มอัปเกรด
        const lvGroup = document.getElementById("lvUpgradeGroup");
        if((card.level||1) < MAX_LV) {
            lvGroup.style.display = "flex";
            let req = card.level >= 30 ? 3 : (card.level >= 10 ? 2 : 1);
            document.getElementById("modalUpgradeInfo").innerText = `ใช้ใบซ้ำ ${req} ใบ + 500 🪙`;
            document.getElementById("btnUpgradeLV").onclick = () => handleUpgrade(card, 'LV', 500, req);
            document.getElementById("btnBulkUpgrade").onclick = () => handleUpgrade(card, 'BULK', 500, req);
        } else {
            lvGroup.style.display = "none";
        }
        document.getElementById("cardModal").style.display = "flex";
    };

    // --- ส่วนฟังก์ชันที่คุณต้องการให้ใส่ลงไป ---
    async function handleUpgrade(card, type, cost, req) {
        let all = []; userCards.forEach(c => { for(let i=0; i<(c.count||1); i++) all.push({...c, count:1}); });
        let targets = all.filter(c => c.name === card.name && (c.rarity||'C').toUpperCase() === card.rarity.toUpperCase());
        let others = all.filter(c => !(c.name === card.name && (c.rarity||'C').toUpperCase() === card.rarity.toUpperCase()));
        targets.sort((a,b) => (b.level||1) - (a.level||1));
        let main = targets.shift();

        if (type === 'LV' && targets.length >= req && userPoints >= cost) {
            main.level = (main.level||1) + 1; targets.splice(0, req);
            await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], points: increment(-cost) });
        } else if (type === 'STAR' && targets.length >= req && userDiamonds >= cost) {
            main.stars = (main.stars||0) + 1; targets.splice(0, req);
            await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], diamonds: increment(-cost) });
        } else if (type === 'BULK') {
            let count = 0; let tempPoints = userPoints;
            while(main.level < MAX_LV && tempPoints >= 500) {
                let r = main.level >= 30 ? 3 : (main.level >= 10 ? 2 : 1);
                if (targets.length >= r) { main.level++; targets.splice(0, r); tempPoints -= 500; count++; } else break;
            }
            if(count > 0) await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], points: increment(-(count*500)) });
        } else { alert("ทรัพยากรไม่เพียงพอ!"); }
        document.getElementById("cardModal").style.display = "none";
    }

    document.getElementById("btnSellAll").onclick = async () => {
        const stacked = {}; userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            if(!stacked[key]) stacked[key] = []; stacked[key].push({...c});
        });
        let gain = 0, newCol = [], sold = 0;
        for (const k in stacked) {
            stacked[k].sort((a,b) => (b.level||1)-(a.level||1));
            newCol.push(stacked[k].shift());
            stacked[k].forEach(c => { 
                gain += getDynamicSellValue(c);
                sold++; 
            });
        }
        if(!sold) return alert("ไม่มีใบซ้ำ");
        if(confirm(`ขายใบซ้ำ ${sold} ใบ ได้รับ ${gain} 🪙?`)) await updateDoc(doc(db, "users", currentUID), { collection: newCol, points: increment(gain) });
    };

    const fCon = document.getElementById("filterContainer");
    ['ALL','P','USEC','EXR','CBR','SEC','SUR','SSR','PR','UR','SR','R','U','C'].forEach(r => {
        const b = document.createElement("button"); b.className = `filter-btn ${r===currentFilter?'active':''}`; b.innerText = r;
        b.onclick = () => { currentFilter = r; document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); renderCards(); };
        fCon.appendChild(b);
    });
</script>
</body>
</html>
