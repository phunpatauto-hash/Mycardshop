<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEEM CODE - My Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffc831;
            --gold-dark: #e5b32a;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --input-bg: #0a0a0c;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at center, #1a1a20 0%, #050505 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .box { 
            background: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: 30px; 
            text-align: center; 
            border: 1px solid rgba(255, 200, 49, 0.2); 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .icon-header {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 200, 49, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 { 
            color: var(--gold); 
            margin: 0 0 5px 0; 
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .desc { font-size: 1rem; color: #aaa; margin-bottom: 35px; }

        input { 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: 2px solid #222; 
            background: var(--input-bg); 
            color: white; 
            text-align: center; 
            font-size: 1.4rem; 
            font-weight: bold; 
            box-sizing: border-box; 
            transition: 0.3s;
            letter-spacing: 2px;
        }

        input:focus { 
            outline: none; 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(255, 200, 49, 0.15);
            background: #000;
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--gold), #f39c12); 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 1.2rem; 
            color: #111;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover { 
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 200, 49, 0.4);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-link { 
            color: #777; 
            text-decoration: none; 
            margin-top: 30px; 
            display: inline-block; 
            font-size: 0.9rem; 
            transition: 0.3s;
        }

        .back-link:hover { color: var(--gold); }

        .loader {
            width: 20px; height: 20px;
            border: 3px solid #111;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="box">
        <div class="icon-header">
            <i class="fas fa-ticket-alt"></i>
        </div>
        <h2>แลกโค้ดรางวัล</h2>
        <p class="desc">กรอกรหัสลับเพื่อรับไอเทมพิเศษ</p>
        
        <input type="text" id="code-input" placeholder="GIFT2026" maxlength="20" autocomplete="off">

        <button id="redeem-btn">
            <span class="loader" id="btn-loader"></span>
            <span id="btn-text">ยืนยันแลกรับ</span>
        </button>

        <br>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
        }
    });

    document.getElementById("redeem-btn").onclick = async () => {
        const btn = document.getElementById("redeem-btn");
        const btnText = document.getElementById("btn-text");
        const btnLoader = document.getElementById("btn-loader");
        const inputCode = document.getElementById("code-input").value.trim().toUpperCase();

        if (!currentUserId) return alert("❌ กรุณาล็อกอินก่อนแลกโค้ด!");
        if (!inputCode) return alert("❌ กรุณากรอกโค้ด!");

        btn.disabled = true;
        btnText.innerText = "กำลังตรวจสอบ...";
        btnLoader.style.display = "inline-block";

        try {
            // 1. ตรวจสอบว่ามีโค้ดนี้จริงไหม
            const codeRef = doc(db, "codes", inputCode);
            const codeSnap = await getDoc(codeRef);

            if (!codeSnap.exists()) throw new Error("ไม่พบโค้ดนี้ หรือโค้ดอาจจะหมดอายุแล้ว");

            const codeData = codeSnap.data();
            
            // 2. ตรวจสอบจำนวนการใช้สูงสุด (ถ้ามีกำหนดไว้)
            if (codeData.maxUse > 0 && codeData.usedCount >= codeData.maxUse) {
                throw new Error("ขออภัย โค้ดนี้มีผู้ใช้งานครบจำนวนแล้ว");
            }

            // 3. ตรวจสอบว่า User คนนี้เคยใช้โค้ดนี้ไปหรือยัง
            const historyRef = doc(db, "users", currentUserId, "used_codes", inputCode);
            const historySnap = await getDoc(historyRef);
            if (historySnap.exists()) throw new Error("คุณเคยแลกรับโค้ดนี้ไปแล้ว!");

            // 4. ดึงข้อมูล User เพื่อจัดการ Collection (เช็คการ์ดซ้ำ)
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) throw new Error("ไม่พบข้อมูลผู้ใช้งาน");
            
            const userData = userSnap.data();
            let currentCollection = userData.collection || [];
            let updatedCollection = [...currentCollection];
            let cardInfo = "";

            // ตรวจสอบการให้รางวัลการ์ด
            if (codeData.rewardCard && codeData.rewardCard.name) {
                const rewardAmount = Number(codeData.rewardCard.count) || 1;
                
                // ค้นหาว่าในการ์ดที่มีอยู่ มีชื่อซ้ำกับของรางวัลไหม
                const existingIndex = updatedCollection.findIndex(item => item.name === codeData.rewardCard.name);

                if (existingIndex !== -1) {
                    // ถ้ามีอยู่แล้ว ให้บวกจำนวน (count) เพิ่มเข้าไป
                    const currentCount = Number(updatedCollection[existingIndex].count) || 0;
                    updatedCollection[existingIndex].count = currentCount + rewardAmount;
                } else {
                    // ถ้ายังไม่มี ให้สร้าง Object ใหม่เพิ่มเข้าไป
                    const newCard = {
                        ...codeData.rewardCard,
                        level: 1, 
                        stars: 0,
                        count: rewardAmount,
                        obtainedDate: new Date().toLocaleDateString('th-TH'),
                        type: "Gift"
                    };
                    updatedCollection.push(newCard);
                }
                cardInfo = `\n🎴 การ์ด: ${codeData.rewardCard.name} (x${rewardAmount})`;
            }

            // 5. อัปเดตข้อมูลทุกอย่างลง Firebase
            await updateDoc(userRef, {
                points: increment(codeData.rewardPoints || 0),
                diamonds: increment(codeData.rewardDiamonds || 0),
                collection: updatedCollection // อัปเดต Array ที่จัดการแล้ว
            });

            // เพิ่มจำนวนการใช้งานโค้ดใบนี้
            await updateDoc(codeRef, { usedCount: increment(1) });
            
            // บันทึกประวัติการใช้โค้ดรายบุคคล
            await setDoc(historyRef, { redeemedAt: new Date().toISOString(), code: inputCode });

            alert(`🎉 แลกโค้ดสำเร็จ!\n🪙 ${codeData.rewardPoints || 0} Gold\n💎 ${codeData.rewardDiamonds || 0} Diamonds${cardInfo}`);
            window.location.href = "index.html";

        } catch (e) {
            alert("❌ " + e.message);
            btn.disabled = false;
            btnText.innerText = "ยืนยันแลกรับ";
            btnLoader.style.display = "none";
        }
    };
</script>
</body>
</html>
