<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEEM CODE - My Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffc831;
            --gold-dark: #e5b32a;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* เอฟเฟกต์พื้นหลังเรืองแสง */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 200, 49, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        .box { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 24px; 
            text-align: center; 
            border: 1px solid #333; 
            width: 100%;
            max-width: 350px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        .icon-header {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 200, 49, 0.3));
        }

        h2 { 
            color: var(--gold); 
            margin: 0 0 10px 0; 
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        .desc { font-size: 0.9rem; color: #888; margin-bottom: 25px; }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #333; 
            background: #000; 
            color: var(--gold); 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            box-sizing: border-box; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        input:focus { 
            outline: none; 
            border-color: var(--gold); 
            box-shadow: 0 0 15px rgba(255, 200, 49, 0.2);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 1.1rem; 
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255, 200, 49, 0.4);
        }

        button:active { transform: translateY(-1px); }

        button:disabled { 
            background: #444; 
            color: #888;
            cursor: not-allowed; 
            transform: none;
        }

        .back-link { 
            color: #666; 
            text-decoration: none; 
            margin-top: 25px; 
            display: inline-block; 
            font-size: 0.9rem; 
            transition: 0.3s;
        }

        .back-link:hover { color: var(--gold); }

        /* Animation Loading */
        .loader {
            width: 18px;
            height: 18px;
            border: 3px solid #111;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="icon-header">
            <i class="fas fa-ticket-alt"></i>
        </div>
        <h2>แลกโค้ดรางวัล</h2>
        <p class="desc">กรอกรหัสลับเพื่อรับไอเทมพิเศษ</p>
        
        <div class="input-wrapper">
            <input type="text" id="code-input" placeholder="GIFT2026" maxlength="20" autocomplete="off">
        </div>

        <button id="redeem-btn">
            <span class="loader" id="btn-loader"></span>
            <span id="btn-text">ยืนยันแลกรับ</span>
        </button>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
        } else {
            window.location.href = "login.html";
        }
    });

    document.getElementById("redeem-btn").onclick = async () => {
        const btn = document.getElementById("redeem-btn");
        const btnText = document.getElementById("btn-text");
        const btnLoader = document.getElementById("btn-loader");
        const inputCode = document.getElementById("code-input").value.trim().toUpperCase();

        if (!currentUserId) return alert("❌ กรุณาล็อกอินก่อนแลกโค้ด!");
        if (!inputCode) return alert("❌ กรุณากรอกโค้ด!");

        // Start Loading State
        btn.disabled = true;
        btnText.innerText = "กำลังตรวจสอบ...";
        btnLoader.style.display = "inline-block";

        try {
            // 1. ตรวจสอบโค้ดในคอลเลกชัน "codes"
            const codeRef = doc(db, "codes", inputCode);
            const codeSnap = await getDoc(codeRef);

            if (!codeSnap.exists()) {
                throw new Error("ไม่พบโค้ดนี้ หรือโค้ดอาจจะหมดอายุแล้ว");
            }

            const codeData = codeSnap.data();

            // 2. ตรวจสอบโควตาการใช้งานรวม (Global Limit)
            if (codeData.maxUse > 0 && codeData.usedCount >= codeData.maxUse) {
                throw new Error("ขออภัย โค้ดนี้มีผู้ใช้งานครบจำนวนแล้ว");
            }

            // 3. ตรวจสอบประวัติการใช้ส่วนตัว (ป้องกันใช้ซ้ำ)
            const historyRef = doc(db, "users", currentUserId, "used_codes", inputCode);
            const historySnap = await getDoc(historyRef);

            if (historySnap.exists()) {
                throw new Error("คุณเคยแลกรับโค้ดนี้ไปแล้ว!");
            }

            // 4. เตรียมข้อมูลการอัปเดต
            const userRef = doc(db, "users", currentUserId);
            const userUpdate = {
                points: increment(codeData.rewardPoints || 0),
                diamonds: increment(codeData.rewardDiamonds || 0),
                stars: increment(codeData.rewardStars || 0)
            };

            // 5. จัดการระบบการ์ดรางวัล
            let cardInfo = "";
            if (codeData.rewardCard && codeData.rewardCard.name) {
                const cardObj = {
                    ...codeData.rewardCard,
                    count: 1, // เริ่มต้นที่ 1 ใบ
                    obtainedDate: new Date().toLocaleDateString('th-TH'),
                    type: "Gift"
                };
                
                // ดึงข้อมูล collection ปัจจุบันมาตรวจสอบก่อน (เพื่อทำระบบ stack count)
                const userSnap = await getDoc(userRef);
                let currentCollection = userSnap.data().collection || [];
                
                const existingCardIdx = currentCollection.findIndex(c => 
                    c.name === cardObj.name && c.rarity === cardObj.rarity
                );

                if (existingCardIdx > -1) {
                    // ถ้ามีการ์ดอยู่แล้ว ให้ไปเพิ่ม count ในใบเดิม
                    currentCollection[existingCardIdx].count = (Number(currentCollection[existingCardIdx].count) || 1) + 1;
                    userUpdate.collection = currentCollection;
                } else {
                    // ถ้ายังไม่มี ให้เพิ่มใบใหม่เข้าไป
                    userUpdate.collection = arrayUnion(cardObj);
                }
                
                cardInfo = `\n🎴 การ์ด: ${codeData.rewardCard.name} (${codeData.rewardCard.rarity})`;
            }

            // 6. Execute Transaction (อัปเดตทุกอย่างพร้อมกัน)
            await updateDoc(userRef, userUpdate); 
            await updateDoc(codeRef, { usedCount: increment(1) });
            await setDoc(historyRef, { 
                redeemedAt: new Date().toISOString(),
                code: inputCode 
            });

            // Success Alert
            alert(`🎉 แลกโค้ดสำเร็จ!\n🪙 ${codeData.rewardPoints || 0} พอยท์\n💎 ${codeData.rewardDiamonds || 0} เพชร${cardInfo}`);
            window.location.href = "index.html";

        } catch (e) {
            alert("❌ " + e.message);
            // Reset Button State
            btn.disabled = false;
            btnText.innerText = "ยืนยันแลกรับ";
            btnLoader.style.display = "none";
        }
    };
</script>
</body>
</html>
