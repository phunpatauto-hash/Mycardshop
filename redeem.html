<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEEM CODE - My Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffc831;
            --gold-dark: #e5b32a;
            --bg: #0a0a0c;
            --card-bg: rgba(26, 26, 32, 0.9);
            --input-bg: #050505;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- Background Animation: Floating Tickets --- */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-ticket {
            position: absolute;
            color: rgba(255, 200, 49, 0.15);
            font-size: 2rem;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Redeem Card Box --- */
        .box { 
            background: var(--card-bg); 
            padding: 60px 40px; 
            border-radius: 40px; 
            text-align: center; 
            border: 2px solid rgba(255, 200, 49, 0.3); 
            width: 90%;
            max-width: 450px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(255, 200, 49, 0.1);
            backdrop-filter: blur(15px);
            position: relative;
            z-index: 10;
        }

        /* ตกแต่งกล่องให้ดูเหมือนตั๋ว (รอยบากด้านข้าง) */
        .box::before, .box::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            background: var(--bg);
            border-radius: 50%;
            top: 50%; transform: translateY(-50%);
            border: 2px solid rgba(255, 200, 49, 0.3);
        }
        .box::before { left: -22px; }
        .box::after { right: -22px; }

        .icon-header {
            font-size: 5rem;
            color: var(--gold);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 200, 49, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        h2 { 
            color: var(--gold); 
            margin: 0; 
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .desc { font-size: 1rem; color: #888; margin-bottom: 40px; letter-spacing: 1px; }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #333; 
            background: var(--input-bg); 
            color: var(--gold); 
            text-align: center; 
            font-size: 1.6rem; 
            font-weight: bold; 
            box-sizing: border-box; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        input:focus { 
            outline: none; 
            border-color: var(--gold); 
            box-shadow: 0 0 30px rgba(255, 200, 49, 0.2);
            transform: scale(1.02);
        }

        button { 
            width: 100%; 
            padding: 20px; 
            background: linear-gradient(135deg, var(--gold), #f39c12); 
            border: none; 
            border-radius: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 1.3rem; 
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(255, 200, 49, 0.2);
        }

        button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 200, 49, 0.4);
            filter: brightness(1.1);
        }

        button:active { transform: translateY(0); }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-link { 
            color: #666; 
            text-decoration: none; 
            margin-top: 35px; 
            display: inline-block; 
            font-size: 0.95rem; 
            transition: 0.3s;
            font-weight: 300;
        }

        .back-link:hover { color: var(--gold); }

        .loader {
            width: 22px; height: 22px;
            border: 3px solid #000;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-animate" id="bg-tickets"></div>

    <div class="box">
        <div class="icon-header">
            <i class="fas fa-ticket-alt"></i>
        </div>
        <h2>REDEEM</h2>
        <p class="desc">กรอกรหัสของคุณเพื่อรับของรางวัล</p>
        
        <div class="input-wrapper">
            <input type="text" id="code-input" placeholder="ENTER CODE" maxlength="20" autocomplete="off">
        </div>

        <button id="redeem-btn">
            <span class="loader" id="btn-loader"></span>
            <span id="btn-text">CLAIM REWARD</span>
        </button>

        <br>
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> BACK TO HOME</a>
    </div>

<script type="module">
    // --- สคริปต์สร้างตั๋วลอย (Floating Tickets) ---
    const bgContainer = document.getElementById('bg-tickets');
    const ticketIcons = ['fa-ticket-alt', 'fa-star', 'fa-gem', 'fa-coins'];

    function createFloatingIcon() {
        const icon = document.createElement('i');
        const randomIcon = ticketIcons[Math.floor(Math.random() * ticketIcons.length)];
        
        icon.className = `fas ${randomIcon} floating-ticket`;
        icon.style.left = Math.random() * 100 + 'vw';
        icon.style.animationDuration = (Math.random() * 3 + 5) + 's'; // 5-8 วินาที
        icon.style.opacity = Math.random() * 0.5;
        icon.style.fontSize = (Math.random() * 20 + 20) + 'px';
        
        bgContainer.appendChild(icon);

        // ลบออกเมื่ออนิเมชั่นจบ
        setTimeout(() => { icon.remove(); }, 8000);
    }

    setInterval(createFloatingIcon, 400); // สร้างไอคอนใหม่ทุกๆ 0.4 วินาที

    // --- Firebase Logic ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
        }
    });

    document.getElementById("redeem-btn").onclick = async () => {
        const btn = document.getElementById("redeem-btn");
        const btnText = document.getElementById("btn-text");
        const btnLoader = document.getElementById("btn-loader");
        const inputCode = document.getElementById("code-input").value.trim().toUpperCase();

        if (!currentUserId) return alert("❌ กรุณาล็อกอินก่อนแลกโค้ด!");
        if (!inputCode) return alert("❌ กรุณากรอกโค้ด!");

        btn.disabled = true;
        btnText.innerText = "CHECKING...";
        btnLoader.style.display = "inline-block";

        try {
            const codeRef = doc(db, "codes", inputCode);
            const codeSnap = await getDoc(codeRef);

            if (!codeSnap.exists()) throw new Error("ไม่พบโค้ดนี้ หรือโค้ดอาจจะหมดอายุแล้ว");

            const codeData = codeSnap.data();
            
            if (codeData.maxUse > 0 && codeData.usedCount >= codeData.maxUse) {
                throw new Error("ขออภัย โค้ดนี้มีผู้ใช้งานครบจำนวนแล้ว");
            }

            const historyRef = doc(db, "users", currentUserId, "used_codes", inputCode);
            const historySnap = await getDoc(historyRef);
            if (historySnap.exists()) throw new Error("คุณเคยแลกรับโค้ดนี้ไปแล้ว!");

            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) throw new Error("ไม่พบข้อมูลผู้ใช้งาน");
            
            const userData = userSnap.data();
            let currentCollection = userData.collection || [];
            let updatedCollection = [...currentCollection];
            let cardInfo = "";

            if (codeData.rewardCard && codeData.rewardCard.name) {
                const rewardAmount = Number(codeData.rewardCard.count) || 1;
                const newCardEntry = {
                    name: codeData.rewardCard.name,
                    rarity: (codeData.rewardCard.rarity || "C").toUpperCase(),
                    img: codeData.rewardCard.img || codeData.rewardCard.image || "", 
                    level: 1,
                    stars: 0,
                    obtainedDate: new Date().toLocaleDateString('th-TH'),
                    type: "Gift"
                };

                for (let i = 0; i < rewardAmount; i++) {
                    updatedCollection.push({ ...newCardEntry });
                }
                cardInfo = `\n🎴 การ์ด: ${codeData.rewardCard.name} (x${rewardAmount})`;
            }

            await updateDoc(userRef, {
                points: increment(codeData.rewardPoints || 0),
                diamonds: increment(codeData.rewardDiamonds || 0),
                collection: updatedCollection 
            });

            await updateDoc(codeRef, { usedCount: increment(1) });
            await setDoc(historyRef, { redeemedAt: new Date().toISOString(), code: inputCode });

            alert(`🎉 แลกโค้ดสำเร็จ!\n🪙 ${codeData.rewardPoints || 0} Gold\n💎 ${codeData.rewardDiamonds || 0} Diamonds${cardInfo}`);
            window.location.href = "index.html";

        } catch (e) {
            alert("❌ " + e.message);
            btn.disabled = false;
            btnText.innerText = "CLAIM REWARD";
            btnLoader.style.display = "none";
        }
    };
</script>
</body>
</html>
