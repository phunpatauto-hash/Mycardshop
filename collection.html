<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY COLLECTION - Glow Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- โครงสร้างหลัก --- */
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); color: white; text-align: center; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; pointer-events: none; z-index: -1; }

        .navbar { background-color: rgba(10, 10, 15, 0.8); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,200,49,0.2); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .user-name-tag { color: #ffc831; font-weight: bold; font-size: 1rem; text-align: left; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 5px; }
        .btn-nav { background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 12px; text-decoration: none; font-size: 0.8rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-nav:hover { background: #ffc831; color: #000; }
        .btn-nav.primary { background: #ffc831; color: #000; border: none; }
        
        .wallet-display { display: flex; gap: 12px; align-items: center; }
        .wallet-box { background: rgba(0, 0, 0, 0.3); padding: 6px 15px; border-radius: 20px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
        
        /* --- Leaderboard Popup --- */
        .lb-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2500; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(15px); }
        .lb-content { background: #1a1a2e; border-radius: 25px; max-width: 500px; width: 100%; overflow: hidden; border: 2px solid #ffc831; box-shadow: 0 0 40px rgba(255, 200, 49, 0.2); }
        .lb-header { background: linear-gradient(90deg, #1a1a2e, #302b63); padding: 15px 20px; border-bottom: 2px solid #ffc831; display: flex; justify-content: space-between; align-items: center; }
        .lb-title { color: #ffc831; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,200,49,0.5); }
        .btn-close-lb { background: none; color: #aaa; border: none; font-size: 1.5rem; cursor: pointer; }
        .lb-table-wrapper { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .lb-table { width: 100%; border-collapse: collapse; text-align: left; }
        .lb-table th { color: #ffc831; padding: 10px; border-bottom: 2px solid rgba(255,255,255,0.1); font-size: 0.85rem; text-transform: uppercase; }
        .lb-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .rank-medal { font-size: 1.3rem; }
        .p-count-tag { background: #ffc831; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin-right: 5px; box-shadow: 0 0 8px #ffc831; }
        .btn-lb-open { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border: 1px solid #00d4ff; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-lb-open:hover { transform: scale(1.05); background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        /* --- Progress & Filters --- */
        .progress-section { max-width: 1200px; margin: 20px auto; padding: 0 20px; text-align: left; }
        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff8c00); width: 0%; transition: 1s; box-shadow: 0 0 10px #ffc831; }
        .filter-bar { max-width: 1200px; margin: 15px auto; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 10px; }
        .filter-btn { padding: 8px 20px; border-radius: 25px; border: 2px solid #333; background: #1a1a1a; color: #888; cursor: pointer; transition: 0.3s; font-size: 0.85rem; font-weight: bold; box-shadow: 0 4px 0 #000; transform: translateY(-2px); }
        .filter-btn:active { transform: translateY(0px); box-shadow: 0 1px 0 #000; }
        .filter-btn.active { background: rgba(255, 255, 255, 0.1); transform: translateY(0px); box-shadow: 0 0 15px currentColor; }
        
        .btn-mass-upgrade { background: linear-gradient(45deg, #00d4ff, #0055ff); color: white; border: none; padding: 8px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); }
        .btn-mass-sell { background: linear-gradient(45deg, #ff8c00, #ff4444); color: white; border: none; padding: 8px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3); margin-left: 5px; }
        .btn-mass-upgrade:hover, .btn-mass-sell:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-mass-upgrade:disabled, .btn-mass-sell:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; filter: none; }

        /* --- Grid & Cards --- */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .col-card { background: rgba(255, 255, 255, 0.03); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.4s; cursor: pointer; }
        .col-card:hover { transform: translateY(-10px) scale(1.02); z-index: 10; }
        .col-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .rarity-p { border: 2px solid #e5e4e2; box-shadow: 0 0 15px rgba(229, 228, 226, 0.4); }
        .rarity-exr { border: 2px solid #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        .rarity-sec { border: 2px solid #a020f0; box-shadow: 0 0 15px rgba(160, 32, 240, 0.4); }
        .rarity-ur { border: 2px solid #ffbb00; box-shadow: 0 0 20px rgba(255, 187, 0, 0.5); animation: ur-glow 2s infinite ease-in-out; }
        @keyframes ur-glow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
        .rarity-sur { border: 2px solid #dfacff; }
        .rarity-ssr { border: 2px solid #ff4444; }
        .rarity-sr { border: 2px solid #ffc831; }
        .rarity-r { border: 2px solid #4facfe; }
        .card-info { padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; text-align: left; }
        .card-name { font-size: 0.85rem; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qty-badge { position: absolute; top: 10px; right: 10px; background: #ffc831; color: #000; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; border: 2px solid #000; z-index: 4; }
        .lvl-badge { position: absolute; bottom: 50px; right: 10px; background: #fff; color: #000; font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 5px; box-shadow: 0 0 10px rgba(255,255,255,0.5); z-index: 4; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border-radius: 25px; max-width: 380px; width: 100%; overflow: hidden; border: 1px solid #ffc831; text-align: left; }
        .btn-upgrade { background: linear-gradient(45deg, #ff0055, #ff8c00); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-delete { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; width: 100%; padding: 10px; border-radius: 12px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="user-info">
            <div class="user-name-tag" id="display-username">Loading...</div>
            <div class="nav-buttons">
                <a href="index.html" class="btn-nav">เมนูหลัก</a>
                <a href="Banner Selection.html" class="btn-nav primary">สุ่มการ์ด</a>
            </div>
        </div>
        <div class="wallet-display">
            <div class="wallet-box" style="border-color: #ffc831;">🪙 <span id="nav-points">0</span></div>
            <div class="wallet-box" style="border-color: #00d4ff;">💎 <span id="nav-diamonds">0</span></div>
            <div class="wallet-box" style="border-color: #4facfe;">⭐ <span id="nav-stars">0</span></div>
            <button class="btn-lb-open" onclick="openLeaderboard()">⚔️ อันดับการแข่งขัน</button>
        </div>
    </nav>

    <div id="lbModal" class="lb-modal" onclick="closeLeaderboard()">
        <div class="lb-content" onclick="event.stopPropagation()">
            <div class="lb-header">
                <div class="lb-title">⚔️ SEASONAL RANKING</div>
                <button class="btn-close-lb" onclick="closeLeaderboard()">&times;</button>
            </div>
            <div class="lb-table-wrapper">
                <table class="lb-table">
                    <thead>
                        <tr>
                            <th>อันดับ</th>
                            <th>ผู้เข้าแข่งขัน</th>
                            <th style="text-align: right;">แต้มพลัง P</th>
                        </tr>
                    </thead>
                    <tbody id="lb-body">
                        <tr><td colspan="3">กำลังดึงข้อมูลสนามแข่ง...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="progress-section">
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem;">
            <span>คอลเลกชัน (<span id="filter-label" style="color:#ffc831">ALL</span>)</span>
            <span id="collection-count">0 / 0 แบบ</span>
        </div>
        <div class="progress-bar-bg"><div id="progress-fill" class="progress-fill"></div></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" style="color: #ffc831; border-color: #ffc831;" onclick="setFilter('ALL')">ALL</button>
        <button class="filter-btn" style="color: #e5e4e2; border-color: #e5e4e2;" onclick="setFilter('P')">P</button>
        <button class="filter-btn" style="color: #00d4ff; border-color: #00d4ff;" onclick="setFilter('EXR')">EXR</button>
        <button class="filter-btn" style="color: #a020f0; border-color: #a020f0;" onclick="setFilter('SEC')">SEC</button>
        <button class="filter-btn" style="color: #ffbb00; border-color: #ffbb00;" onclick="setFilter('UR')">UR</button>
        <button class="filter-btn" style="color: #dfacff; border-color: #dfacff;" onclick="setFilter('SUR')">SUR</button>
        <button class="filter-btn" style="color: #ff4444; border-color: #ff4444;" onclick="setFilter('SSR')">SSR</button>
        <button class="filter-btn" style="color: #ffc831; border-color: #ffc831;" onclick="setFilter('SR')">SR</button>
        <button class="filter-btn" style="color: #4facfe; border-color: #4facfe;" onclick="setFilter('R')">R</button>
        <button class="filter-btn" style="color: #999; border-color: #555;" onclick="setFilter('U')">U</button>
        <button class="filter-btn" style="color: #666; border-color: #444;" onclick="setFilter('C')">C</button>
        <button id="massUpgradeBtn" class="btn-mass-upgrade" onclick="handleMassUpgrade()">⚡ อัปเกรดทั้งหมด</button>
        <button id="massSellBtn" class="btn-mass-sell" onclick="handleMassSell()">💰 ขายของซ้ำ</button>
    </div>

    <div class="container"><div id="grid" class="collection-grid"></div></div>

    <div id="cardModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImg" src="" style="width: 100%; border-bottom: 3px solid #ffc831; aspect-ratio: 2/3; object-fit: cover;">
            <div style="padding: 20px;">
                <h2 id="modalName" style="margin:0; color:#ffc831;">Name</h2>
                <p id="modalRarity" style="font-weight: bold; margin: 5px 0;"></p>
                <p id="modalLvl" style="font-weight: bold; margin: 0;">LV. 1</p>
                <div class="source-tag">📍 <span id="modalSource">ตู้สุ่ม</span></div>
                <button id="upgradeBtn" class="btn-upgrade">✨ อัปเกรดเลเวล (ใช้ซ้ำ 5 ใบ)</button>
                <button id="deleteBtn" class="btn-delete">🗑️ ย่อยการ์ดนี้</button>
                <button class="btn-nav primary" style="width:100%; margin-top:10px; padding:12px;" onclick="document.getElementById('cardModal').style.display='none'">กลับ</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null;
    let userCards = [];
    let currentFilter = 'ALL';

    async function updateLeaderboard() {
        const lbBody = document.getElementById("lb-body");
        try {
            const querySnapshot = await getDocs(collection(db, "users"));
            let leaderboardData = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const cards = data.collection || [];
                const pCount = cards.filter(c => (c.rarity || '').toUpperCase() === 'P').length;
                if (pCount > 0) leaderboardData.push({ username: data.username || "Unknown Participant", pCount: pCount });
            });
            leaderboardData.sort((a, b) => b.pCount - a.pCount);
            lbBody.innerHTML = leaderboardData.slice(0, 10).map((user, index) => {
                let rankDisplay = index + 1;
                let rankClass = index < 3 ? "rank-medal" : "";
                if (index === 0) rankDisplay = "🥇";
                else if (index === 1) rankDisplay = "🥈";
                else if (index === 2) rankDisplay = "🥉";
                return `<tr style="background: rgba(255,255,255,${index % 2 === 0 ? '0.02' : '0'});">
                    <td class="${rankClass}" style="font-weight: bold;">${rankDisplay}</td>
                    <td style="color: ${index < 3 ? '#fff' : '#ccc'}">${user.username}</td>
                    <td style="text-align: right; font-weight: bold; color: #ffc831;"><span class="p-count-tag">P</span> ${user.pCount.toLocaleString()}</td>
                </tr>`;
            }).join('') || "<tr><td colspan='3' style='padding:20px;'>ยังไม่มีผู้เข้าแข่งขันในสนามนี้</td></tr>";
        } catch (e) { lbBody.innerHTML = "<tr><td colspan='3'>Error loading arena data...</td></tr>"; }
    }

    window.openLeaderboard = () => { updateLeaderboard(); document.getElementById("lbModal").style.display = "flex"; };
    window.closeLeaderboard = () => document.getElementById("lbModal").style.display = "none";

    function getCardPrice(rarity) {
        const prices = { 'P': 50000, 'EXR': 20000, 'SEC': 15000, 'UR': 10000, 'SUR': 5000, 'SSR': 2000, 'SR': 1000, 'R': 500, 'U': 100, 'C': 50 };
        return prices[rarity.toUpperCase()] || 50;
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById("display-username").innerText = "Collector: " + (data.username || "User");
                    document.getElementById("nav-points").innerText = (data.points || 0).toLocaleString();
                    document.getElementById("nav-diamonds").innerText = (data.diamonds || 0).toLocaleString();
                    document.getElementById("nav-stars").innerText = (data.stars || 0).toLocaleString();
                    userCards = data.collection || [];
                    renderCards();
                }
            });
        } else { window.location.href = 'login.html'; }
    });

    window.setFilter = (f) => {
        currentFilter = f;
        document.getElementById("filter-label").innerText = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.innerText === f));
        renderCards();
    };

    function renderCards() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        const stacked = {};
        
        userCards.forEach(c => {
            const rarity = (c.rarity || 'C').toUpperCase();
            const key = `${c.name}_${rarity}`;
            if(!stacked[key]) {
                stacked[key] = { ...c, rarity: rarity, qty: 1, level: c.level || 1, img: c.img || c.image };
            } else {
                stacked[key].qty++;
                if((c.level || 1) > stacked[key].level) stacked[key].level = c.level;
            }
        });

        // ระบบเรียงลำดับตามระดับที่ต้องการ
        const rarityOrder = { 
            'EXR': 1, 'SEC': 2, 'SUR': 3, 'SSR': 4, 
            'UR': 5, 'SR': 6, 'R': 7, 'U': 8, 'C': 9, 'P': 10 
        };

        let displayList = Object.values(stacked);
        
        // Sorting Logic: ระดับการ์ด > เลเวลการ์ด > ชื่อการ์ด
        displayList.sort((a, b) => {
            const orderA = rarityOrder[a.rarity] || 99;
            const orderB = rarityOrder[b.rarity] || 99;
            if (orderA !== orderB) return orderA - orderB;
            if (b.level !== a.level) return b.level - a.level;
            return a.name.localeCompare(b.name);
        });

        const totalTypes = displayList.length;
        document.getElementById("massUpgradeBtn").disabled = !displayList.some(c => c.qty >= 5 && c.level < 20);
        document.getElementById("massSellBtn").disabled = userCards.length <= totalTypes;

        if (currentFilter !== 'ALL') displayList = displayList.filter(c => c.rarity === currentFilter);
        
        document.getElementById("collection-count").innerText = `${displayList.length} / ${totalTypes} แบบ`;
        document.getElementById("progress-fill").style.width = totalTypes > 0 ? (displayList.length/totalTypes*100)+"%" : "0%";
        
        displayList.forEach(card => {
            const div = document.createElement("div");
            div.className = `col-card rarity-${card.rarity.toLowerCase()}`;
            div.onclick = () => openModal(card);
            div.innerHTML = `${card.qty > 1 ? `<div class="qty-badge">x${card.qty}</div>` : ''}<div class="lvl-badge">LV.${card.level}</div><img src="${card.img}" loading="lazy"><div class="card-info"><div class="card-name">${card.name}</div></div>`;
            grid.appendChild(div);
        });
    }

    window.handleMassUpgrade = async () => {
        if(!confirm("ต้องการอัปเกรดการ์ดทั้งหมดที่ซ้ำเกิน 5 ใบใช่หรือไม่?")) return;
        let tempCollection = [...userCards];
        let totalUpgraded = 0;
        let continueLoop = true;
        while(continueLoop) {
            let upgradedInThisTurn = false;
            const counts = {};
            tempCollection.forEach((c, index) => {
                const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
                if(!counts[key]) counts[key] = [];
                counts[key].push(index);
            });
            for(const key in counts) {
                const indices = counts[key];
                if(indices.length >= 5) {
                    let highestLvl = 0;
                    indices.forEach(idx => { if((tempCollection[idx].level || 1) > highestLvl) highestLvl = tempCollection[idx].level || 1; });
                    if(highestLvl < 20) {
                        const toDelete = indices.slice(0, 5).sort((a,b) => b-a);
                        const baseCard = { ...tempCollection[toDelete[0]] };
                        toDelete.forEach(idx => tempCollection.splice(idx, 1));
                        tempCollection.push({ ...baseCard, level: highestLvl + 1 });
                        upgradedInThisTurn = true;
                        totalUpgraded++;
                        break;
                    }
                }
            }
            if(!upgradedInThisTurn) continueLoop = false;
        }
        if(totalUpgraded > 0) {
            await updateDoc(doc(db, "users", currentUID), { collection: tempCollection });
            alert(`สำเร็จ! อัปเกรดการ์ดไปทั้งหมด ${totalUpgraded} ครั้ง`);
        }
    };

    window.handleMassSell = async () => {
        if(!confirm("ต้องการขายการ์ดที่ซ้ำทั้งหมด (เก็บใบที่เลเวลสูงสุดไว้) ใช่หรือไม่?")) return;
        let totalGoldGain = 0;
        const bestCards = {};
        userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            if(!bestCards[key] || (c.level || 1) > (bestCards[key].level || 1)) {
                if(bestCards[key]) totalGoldGain += getCardPrice(bestCards[key].rarity || 'C');
                bestCards[key] = c;
            } else {
                totalGoldGain += getCardPrice(c.rarity || 'C');
            }
        });
        if (totalGoldGain > 0) {
            await updateDoc(doc(db, "users", currentUID), { collection: Object.values(bestCards), points: increment(totalGoldGain) });
            alert(`ขายสำเร็จ! ได้รับเงินคืน ${totalGoldGain.toLocaleString()} 🪙`);
        } else { alert("ไม่มีการ์ดซ้ำ"); }
    };

    window.openModal = (card) => {
        document.getElementById("modalImg").src = card.img;
        document.getElementById("modalName").innerText = card.name;
        const rEl = document.getElementById("modalRarity");
        rEl.innerText = "GRADE: " + card.rarity;
        const colors = { 'P': '#e5e4e2', 'EXR': '#00d4ff', 'SEC': '#a020f0', 'UR': '#ffbb00', 'SUR': '#dfacff', 'SSR': '#ff4444', 'SR': '#ffc831', 'R': '#4facfe', 'U': '#999', 'C': '#666' };
        rEl.style.color = colors[card.rarity] || '#ffffff';
        document.getElementById("modalLvl").innerText = "LEVEL: " + card.level;
        document.getElementById("modalSource").innerText = card.source || "ตู้สุ่ม";
        const upBtn = document.getElementById("upgradeBtn");
        upBtn.disabled = card.qty < 5 || card.level >= 20;
        upBtn.innerText = card.level >= 20 ? "⭐ MAX LEVEL" : (card.qty < 5 ? `ขาดอีก ${5-card.qty} ใบ` : "✨ อัปเกรด (ใช้ 5 ใบ)");
        const delBtn = document.getElementById("deleteBtn");
        delBtn.innerText = `🗑️ ย่อยการ์ดนี้เพื่อรับ ${getCardPrice(card.rarity).toLocaleString()} 🪙`;
        upBtn.onclick = () => handleUpgrade(card);
        delBtn.onclick = () => handleDelete(card);
        document.getElementById("cardModal").style.display = "flex";
    };

    async function handleUpgrade(card) {
        if(!confirm("ยืนยันการอัปเกรดโดยใช้การ์ดชื่อเดียวกัน 5 ใบ?")) return;
        const targetRarity = card.rarity.toUpperCase();
        const materials = userCards.filter(c => c.name === card.name && (c.rarity || 'C').toUpperCase() === targetRarity);
        if (materials.length < 5) return;
        let highestLvl = 0;
        materials.forEach(m => { if((m.level || 1) > highestLvl) highestLvl = m.level; });
        let removed = 0;
        const newCol = userCards.filter(c => {
            if (removed < 5 && c.name === card.name && (c.rarity || 'C').toUpperCase() === targetRarity) { removed++; return false; }
            return true;
        });
        newCol.push({ ...card, level: highestLvl + 1 });
        await updateDoc(doc(db, "users", currentUID), { collection: newCol });
        document.getElementById("cardModal").style.display = "none";
    }

    async function handleDelete(card) {
        const sellPrice = getCardPrice(card.rarity);
        if(!confirm(`ย่อยการ์ด ${card.name} รับ ${sellPrice.toLocaleString()} 🪙?`)) return;
        let removed = false;
        const newCol = userCards.filter(c => {
            if(!removed && c.name === card.name && (c.rarity || 'C').toUpperCase() === card.rarity && (c.level || 1) === card.level) { removed = true; return false; }
            return true;
        });
        if (removed) {
            await updateDoc(doc(db, "users", currentUID), { collection: newCol, points: increment(sellPrice) });
            document.getElementById("cardModal").style.display = "none";
        }
    }
</script>
</body>
</html>
