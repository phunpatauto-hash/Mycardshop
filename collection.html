<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY COLLECTION - Arena Sync System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        /* Navbar */
        .navbar { 
            background-color: rgba(10, 10, 15, 0.9); 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ffc831; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            height: 85px; 
        }
        .user-name-tag { color: #ffc831; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 5px; }
        .btn-nav { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-nav.primary { background: linear-gradient(45deg, #ffc831, #ff9000); color: #000; border: none; }
        .wallet-display { display: flex; gap: 15px; }
        .wallet-box { background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 25px; border: 1.5px solid #333; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        
        /* Rainbow Effects */
        @keyframes rainbow-rotate { 100% { filter: hue-rotate(360deg); } }
        .rainbow-effect { 
            border: 3px solid transparent !important; 
            background: linear-gradient(#111, #111) padding-box, conic-gradient(from 0deg, red, yellow, lime, aqua, blue, magenta, red) border-box !important; 
            animation: rainbow-rotate 3s linear infinite; 
        }
        .rainbow-text { 
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-size: 200% auto; animation: rainbow-rotate 2s linear infinite; 
        }

        /* Filter Bar */
        .filter-bar { max-width: 1200px; margin: 25px auto; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .filter-btn { padding: 8px 18px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #aaa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { border-color: #ffc831; color: #fff; background: rgba(255,200,49,0.1); }

        /* Grid & Cards */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .col-card { 
            background: #111; border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; cursor: pointer; 
        }
        .col-card:hover { transform: translateY(-5px); border-color: #ffc831; }
        .col-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .qty-badge { position: absolute; top: 8px; right: 8px; background: #ffc831; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; z-index: 5; border: 1px solid #000; }
        .star-container { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 8px; color: #ffc831; font-size: 0.7rem; z-index: 5; }

        /* --- Price Style --- */
        .price-tag {
            font-size: 0.7rem;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .modal-price-info {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid #00ff88;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0f; border-radius: 25px; max-width: 800px; width: 100%; display: flex; overflow: hidden; border: 1px solid #333; }
        .modal-left { width: 40%; background: #000; position: relative; }
        .modal-right { width: 60%; padding: 30px; display: flex; flex-direction: column; }
        
        /* Stats Arena Style */
        .arena-stats { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border-left: 4px solid #ffc831; }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; color: #ffc831; }
        .stat-lbl { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }

        .lvl-bar-bg { width: 100%; height: 10px; background: #222; border-radius: 10px; margin: 5px 0; overflow: hidden; }
        .lvl-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); width: 0%; transition: 0.5s; }

        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-lv { background: #0066ff; color: white; }
        .btn-star { background: #ff9900; color: black; }
        .btn-sell-all { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { .modal-content { flex-direction: column; overflow-y: auto; } .modal-left, .modal-right { width: 100%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="user-info">
            <div class="user-name-tag" id="display-username">กำลังโหลด...</div>
            <div class="nav-buttons">
                <a href="index.html" class="btn-nav">🏠 HOME</a>
                <a href="Banner Selection.html" class="btn-nav primary">สุ่มการ์ด</a>
            </div>
        </div>
        <div class="wallet-display">
            <div class="wallet-box" style="color: #ffc831;">🪙 <span id="nav-points">0</span></div>
            <div class="wallet-box" style="color: #00d4ff;">💎 <span id="nav-diamonds">0</span></div>
        </div>
    </nav>

    <div class="filter-bar">
        <div id="filterContainer"></div>
        <button id="btnSellAll" class="btn-sell-all">💰 ขายใบซ้ำทั้งหมด</button>
    </div>

    <div class="container">
        <div id="grid" class="collection-grid"></div>
    </div>

    <div id="cardModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" id="modalMainBox" onclick="event.stopPropagation()">
            <div class="modal-left">
                <img id="modalImg" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="modal-right">
                <div>
                    <h2 id="modalName" style="margin:0;">Name</h2>
                    <div id="modalRarity" style="font-weight: bold; letter-spacing: 1px; margin-bottom: 15px;">GRADE: -</div>
                </div>

                <div style="margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                        <span id="modalLvlDisplay" style="color:#00d4ff; font-weight: bold;">LV. 1</span>
                        <span style="color:#555;">MAX 50</span>
                    </div>
                    <div class="lvl-bar-bg"><div id="lvlBarFill" class="lvl-bar-fill"></div></div>
                </div>

                <div class="arena-stats">
                    <div class="stat-item">
                        <span class="stat-lbl">⚡ Battle Power (Auction Value)</span>
                        <span id="modalPower" class="stat-val">0</span>
                    </div>
                </div>
                
                <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; font-size: 0.9rem;">
                    <div>🎴 ครอบครอง: <span id="reqQty">0</span> ใบ</div>
                    <div id="modalUpgradeInfo" style="color: #00ff88; margin-top: 5px; font-weight: bold;">-</div>
                </div>

                <div id="modalSellPrice" class="modal-price-info"></div>

                <div id="lvUpgradeGroup" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btnUpgradeLV" class="btn-action btn-lv" style="flex:2;">⚡ เลเวลอัป</button>
                    <button id="btnBulkUpgrade" class="btn-action btn-lv" style="flex:1; background: #00ff88; color: #000;">MAX</button>
                </div>
                <button id="btnUpgradeStar" class="btn-action btn-star" style="display:none;">⭐ วิวัฒนาการดาว</button>
                <div id="maxLevelMessage" style="display:none; text-align:center; color:#ffc831; font-weight:bold; margin-top:15px;"></div>
                
                <button class="btn-nav" style="margin-top:20px; width: 100%;" onclick="document.getElementById('cardModal').style.display='none'">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", 
        authDomain: "sign-up-73f99.firebaseapp.com", 
        projectId: "sign-up-73f99", 
        storageBucket: "sign-up-73f99.appspot.com", 
        messagingSenderId: "916335559099", 
        appId: "1:916335559099:web:3a8ed896ba26e38991849e" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null, userCards = [], userPoints = 0, userDiamonds = 0, currentFilter = 'ALL';
    const MAX_LV = 50;

    const RARITY_POWER = {
        "P":   { base: 5000, perLv: 1000 },
        "EXR": { base: 4000, perLv: 2500 }, 
        "SEC": { base: 3200, perLv: 2000 },
        "SUR": { base: 2600, perLv: 1800 },
        "SSR": { base: 2000, perLv: 1500 },
        "UR":  { base: 1500, perLv: 1200 },
        "SR":  { base: 1000, perLv: 1000 },
        "R":   { base: 600,  perLv: 800 },
        "U":   { base: 300,  perLv: 500 },
        "C":   { base: 100,  perLv: 300 }
    };

    const rarityColors = { 'P': '#ff00ff', 'EXR': '#ff4d4d', 'SEC': '#ffac33', 'SUR': '#33ffad', 'SSR': '#ffc831', 'UR': '#bf40bf', 'SR': '#33aaff', 'R': '#33ff57', 'U': '#ffffff', 'C': '#ffffff' };
    const sellValuesBase = { 'P': 10000, 'EXR': 50000, 'SEC': 25000, 'SUR': 15000, 'SSR': 1000, 'UR': 1200, 'SR': 1000, 'R': 500, 'U': 200, 'C': 100 };

    function getDynamicSellValue(card) {
        const base = sellValuesBase[card.rarity.toUpperCase()] || 100;
        const lv = Number(card.level) || 1;
        const bonus = (lv - 1) * 0.1; 
        return Math.floor(base * (1 + bonus));
    }

    function getArenaPower(card) {
        const r = (card.rarity || 'C').toUpperCase();
        const config = RARITY_POWER[r] || RARITY_POWER['C'];
        const lv = Number(card.level) || 1;
        const stars = Number(card.stars) || 0;
        const basePower = config.base + (lv * config.perLv);
        const starBonus = 1 + (stars * 0.1);
        return Math.floor(basePower * starBonus);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    userPoints = data.points || 0;
                    userDiamonds = data.diamonds || 0;
                    userCards = data.collection || [];
                    document.getElementById("nav-points").innerText = userPoints.toLocaleString();
                    document.getElementById("nav-diamonds").innerText = userDiamonds.toLocaleString();
                    document.getElementById("display-username").innerText = (data.username || "COLLECTOR");
                    renderCards();
                }
            });
        }
    });

    function renderCards() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        const stacked = {};

        userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            const count = Number(c.count) || 1;
            if(!stacked[key]) { 
                stacked[key] = { ...c, qty: count, level: Number(c.level)||1, stars: Number(c.stars)||0 }; 
            } else { 
                stacked[key].qty += count;
                if(Number(c.level) > stacked[key].level) stacked[key].level = Number(c.level);
                if(Number(c.stars) > stacked[key].stars) stacked[key].stars = Number(c.stars);
            }
        });

        let list = Object.values(stacked).sort((a, b) => {
            const rarityOrder = { 'P': 13, 'USEC': 12, 'EXR': 11, 'CBR': 10, 'SEC': 9, 'SUR': 8, 'SSR': 7, 'PR': 6, 'UR': 5, 'SR': 4, 'R': 3, 'U': 2, 'C': 1 };
            const weightA = rarityOrder[a.rarity.toUpperCase()] || 0;
            const weightB = rarityOrder[b.rarity.toUpperCase()] || 0;
            if (weightA !== weightB) return weightB - weightA;
            return getArenaPower(b) - getArenaPower(a); 
        });

        if (currentFilter !== 'ALL') {
            list = list.filter(c => c.rarity.toUpperCase() === currentFilter.toUpperCase());
        }
        
        list.forEach(card => {
            const pwr = getArenaPower(card);
            const sellVal = getDynamicSellValue(card);
            const div = document.createElement("div");
            const isMax = card.level >= MAX_LV && card.stars >= 5;
            div.className = `col-card ${isMax ? 'rainbow-effect' : ''}`;
            div.onclick = () => openModal(card);
            
            div.innerHTML = `
                ${card.qty > 1 ? `<div class="qty-badge">x${card.qty}</div>` : ''}
                ${card.stars > 0 ? `<div class="star-container">${'⭐'.repeat(card.stars)}</div>` : ''}
                <img src="${card.img || card.image}">
                <div style="padding:10px; background: rgba(0,0,0,0.85);">
                    <div style="color:${rarityColors[card.rarity]}; font-size:0.75rem; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${card.name}</div>
                    <div style="margin-top:4px; font-size:0.7rem; color:#ffc831; font-weight:bold;">⚡ ${pwr.toLocaleString()}</div>
                    <div class="price-tag">💰 ${sellVal.toLocaleString()}</div>
                </div>`;
            grid.appendChild(div);
        });
    }

    window.openModal = (card) => {
        const r = card.rarity.toUpperCase();
        const pwr = getArenaPower(card);
        const sellVal = getDynamicSellValue(card);
        const isMax = card.level >= MAX_LV && card.stars >= 5;
        
        document.getElementById("modalMainBox").className = `modal-content ${isMax?'rainbow-effect':''}`;
        document.getElementById("modalName").className = isMax?'rainbow-text':'';
        document.getElementById("modalName").style.color = isMax?'':rarityColors[r];
        document.getElementById("modalImg").src = card.img || card.image;
        document.getElementById("modalName").innerText = card.name;
        document.getElementById("modalRarity").innerText = "GRADE: " + r;
        document.getElementById("modalRarity").style.color = rarityColors[r];
        document.getElementById("modalPower").innerText = pwr.toLocaleString();
        document.getElementById("modalLvlDisplay").innerText = "LV. " + card.level;
        document.getElementById("lvlBarFill").style.width = (card.level/MAX_LV*100) + "%";
        document.getElementById("reqQty").innerText = card.qty;

        document.getElementById("modalSellPrice").innerHTML = `
            <div style="color:#aaa; font-size:0.8rem;">มูลค่าการขายปัจจุบัน (LV.${card.level}):</div>
            <div style="color:#00ff88; font-weight:bold; font-size:1.1rem;">${sellVal.toLocaleString()} 🪙 / ใบ</div>
            <div style="font-size:0.7rem; color:#888;">*ราคาขายจะเพิ่มขึ้น 10% ทุกครั้งที่เลเวลอัป</div>
        `;

        const lvGroup = document.getElementById("lvUpgradeGroup"), starBtn = document.getElementById("btnUpgradeStar"), maxMsg = document.getElementById("maxLevelMessage");
        
        if (card.level < MAX_LV) {
            lvGroup.style.display = "flex"; starBtn.style.display = "none"; maxMsg.style.display = "none";
            let req = card.level >= 30 ? 3 : (card.level >= 10 ? 2 : 1);
            document.getElementById("modalUpgradeInfo").innerText = `เงื่อนไข: ใช้ใบซ้ำ ${req} ใบ + 500 🪙`;
            document.getElementById("btnUpgradeLV").onclick = () => handleUpgrade(card, 'LV', 500, req);
            document.getElementById("btnBulkUpgrade").onclick = () => handleUpgrade(card, 'BULK', 500, req);
        } else {
            lvGroup.style.display = "none"; starBtn.style.display = "block";
            if (card.stars < 5) {
                const cost = (card.stars + 1) * 1000;
                maxMsg.style.display = "block"; maxMsg.innerText = "✨ พร้อมวิวัฒนาการดาว ✨";
                starBtn.innerText = `⭐ อัปดาว (5 ใบ + ${cost} 💎)`;
                starBtn.onclick = () => handleUpgrade(card, 'STAR', cost, 5);
            } else {
                maxMsg.style.display = "block"; maxMsg.innerText = "🌈 FULL MAX POWER 🌈";
                starBtn.style.display = "none";
            }
        }
        document.getElementById("cardModal").style.display = "flex";
    };

    async function handleUpgrade(card, type, cost, req) {
        let all = []; userCards.forEach(c => { for(let i=0; i<(c.count||1); i++) all.push({...c, count:1}); });
        let targets = all.filter(c => c.name === card.name && (c.rarity||'C').toUpperCase() === card.rarity);
        let others = all.filter(c => !(c.name === card.name && (c.rarity||'C').toUpperCase() === card.rarity));
        targets.sort((a,b) => (b.level||1) - (a.level||1));
        let main = targets.shift();

        if (type === 'LV' && targets.length >= req && userPoints >= cost) {
            main.level = (main.level||1) + 1; targets.splice(0, req);
            await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], points: increment(-cost) });
        } else if (type === 'STAR' && targets.length >= req && userDiamonds >= cost) {
            main.stars = (main.stars||0) + 1; targets.splice(0, req);
            await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], diamonds: increment(-cost) });
        } else if (type === 'BULK') {
            let count = 0; let tempPoints = userPoints;
            while(main.level < MAX_LV && tempPoints >= 500) {
                let r = main.level >= 30 ? 3 : (main.level >= 10 ? 2 : 1);
                if (targets.length >= r) { main.level++; targets.splice(0, r); tempPoints -= 500; count++; } else break;
            }
            if(count > 0) await updateDoc(doc(db, "users", currentUID), { collection: [...others, main, ...targets], points: increment(-(count*500)) });
        } else { alert("ทรัพยากรไม่เพียงพอ!"); }
        document.getElementById("cardModal").style.display = "none";
    }

    document.getElementById("btnSellAll").onclick = async () => {
        const stacked = {}; userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            if(!stacked[key]) stacked[key] = []; stacked[key].push({...c});
        });
        let gain = 0, newCol = [], sold = 0;
        for (const k in stacked) {
            stacked[k].sort((a,b) => (b.level||1)-(a.level||1));
            newCol.push(stacked[k].shift());
            stacked[k].forEach(c => { 
                gain += getDynamicSellValue(c);
                sold++; 
            });
        }
        if(!sold) return alert("ไม่มีใบซ้ำ");
        if(confirm(`ขายใบซ้ำ ${sold} ใบ ได้รับ ${gain} 🪙?`)) await updateDoc(doc(db, "users", currentUID), { collection: newCol, points: increment(gain) });
    };

    const fCon = document.getElementById("filterContainer");
    ['ALL','P','EXR','SEC','SUR','SSR','UR','SR','R','U','C'].forEach(r => {
        const b = document.createElement("button"); b.className = `filter-btn ${r==='ALL'?'active':''}`; b.innerText = r;
        b.onclick = () => { currentFilter = r; document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); renderCards(); };
        fCon.appendChild(b);
    });
</script>
</body>
</html>
