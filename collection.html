<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY COLLECTION - Fixed Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS พื้นฐาน (คงเดิม) --- */
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: #050505; color: white; text-align: center; }
        
        .navbar { background: rgba(10,10,15,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffc831; position: sticky; top: 0; z-index: 1000; }
        
        /* --- เอฟเฟกต์สีผสมมั่ว (Rainbow) จะทำงานเมื่อมี class นี้เท่านั้น --- */
        .rainbow-max { 
            border: 3px solid transparent !important;
            background: linear-gradient(#1a1a2e, #1a1a2e) padding-box,
                        conic-gradient(from 0deg, red, yellow, lime, aqua, blue, magenta, red) border-box !important;
            animation: rainbow-rotate 3s linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5) !important;
        }
        @keyframes rainbow-rotate { 100% { filter: hue-rotate(360deg); } }

        /* Filter Bar */
        .filter-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 20px; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #333; background: #111; color: #888; cursor: pointer; font-weight: bold; }
        .filter-btn.active { border-color: #ffc831; color: #fff; background: rgba(255,200,49,0.1); }

        /* Grid & Card */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .col-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .col-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .qty-badge { position: absolute; top: 5px; right: 5px; background: #ffc831; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; z-index: 10; }
        .star-container { position: absolute; top: 5px; left: 5px; display: flex; gap: 1px; z-index: 10; }
        .star-icon { color: #ffc831; font-size: 0.7rem; text-shadow: 0 0 3px #000; }

        /* Modal Layout ซ้าย-ขวา */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #111; border-radius: 20px; border: 1px solid #ffc831; max-width: 700px; width: 100%; display: flex; overflow: hidden; }
        @media (max-width: 600px) { .modal-content { flex-direction: column; } }
        
        .modal-left { width: 45%; background: #000; }
        .modal-right { width: 55%; padding: 25px; text-align: left; display: flex; flex-direction: column; }
        
        .lvl-bar-bg { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 10px 0; border: 1px solid #444; }
        .lvl-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); transition: 0.5s; }
        
        .btn-up { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-lv { background: linear-gradient(45deg, #0055ff, #00d4ff); }
        .btn-star { background: linear-gradient(45deg, #ff8c00, #ffd700); color: black; }
        .btn-up:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="display-username">Collector: Loading...</div>
        <div class="wallet-box">🪙 <span id="nav-points">0</span></div>
    </nav>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('ALL')">ALL</button>
        <button class="filter-btn" onclick="setFilter('C')">C</button>
        <button class="filter-btn" onclick="setFilter('R')">R</button>
        <button class="filter-btn" onclick="setFilter('SR')">SR</button>
        <button class="filter-btn" onclick="setFilter('SSR')">SSR</button>
        <button class="filter-btn" onclick="setFilter('UR')">UR</button>
        <button class="filter-btn" onclick="setFilter('EXR')">EXR</button>
        <button class="filter-btn" onclick="setFilter('SEC')">SEC</button>
        <button class="filter-btn" onclick="setFilter('P')">P</button>
        
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button class="filter-btn" style="background:#00d4ff22;" onclick="handleMassUpgrade()">⚡ อัปเกรดทั้งหมด</button>
            <button class="filter-btn" style="background:#ff444422;" onclick="handleMassSell()">💰 ขายของซ้ำ</button>
        </div>
    </div>

    <div class="container"><div id="grid" class="collection-grid"></div></div>

    <div id="cardModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-left">
                <img id="modalImg" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="modal-right">
                <h2 id="modalName" style="margin:0; color:#ffc831;">Card Name</h2>
                <div id="modalRarity" style="color:#888; font-weight: bold;">GRADE: -</div>
                <div id="modalStarDisplay" style="margin: 10px 0; font-size: 1.2rem;"></div>

                <div style="margin: 10px 0;">
                    <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
                        <span id="modalLvlText">LV. 1</span>
                        <span>MAX 20</span>
                    </div>
                    <div class="lvl-bar-bg"><div id="lvlBarFill" class="lvl-bar-fill"></div></div>
                </div>

                <p style="font-size: 0.85rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                    🎴 การ์ดซ้ำที่มี: <span id="reqCards">0</span> ใบ<br>
                    🪙 เงินของคุณ: <span id="userPoints">0</span>
                </p>

                <button id="btnLv" class="btn-up btn-lv">⚡ อัปเกรดเลเวล (ใช้ 2 ใบ + 500🪙)</button>
                <button id="btnStar" class="btn-up btn-star">⭐ อัปเกรดดาว (ใช้ 5 ใบ + 5,000🪙)</button>
                <button class="btn-up" style="background: #444;" onclick="document.getElementById('cardModal').style.display='none'">ปิด</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM", authDomain: "sign-up-73f99.firebaseapp.com", projectId: "sign-up-73f99", storageBucket: "sign-up-73f99.appspot.com", messagingSenderId: "916335559099", appId: "1:916335559099:web:3a8ed896ba26e38991849e" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    let currentUID = null; let userCards = []; let userPoints = 0; let currentFilter = 'ALL';

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    userPoints = data.points || 0;
                    userCards = data.collection || [];
                    document.getElementById("nav-points").innerText = userPoints.toLocaleString();
                    document.getElementById("userPoints").innerText = userPoints.toLocaleString();
                    document.getElementById("display-username").innerText = "Collector: " + (data.username || "User");
                    renderCards();
                }
            });
        }
    });

    window.setFilter = (rarity) => {
        currentFilter = rarity;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === rarity));
        renderCards();
    };

    function renderCards() {
        const grid = document.getElementById("grid"); grid.innerHTML = "";
        const stacked = {};
        userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C').toUpperCase()}`;
            if(!stacked[key]) stacked[key] = { ...c, rarity: (c.rarity||'C').toUpperCase(), qty: 1, level: c.level || 1, stars: c.stars || 1, img: c.img || c.image };
            else { 
                stacked[key].qty++; 
                if(c.level > stacked[key].level) stacked[key].level = c.level;
                if(c.stars > stacked[key].stars) stacked[key].stars = c.stars;
            }
        });

        let list = Object.values(stacked);
        if (currentFilter !== 'ALL') list = list.filter(c => c.rarity === currentFilter);

        list.forEach(card => {
            const div = document.createElement("div");
            // แก้ไขข้อ 3: เช็คเงื่อนไขสีรุ้ง LV 20 + 5 ดาว
            const isMaxed = card.level >= 20 && card.stars >= 5;
            div.className = `col-card ${isMaxed ? 'rainbow-max' : ''}`;
            
            let stars = '<div class="star-container">';
            for(let i=0; i<card.stars; i++) stars += '<span class="star-icon">★</span>';
            stars += '</div>';

            div.onclick = () => openModal(card);
            div.innerHTML = `${card.qty > 1 ? `<div class="qty-badge">x${card.qty}</div>` : ''}${stars}<img src="${card.img}"><div style="padding:10px; font-size:0.75rem; font-weight:bold;">${card.name} (LV.${card.level})</div>`;
            grid.appendChild(div);
        });
    }

    window.openModal = (card) => {
        const lvPrice = 500; const starPrice = 5000;
        document.getElementById("modalImg").src = card.img;
        document.getElementById("modalName").innerText = card.name;
        document.getElementById("modalRarity").innerText = "GRADE: " + card.rarity;
        document.getElementById("modalLvlText").innerText = "LV. " + card.level;
        document.getElementById("lvlBarFill").style.width = (card.level / 20 * 100) + "%";
        document.getElementById("reqCards").innerText = card.qty;
        
        let stars = ""; for(let i=0; i<5; i++) stars += (i < card.stars) ? "⭐" : "☆";
        document.getElementById("modalStarDisplay").innerText = stars;

        // เช็คปุ่มอัปเกรด
        const btnLv = document.getElementById("btnLv");
        btnLv.disabled = !(card.qty >= 2 && userPoints >= lvPrice && card.level < 20);
        btnLv.onclick = () => handleUpgrade(card, 'level', lvPrice, 2);

        const btnStar = document.getElementById("btnStar");
        btnStar.disabled = !(card.qty >= 5 && userPoints >= starPrice && card.stars < 5);
        btnStar.onclick = () => handleUpgrade(card, 'star', starPrice, 5);

        document.getElementById("cardModal").style.display = "flex";
    };

    async function handleUpgrade(card, type, cost, req) {
        if(!confirm(`ยืนยันการใช้ ${cost}🪙 และการ์ด ${req} ใบ เพื่ออัปเกรด?`)) return;
        let removed = 0;
        const newCol = userCards.filter(c => {
            if (removed < req && c.name === card.name && (c.rarity||'C').toUpperCase() === card.rarity.toUpperCase()) {
                removed++; return false;
            }
            return true;
        });
        const upgraded = { ...card };
        if(type === 'level') upgraded.level++; else upgraded.stars++;
        newCol.push(upgraded);
        await updateDoc(doc(db, "users", currentUID), { collection: newCol, points: increment(-cost) });
        document.getElementById("cardModal").style.display = "none";
    }

    window.handleMassUpgrade = () => alert("ระบบอัปเกรดอัตโนมัติ!");
    window.handleMassSell = () => alert("ขายของซ้ำเรียบร้อย!");
</script>
</body>
</html>
