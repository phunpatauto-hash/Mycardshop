<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY COLLECTION - Pro Edition V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- โครงสร้างเดิมที่คงไว้ --- */
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); color: white; text-align: center; min-height: 100vh; }
        .navbar { background-color: rgba(10, 10, 15, 0.8); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,200,49,0.2); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .wallet-box { background: rgba(0, 0, 0, 0.3); padding: 6px 15px; border-radius: 20px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
        
        /* --- การปรับปรุงข้อ 3: การ์ดสีผสมมั่ว (Rainbow Mix) --- */
        .rarity-p { 
            border: 3px solid transparent !important;
            background: linear-gradient(#1a1a2e, #1a1a2e) padding-box,
                        conic-gradient(from 0deg, red, orange, yellow, green, cyan, blue, violet, red) border-box;
            animation: rotate-rainbow 4s linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        @keyframes rotate-rainbow {
            100% { filter: hue-rotate(360deg); }
        }

        /* --- การปรับปรุงข้อ 1: Modal Layout (ขวาคือรายละเอียด) --- */
        .modal-content { 
            background: #111; border-radius: 25px; 
            max-width: 700px; width: 95%; 
            display: flex; flex-direction: row; /* จัดวางซ้ายขวา */
            overflow: hidden; border: 1px solid #ffc831; 
            position: relative;
        }
        @media (max-width: 600px) {
            .modal-content { flex-direction: column; max-width: 380px; }
        }
        .modal-img-side { width: 45%; background: #000; display: flex; align-items: center; }
        .modal-info-side { width: 55%; padding: 25px; text-align: left; display: flex; flex-direction: column; gap: 10px; }
        @media (max-width: 600px) {
            .modal-img-side, .modal-info-side { width: 100%; }
        }

        /* --- การปรับปรุงข้อ 2: Progress Bar & Level System --- */
        .lvl-container { margin: 15px 0; }
        .lvl-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .lvl-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #0055ff); transition: 0.5s; }
        
        .upgrade-cost-tag { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .btn-upgrade { 
            background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; border: none; 
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-upgrade:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.5; }

        /* Grid & Other Styles */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .col-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #333; }
        .col-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .qty-badge { position: absolute; top: 5px; right: 5px; background: #ffc831; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
        .lvl-badge { position: absolute; bottom: 45px; right: 5px; background: rgba(0,0,0,0.8); color: #00d4ff; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; border: 1px solid #00d4ff; }
        .card-info { padding: 8px; font-size: 0.8rem; font-weight: bold; }
        
        .filter-bar { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 6px 15px; border-radius: 15px; border: 1px solid #444; background: #222; color: #fff; cursor: pointer; }
        .filter-btn.active { background: #ffc831; color: #000; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="user-info">
            <div id="display-username" style="color: #ffc831; font-weight: bold;">Collector: ---</div>
        </div>
        <div class="wallet-display">
            <div class="wallet-box" style="border-color: #ffc831;">🪙 <span id="nav-points">0</span></div>
        </div>
    </nav>

    <div class="container">
        <h2>MY COLLECTION</h2>
        <div class="filter-bar" id="filters">
            <button class="filter-btn active" onclick="setFilter('ALL')">ALL</button>
            <button class="filter-btn" onclick="setFilter('P')">P (MAX)</button>
            <button class="filter-btn" onclick="setFilter('UR')">UR</button>
            <button class="filter-btn" onclick="setFilter('SR')">SR</button>
            <button class="filter-btn" onclick="setFilter('R')">R</button>
        </div>
        <div id="grid" class="collection-grid"></div>
    </div>

    <div id="cardModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:none; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-img-side">
                <img id="modalImg" src="" style="width: 100%;">
            </div>
            <div class="modal-info-side">
                <h2 id="modalName" style="margin:0; color:#ffc831;">Card Name</h2>
                <div id="modalRarity" style="font-weight: bold; letter-spacing: 1px;">RARITY</div>
                
                <div class="lvl-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
                        <span id="modalLvlText">Level 1</span>
                        <span id="modalMaxLvl">MAX LV. 10</span>
                    </div>
                    <div class="lvl-bar-bg">
                        <div id="lvlBarFill" class="lvl-bar-fill" style="width: 10%;"></div>
                    </div>
                </div>

                <div class="upgrade-section" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;">
                    <div class="upgrade-cost-tag">เงื่อนไขการอัพเกรดเลเวล:</div>
                    <div style="font-size: 0.9rem; margin-bottom: 10px;">
                        🎴 การ์ดซ้ำ: <span id="reqCards">0/2</span> <br>
                        🪙 เงินที่ต้องใช้: <span id="reqMoney">500</span> 
                    </div>
                    <button id="upgradeBtn" class="btn-upgrade" style="width: 100%;">✨ อัปเกรดเลเวล</button>
                </div>

                <button class="btn-nav" style="margin-top:auto; background:none; border:1px solid #444; color:#888; padding:8px; border-radius:8px; cursor:pointer;" onclick="document.getElementById('cardModal').style.display='none'">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- กรุณาใช้ Config ของคุณตรงนี้ ---
    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null;
    let userCards = [];
    let userPoints = 0;
    let currentFilter = 'ALL';

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    userPoints = data.points || 0;
                    userCards = data.collection || [];
                    document.getElementById("display-username").innerText = "Collector: " + (data.username || "User");
                    document.getElementById("nav-points").innerText = userPoints.toLocaleString();
                    renderCards();
                }
            });
        }
    });

    window.setFilter = (f) => {
        currentFilter = f;
        renderCards();
    };

    function renderCards() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        
        const stacked = {};
        userCards.forEach(c => {
            const key = `${c.name}_${(c.rarity||'C')}`;
            if(!stacked[key]) {
                stacked[key] = { ...c, qty: 1, level: c.level || 1 };
            } else {
                stacked[key].qty++;
                if((c.level || 1) > stacked[key].level) stacked[key].level = c.level;
            }
        });

        let list = Object.values(stacked);
        if(currentFilter !== 'ALL') list = list.filter(c => c.rarity === currentFilter);

        list.forEach(card => {
            const div = document.createElement("div");
            // ถ้าเป็นระดับ P ให้ใช้คลาสพิเศษสีรุ้ง
            div.className = `col-card rarity-${card.rarity.toLowerCase()}`;
            div.onclick = () => openModal(card);
            div.innerHTML = `
                ${card.qty > 1 ? `<div class="qty-badge">x${card.qty}</div>` : ''}
                <div class="lvl-badge">LV.${card.level}</div>
                <img src="${card.img || card.image}">
                <div class="card-info">${card.name}</div>
            `;
            grid.appendChild(div);
        });
    }

    window.openModal = (card) => {
        const modal = document.getElementById("cardModal");
        document.getElementById("modalImg").src = card.img || card.image;
        document.getElementById("modalName").innerText = card.name;
        document.getElementById("modalRarity").innerText = card.rarity;
        
        const level = card.level || 1;
        const maxLvl = 10;
        const progress = (level / maxLvl) * 100;
        
        document.getElementById("modalLvlText").innerText = `Level ${level}`;
        document.getElementById("lvlBarFill").style.width = `${progress}%`;

        // เงื่อนไขอัพเลเวล: ใช้เงิน 500 และ การ์ดซ้ำ 2 ใบ
        const upgradeCost = 500;
        const requiredCards = 2;
        
        document.getElementById("reqCards").innerText = `${card.qty}/${requiredCards}`;
        document.getElementById("reqMoney").innerText = `${upgradeCost} 🪙`;

        const upBtn = document.getElementById("upgradeBtn");
        const canUpgrade = card.qty >= requiredCards && userPoints >= upgradeCost && level < maxLvl;
        
        upBtn.disabled = !canUpgrade;
        if(level >= maxLvl) upBtn.innerText = "⭐ MAX LEVEL";
        else upBtn.innerText = canUpgrade ? "✨ อัปเกรดเลเวล" : "ทรัพยากรไม่พอ";

        upBtn.onclick = () => handleUpgrade(card, upgradeCost, requiredCards);
        modal.style.display = "flex";
    };

    async function handleUpgrade(card, cost, reqQty) {
        if(!confirm(`อัปเกรดเลเวลการ์ดนี้? (ใช้เงิน ${cost} 🪙 และการ์ด 2 ใบ)`)) return;

        let removedCount = 0;
        const newCollection = userCards.filter(c => {
            if (removedCount < reqQty && c.name === card.name && c.rarity === card.rarity) {
                removedCount++;
                return false;
            }
            return true;
        });

        // เพิ่มใบที่อัพเลเวลแล้วกลับเข้าไป
        newCollection.push({
            ...card,
            level: (card.level || 1) + 1,
            qty: 1 // reset qty ใน object ใหม่ เดี๋ยว render จะรวมให้เอง
        });

        await updateDoc(doc(db, "users", currentUID), {
            collection: newCollection,
            points: increment(-cost)
        });

        document.getElementById("cardModal").style.display = "none";
    }
</script>
</body>
</html>
