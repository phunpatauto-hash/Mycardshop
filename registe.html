<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Mycard Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: #1e1e1e; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #333; }
        h2 { color: #28a745; margin-bottom: 1.5rem; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; background: #000; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #28a745; }
        .btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #218838; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <h2>CREATE ACCOUNT</h2>
        <input type="text" id="reg-user" placeholder="ตั้งชื่อผู้ใช้ (ภาษาอังกฤษ/ไทย)">
        <input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน">
        <button class="btn" id="reg-btn" onclick="saveData()">ตกลงสมัครสมาชิก</button>
        <p style="margin-top: 20px;"><a href="login.html" style="color:#888; text-decoration:none; font-size: 0.85rem;">มีบัญชีอยู่แล้ว? เข้าสู่ระบบที่นี่</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx2JfaAGVB7BGRJUW6HEKJCaPNiWU6igg",
            authDomain: "test-3aad7.firebaseapp.com",
            databaseURL: "https://test-3aad7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "test-3aad7",
            appId: "1:519483707112:web:0e589822c23e27bb51035d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveData = async function() {
            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            const btn = document.getElementById('reg-btn');

            if (user === "" || pass === "") {
                return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            }

            btn.innerText = "กำลังสมัคร...";
            btn.disabled = true;

            try {
                // 1. ตรวจสอบว่าชื่อนี้ซ้ำไหมใน Firebase
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${user}`));
                
                if (snapshot.exists()) {
                    alert("ชื่อผู้ใช้นี้มีคนใช้แล้วครับ!");
                    btn.innerText = "ตกลงสมัครสมาชิก";
                    btn.disabled = false;
                    return;
                }

                // 2. บันทึกข้อมูลลง Firebase
                await set(ref(db, 'users/' + user), {
                    username: user,
                    password: pass,
                    points: 500,        // เริ่มต้น 500 แต้ม
                    diamonds: 0,        // เริ่มต้น 0 เพชร
                    status: "active",   // สถานะปกติ
                    createdAt: Date.now() // <--- เพิ่มตัวนี้สำหรับระบบ Admin ใหม่
                });

                alert("สมัครสมาชิกสำเร็จ! ยินดีต้อนรับครับ");
                window.location.href = "login.html"; 

            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ ลองใหม่อีกครั้งนะครับ");
                btn.innerText = "ตกลงสมัครสมาชิก";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
