<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โปรไฟล์ & คลังการ์ด - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Global & Background --- */
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%); 
            color: white; margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: auto; opacity: 0; transition: 0.8s ease-out; }
        
        /* Navbar */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; }
        .btn-nav { 
            background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Kanit'; 
            transition: 0.3s; text-decoration: none; font-size: 0.9rem; font-weight: bold; 
            backdrop-filter: blur(5px);
        }
        .btn-nav:hover { background: #ffc831; color: #000; border-color: #ffc831; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 200, 49, 0.3); }
        
        /* Main Panel */
        .card-panel { 
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; position: relative; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        /* Showcase Area */
        .showcase-area { 
            display: flex; align-items: center; gap: 40px; padding: 30px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.2) 100%); 
            border-radius: 20px; border: 1px solid rgba(255,200,49,0.2); position: relative; overflow: hidden;
        }
        
        .profile-pic-container { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 4px solid #ffc831; overflow: hidden; flex-shrink: 0; 
            background: #222; box-shadow: 0 0 20px rgba(255,200,49,0.2);
        }
        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-info { flex-grow: 1; text-align: left; }
        .wallet-stats { display: flex; gap: 15px; margin-top: 12px; }
        .stat-item { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

        /* Featured Slot */
        .featured-card-box { 
            width: 180px; height: 260px; background: #000; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
            position: relative; z-index: 10; border: 2px solid #333; overflow: hidden;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .featured-card-box.ssr-border { 
            border-color: #ffc831; 
            box-shadow: 0 0 25px rgba(255, 200, 49, 0.4);
            animation: border-glow 2s infinite alternate;
        }
        @keyframes border-glow {
            from { box-shadow: 0 0 10px rgba(255, 200, 49, 0.2); border-color: #ffc831; }
            to { box-shadow: 0 0 30px rgba(255, 200, 49, 0.6); border-color: #fff; }
        }
        .featured-card-box img.main-card-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Collection Grid */
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { 
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 10px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; position: relative; transition: 0.4s;
        }
        .item-card:hover { transform: translateY(-8px) scale(1.05); border-color: #ffc831; background: rgba(255,255,255,0.1); }
        .item-card img { width: 100%; border-radius: 10px; aspect-ratio: 2/3; object-fit: cover; margin-bottom: 8px; }
        
        .card-name-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rarity-tag { 
            font-size: 0.65rem; padding: 2px 8px; border-radius: 6px; 
            font-weight: 900; display: inline-block; text-transform: uppercase;
        }
        
        /* Rarity Colors */
        .rarity-EXR { background: #ff0055; color: white; box-shadow: 0 0 10px #ff0055; }
        .rarity-SSR { background: #ffc831; color: black; box-shadow: 0 0 10px #ffc831; }
        .rarity-SR { background: #00e5ff; color: black; }
        .rarity-R { background: #4ade80; color: black; }
        .rarity-U { background: #ffffff; color: black; }

        .count-badge { 
            position: absolute; top: -8px; right: -8px; background: #ffc831; color: #000; 
            padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; 
            border: 2px solid #161616; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #auth-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ffc831; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-loader">
    <div class="spinner"></div>
    <p style="color:#ffc831; margin-top:20px; letter-spacing: 1px;">กำลังเข้าสู่ระบบคลัง...</p>
</div>

<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 กลับหน้าหลัก</a>
        <h2 style="margin:0; font-size: 1.2rem; color: #888;">PLAYER PROFILE</h2>
        <button onclick="logout()" class="btn-nav" style="border-color: #ff4444; color: #ff4444;">ออกจากระบบ</button>
    </div>

    <div class="card-panel">
        <div class="showcase-area">
            <div class="profile-pic-container">
                <img id="pfp-display" src="" alt="Profile">
            </div>
            <div class="profile-info">
                <h1 id="display-name" style="color: #fff; margin: 0 0 5px 0; font-size: 1.8rem;">---</h1>
                <div class="wallet-stats">
                    <div class="stat-item" style="color: #ffc831;">🪙 <span id="p-points">0</span></div>
                    <div class="stat-item" style="color: #00d4ff;">💎 <span id="p-diamonds">0</span></div>
                    <div class="stat-item" style="color: #4facfe;">⭐ <span id="p-stars">0</span></div>
                </div>
                <p style="font-size: 0.85rem; color: #888; margin-top: 15px; font-style: italic;">"แตะการ์ดในคลังเพื่อเปลี่ยนการ์ดโชว์พรีเมียมของคุณ"</p>
            </div>
            
            <div id="featured-slot" class="featured-card-box">
                <div id="card-content" style="text-align:center; padding: 10px;">
                    <span style="color: #555; font-size: 0.8rem; font-weight: bold;">เลือกการ์ด<br>มาแสดงโชว์</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card-panel">
        <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">📖 คลังการ์ดทั้งหมด (<span id="card-count" style="color:#ffc831">0</span>)</h3>
        <div class="collection-grid" id="collection-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    renderPage(docSnap.data());
                    document.getElementById("auth-loader").style.display = "none";
                    document.querySelector('.container').style.opacity = "1";
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function renderPage(data) {
        document.getElementById("display-name").innerText = data.username || "COLLECTOR";
        document.getElementById("p-points").innerText = (data.points || 0).toLocaleString();
        document.getElementById("p-diamonds").innerText = (data.diamonds || 0).toLocaleString();
        document.getElementById("p-stars").innerText = (data.stars || 0).toLocaleString();
        document.getElementById("pfp-display").src = `https://api.dicebear.com/7.x/bottts/svg?seed=${data.username}`;
        
        const slot = document.getElementById("featured-slot");
        if (data.featuredCard) {
            slot.innerHTML = `<img src="${data.featuredCard.img}" class="main-card-img">`;
            slot.className = `featured-card-box ${data.featuredCard.rarity === 'SSR' || data.featuredCard.rarity === 'EXR' ? 'ssr-border' : ''}`;
        }

        const list = document.getElementById("collection-list");
        const rawCards = data.collection || [];
        document.getElementById("card-count").innerText = `${rawCards.length} ใบ`;

        if (rawCards.length === 0) {
            list.innerHTML = "<p style='grid-column: 1/-1; color:#555; text-align:center; padding: 40px;'>คุณยังไม่มีการ์ดในครอบครอง เริ่มสะสมเลย!</p>";
            return;
        }

        const cardMap = {};
        rawCards.forEach(card => {
            const key = card.name + "_" + card.rarity;
            if (cardMap[key]) {
                cardMap[key].count += 1;
            } else {
                cardMap[key] = { ...card, count: 1 };
            }
        });

        const sortedCards = Object.values(cardMap).sort((a, b) => {
            const order = { 'EXR': 0, 'SEC': 1, 'SSR': 2, 'SR': 3, 'R': 4, 'U': 5, 'C': 6 };
            return (order[a.rarity] || 99) - (order[b.rarity] || 99);
        });

        list.innerHTML = sortedCards.map((card) => `
            <div class="item-card" onclick="setFeatured('${card.img}', '${card.rarity}')">
                ${card.count > 1 ? `<div class="count-badge">x${card.count}</div>` : ''}
                <img src="${card.img}" onerror="this.src='https://via.placeholder.com/150x225?text=Missing'">
                <div class="card-name-label">${card.name}</div>
                <div class="rarity-tag rarity-${card.rarity}">${card.rarity}</div>
            </div>
        `).join('');
    }

    window.setFeatured = async (img, rarity) => {
        if (!currentUserUID) return;
        try {
            await updateDoc(doc(db, "users", currentUserUID), {
                featuredCard: { img, rarity }
            });
        } catch (e) { console.error("Error:", e); }
    };

    window.logout = () => {
        signOut(auth).then(() => window.location.href = "login.html");
    };
</script>

</body>
</html>
