<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ & คลังการ์ด - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS Global & Background --- */
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: #050507; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 200, 49, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 50%);
            color: white; margin: 0; padding: 15px; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container { max-width: 1200px; margin: auto; opacity: 0; transform: translateY(20px); }
        .container.show { opacity: 1; transform: translateY(0); }

        /* Navbar */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; }
        .btn-nav { 
            background: rgba(255,255,255,0.03); color: #ccc; border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px 18px; border-radius: 14px; cursor: pointer; text-decoration: none; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
        }
        .btn-nav:hover { background: #ffc831; color: #000; border-color: #ffc831; box-shadow: 0 0 15px rgba(255, 200, 49, 0.3); }
        
        /* Profile Header Card */
        .profile-header { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); 
            margin-bottom: 30px; display: grid; grid-template-columns: 1fr auto; gap: 30px; align-items: center;
            backdrop-filter: blur(15px);
        }

        .user-section { display: flex; align-items: center; gap: 25px; }
        .avatar-wrapper { 
            position: relative; width: 120px; height: 120px; 
            border-radius: 22px; padding: 5px; background: linear-gradient(45deg, #ffc831, transparent);
        }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 18px; background: #111; object-fit: cover; }
        
        .user-info h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; color: #fff; }
        .user-id { font-size: 0.75rem; color: #ffc831; opacity: 0.8; font-weight: 300; }

        .currency-bar { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .currency-item { 
            background: rgba(0,0,0,0.3); padding: 6px 14px; border-radius: 10px; 
            font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); font-weight: bold;
        }

        /* Mastery Progress */
        .mastery-box { margin-top: 20px; max-width: 350px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; margin-bottom: 6px; }
        .progress-track { background: rgba(0,0,0,0.4); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #ffc831; width: 0%; box-shadow: 0 0 10px #ffc831; }

        /* Featured Card Showcase */
        .showcase-section { 
            background: rgba(0,0,0,0.5); width: 200px; height: 280px; border-radius: 20px; 
            border: 2px dashed rgba(255,255,255,0.1); position: relative; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .showcase-section img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .showcase-label { position: absolute; bottom: 10px; font-size: 0.6rem; color: #ffc831; letter-spacing: 2px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; }

        .glow-ssr { border: 2px solid #ffc831; box-shadow: 0 0 30px rgba(255, 200, 49, 0.4); }
        .glow-exr { border: 2px solid #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.5); animation: exr-anim 3s infinite; }
        @keyframes exr-anim { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(30deg); } }

        /* Collection Grid */
        .collection-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding: 0 10px; }
        .collection-head h2 { margin: 0; font-size: 1.1rem; color: #fff; font-weight: 400; }
        
        .collection-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding-bottom: 50px;
        }
        
        .item-card { 
            background: rgba(255,255,255,0.02); border-radius: 16px; padding: 8px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .item-card:hover { transform: translateY(-8px) scale(1.02); border-color: #ffc831; background: rgba(255,255,255,0.06); cursor: pointer; }
        .item-card img { width: 100%; border-radius: 12px; aspect-ratio: 2/3; object-fit: cover; margin-bottom: 8px; }
        
        .card-name { font-size: 0.8rem; color: #eee; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        .rarity-tag { font-size: 0.6rem; padding: 2px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        
        .rarity-EXR { background: #ff0055; color: white; }
        .rarity-SSR { background: #ffc831; color: black; }
        .rarity-SR { background: #00e5ff; color: black; }

        .count-badge { 
            position: absolute; top: -5px; right: -5px; background: #ffc831; color: #000; 
            min-width: 20px; height: 20px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; border: 2px solid #050507; padding: 0 5px;
        }

        .lv-badge { 
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); 
            font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; color: #fff; 
            z-index: 2; border: 1px solid rgba(255,255,255,0.1); 
        }
        
        /* Max Card Animation */
        .is-max { border: 1.5px solid #ffc831 !important; }
        .is-max .lv-badge { background: #ffc831; color: #000; font-weight: bold; border-color: #000; }
        .max-effect {
            position: absolute; inset: 0; border-radius: 16px; pointer-events: none;
            background: linear-gradient(135deg, transparent, rgba(255,200,49,0.1), transparent);
            animation: shine 2s infinite;
        }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .star-box { color: #ffc831; font-size: 0.6rem; margin-bottom: 5px; }

        /* Loader */
        #auth-loader { position: fixed; inset: 0; background: #050507; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ring { width: 40px; height: 40px; border: 2px solid rgba(255,200,49,0.1); border-top-color: #ffc831; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .profile-header { grid-template-columns: 1fr; text-align: center; }
            .user-section { flex-direction: column; }
            .currency-bar { justify-content: center; }
            .mastery-box { margin: 20px auto 0; }
            .showcase-section { margin: auto; width: 160px; height: 220px; }
        }
    </style>
</head>
<body>

<div id="auth-loader">
    <div class="loader-ring"></div>
    <p style="color:#ffc831; margin-top:15px; font-size: 0.7rem; letter-spacing: 3px;">AUTHENTICATING</p>
</div>

<div class="container" id="main-content">
    <div class="nav-bar">
        <a href="index.html" class="btn-nav"><i class="fas fa-home"></i> กลับหน้าหลัก</a>
        <button onclick="logout()" class="btn-nav" style="color: #ff5e5e;"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="profile-header">
        <div class="user-section">
            <div class="avatar-wrapper">
                <img id="pfp-display" src="" alt="Avatar">
            </div>
            <div class="user-info">
                <div class="user-id" id="user-uid-label">ID: Loading...</div>
                <h1 id="display-name">TRAINER</h1>
                <div class="currency-bar">
                    <div class="currency-item" style="color:#ffc831">🪙 <span id="p-points">0</span></div>
                    <div class="currency-item" style="color:#00e5ff">💎 <span id="p-diamonds">0</span></div>
                    <div class="currency-item" style="color:#ffffff">⭐ <span id="p-stars">0</span></div>
                </div>
                
                <div class="mastery-box">
                    <div class="progress-info">
                        <span>Card Collection Mastery</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="progress-bar" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="showcase-section" id="featured-slot">
            <i class="fas fa-crown" style="color: rgba(255,255,255,0.1); font-size: 2rem;"></i>
            <span class="showcase-label">FEATURED</span>
        </div>
    </div>

    <div class="collection-head">
        <h2><i class="fas fa-layer-group" style="color:#ffc831; margin-right:8px;"></i> MY COLLECTION</h2>
        <div id="card-count-label" style="font-size: 0.7rem; color: #666; font-weight: bold;">0 / 100 CARDS</div>
    </div>
    
    <div class="collection-grid" id="collection-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUID = user.uid;
            document.getElementById("user-uid-label").innerText = `ID: ${user.uid.substring(0,12)}...`;
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    renderPage(docSnap.data());
                    setTimeout(() => {
                        document.getElementById("auth-loader").style.opacity = "0";
                        setTimeout(() => document.getElementById("auth-loader").style.display = "none", 500);
                        document.getElementById("main-content").classList.add("show");
                    }, 600);
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function renderPage(data) {
        document.getElementById("display-name").innerText = data.username || "TRAINER";
        document.getElementById("p-points").innerText = (data.points || 0).toLocaleString();
        document.getElementById("p-diamonds").innerText = (data.diamonds || 0).toLocaleString();
        document.getElementById("p-stars").innerText = (data.stars || 0).toLocaleString();
        document.getElementById("pfp-display").src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.username}&backgroundColor=b6e3f4`;
        
        const rawCards = data.collection || [];
        const total = rawCards.length;
        const percent = Math.min((total / 100) * 100, 100).toFixed(0);
        document.getElementById("progress-bar").style.width = percent + "%";
        document.getElementById("progress-percent").innerText = percent + "%";

        const slot = document.getElementById("featured-slot");
        if (data.featuredCard) {
            slot.innerHTML = `<img src="${data.featuredCard.img}"><span class="showcase-label">FEATURED</span>`;
            slot.className = `showcase-section glow-${data.featuredCard.rarity?.toLowerCase()}`;
        }

        const list = document.getElementById("collection-list");
        document.getElementById("card-count-label").innerText = `${total} / 100 CARDS`;

        if (total === 0) {
            list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:80px; color:#333; font-size:0.9rem;">คลังว่างเปล่า ออกไปสะสมการ์ดกันเลย!</div>`;
            return;
        }

        const cardMap = {};
        rawCards.forEach(card => {
            const key = card.name + "_" + card.rarity;
            if (cardMap[key]) {
                cardMap[key].count++;
                // ดึงเลเวลที่สูงที่สุดมาโชว์
                if (card.lv && card.lv > cardMap[key].lv) cardMap[key].lv = card.lv;
                if (card.stars && card.stars > cardMap[key].stars) cardMap[key].stars = card.stars;
            } else {
                // ถ้าไม่มีข้อมูลเลเวลใน DB ให้ default เป็น 1
                cardMap[key] = { ...card, count: 1, lv: card.lv || 1, stars: card.stars || 1 };
            }
        });

        const sorted = Object.values(cardMap).sort((a,b) => {
            const rank = { 'EXR': 1, 'SSR': 2, 'SR': 3, 'R': 4 };
            return (rank[a.rarity] || 99) - (rank[b.rarity] || 99);
        });

        list.innerHTML = sorted.map(card => {
            const currentLv = card.lv || 1;
            const currentStars = card.stars || 1;
            const isMax = currentLv >= 20;
            
            let starHtml = '';
            for(let i=0; i<5; i++) {
                starHtml += `<i class="${i < currentStars ? 'fas' : 'far'} fa-star"></i> `;
            }

            return `
                <div class="item-card ${isMax ? 'is-max' : ''}" onclick="setFeatured('${card.img}', '${card.rarity}')">
                    ${isMax ? '<div class="max-effect"></div>' : ''}
                    <div class="lv-badge">${isMax ? 'MAX' : 'LV.'+currentLv}</div>
                    ${card.count > 1 ? `<div class="count-badge">${card.count}</div>` : ''}
                    
                    <img src="${card.img}" onerror="this.src='https://via.placeholder.com/150x225?text=No+Image'">
                    
                    <div class="card-name">${card.name}</div>
                    <div class="star-box">${starHtml}</div>
                    <div class="rarity-tag rarity-${card.rarity}">${card.rarity}</div>
                </div>
            `;
        }).join('');
    }

    window.setFeatured = async (img, rarity) => {
        if (!currentUserUID) return;
        try {
            await updateDoc(doc(db, "users", currentUserUID), { featuredCard: { img, rarity } });
        } catch (e) { console.error(e); }
    };

    window.logout = () => {
        if(confirm("ยืนยันการออกจากระบบ?")) signOut(auth).then(() => window.location.href = "login.html");
    };
</script>

</body>
</html>
