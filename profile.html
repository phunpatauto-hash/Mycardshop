<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โปรไฟล์ & คลังการ์ด - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');
        
        body { font-family: 'Kanit', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-nav { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid #444; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Kanit'; transition: 0.3s; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .btn-nav:hover { background: #ffc831; color: #000; border-color: #ffc831; transform: translateY(-2px); }

        .card-panel { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .showcase-area { display: flex; align-items: flex-start; gap: 30px; padding: 25px; background: #111; border-radius: 20px; border: 1px solid #444; position: relative; overflow: hidden; }
        
        .featured-card-box { 
            width: 160px; height: 230px; background: #000; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; 
            z-index: 10; border: 2px solid #555; transition: 0.5s; overflow: hidden;
        }

        .star-tag-display { 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            color: #ffea00; text-shadow: 0 0 8px rgba(0,0,0,0.8); 
            font-size: 0.9rem; z-index: 15; pointer-events: none; letter-spacing: -1px;
        }

        .count-badge {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); 
            padding: 2px 6px; border-radius: 5px; font-size: 0.7rem; color: #fff; 
            border: 1px solid #444; z-index: 15;
        }

        /* เอฟเฟกต์การ์ดพิเศษ */
        .featured-card-box.evo-border { border: 3px solid transparent !important; background: linear-gradient(#000, #000) padding-box, linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff) border-box !important; animation: rainbow-border-run 4s linear infinite; box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); }
        .featured-card-box.diamond-border { border: 2px solid #fff !important; box-shadow: 0 0 25px rgba(255, 255, 255, 0.25); }
        
        /* เพิ่ม: สไตล์ขอบสายรุ้งสำหรับการ์ดในคลัง */
        .evo-star-rainbow { 
            border: 3px solid transparent !important; 
            background: linear-gradient(#252525, #252525) padding-box, linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff) border-box !important; 
            animation: rainbow-border-run 4s linear infinite; 
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }

        @keyframes rainbow-border-run { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .featured-card-box img.main-card-img { width: 100%; height: 100%; object-fit: cover; z-index: 5; position: relative; border-radius: 10px; }
        
        .lvl-badge-p { position: absolute; bottom: 8px; right: 8px; color: #000; font-size: 0.65rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; z-index: 15; }
        
        .profile-info { flex-grow: 1; text-align: left; z-index: 10; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 15px; margin-top: 15px; }
        .item-card { background: #252525; border-radius: 12px; padding: 8px; text-align: center; border: 1px solid #444; cursor: pointer; position: relative; transition: 0.3s; }
        .item-card img { width: 100%; border-radius: 8px; height: 135px; object-fit: cover; }
        .is-selected { border: 2px solid #ffc831 !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 200, 49, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="btn-nav">← กลับหน้าหลัก</a>
    </div>

    <div class="card-panel">
        <div class="showcase-area">
            <div id="featured-slot" class="featured-card-box">
                <div id="card-content" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    <span style="color: #444; font-size: 0.7rem; text-align: center;">ยังไม่มีการ์ดโชว์</span>
                </div>
            </div>
            <div class="profile-info">
                <h2 id="display-name" style="color: #ffc831; margin-top:0;">Guest</h2>
                <div id="p-points" style="color: #ffc831;">🪙 0 Points</div>
            </div>
        </div>
    </div>

    <div class="card-panel">
        <h3>📖 คลังการ์ดของคุณ</h3>
        <div class="collection-grid" id="collection-list"></div>
    </div>
</div>

<script>
    window.onload = () => { refreshPage(); };

    function refreshPage() {
        const user = localStorage.getItem("currentUser") || "Guest";
        document.getElementById("display-name").innerText = user;
        document.getElementById("p-points").innerText = `🪙 ${(localStorage.getItem(`points_${user}`) || 0)} Points`;
        loadCollection();
        showFeaturedCard();
    }

    function loadCollection() {
        const container = document.getElementById("collection-list");
        const myCards = JSON.parse(localStorage.getItem("myCollection")) || [];
        const levels = JSON.parse(localStorage.getItem("cardLevels")) || {};
        const featuredCard = JSON.parse(localStorage.getItem("featuredCard"));

        const groupedCards = myCards.reduce((acc, card) => {
            const key = card.name;
            if (!acc[key]) acc[key] = { ...card, count: 0 };
            acc[key].count += 1;
            return acc;
        }, {});

        container.innerHTML = Object.values(groupedCards).map(card => {
            const isFeatured = featuredCard && featuredCard.name === card.name;
            const lvl = levels[card.name] || 1;
            const stars = card.stars || 0;
            
            // เงื่อนไขสำหรับขอบสายรุ้ง: ต้องเป็น EVO และมีดาว > 0
            const isEvoStar = card.isEvo && stars > 0;
            
            const cardData = JSON.stringify(card).replace(/"/g, '&quot;');
            
            // เพิ่มคลาส evo-star-rainbow ถ้าเข้าเงื่อนไข
            return `
                <div class="item-card ${isFeatured ? 'is-selected' : ''} ${isEvoStar ? 'evo-star-rainbow' : ''}" onclick="selectFeatured('${cardData}')">
                    <div class="count-badge">x${card.count}</div>
                    ${stars > 0 ? `<div class="star-tag-display">${"★".repeat(stars)}</div>` : ''}
                    <img src="${card.img || card.image}">
                    <div style="font-size:0.7rem; color:#bbb; margin-top:8px;">${card.name}</div>
                    <div style="font-size:0.65rem; color:#ffc831;">LV.${lvl}</div>
                </div>
            `;
        }).join('');
    }

    function selectFeatured(cardData) {
        const cardObj = JSON.parse(cardData.replace(/&quot;/g, '"'));
        localStorage.setItem("featuredCard", JSON.stringify(cardObj));
        refreshPage();
    }

    function showFeaturedCard() {
        const slot = document.getElementById("featured-slot");
        const content = document.getElementById("card-content");
        const card = JSON.parse(localStorage.getItem("featuredCard"));
        const levels = JSON.parse(localStorage.getItem("cardLevels")) || {};

        if (card) {
            const lvl = levels[card.name] || 1;
            const stars = card.stars || 0;
            const isEvo = card.isEvo || false;

            slot.className = `featured-card-box ${isEvo ? 'evo-border' : 'diamond-border'}`;
            content.innerHTML = `
                ${stars > 0 ? `<div class="star-tag-display">${"★".repeat(stars)}</div>` : ''}
                <img src="${card.img || card.image}" class="main-card-img">
                <div class="lvl-badge-p" style="background:${isEvo ? '#f0f' : '#ffc831'}">LV.${lvl}</div>
            `;
        }
    }
</script>

</body>
</html>
