<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โปรไฟล์ผู้เล่น - Mycard Game</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding-top: 50px; }
        .profile-card { background: #161616; padding: 40px; border-radius: 20px; display: inline-block; border: 1px solid #ffc831; width: 300px; }
        .username { font-size: 1.5rem; color: #ffc831; margin-bottom: 10px; }
        .points { font-size: 1.2rem; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #ff4444; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div id="loading">กำลังโหลดข้อมูล...</div>
        <div id="content" style="display:none;">
            <div class="username" id="display-name">ชื่อผู้เล่น</div>
            <div class="points">พอยท์คงเหลือ: <span id="display-points">0</span></div>
            <button onclick="handleLogout()">ออกจากระบบ</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ใช้กุญแจเดิมของคุณ
    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ตรวจสอบว่าล็อกอินอยู่จริงไหม
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                // ดึงข้อมูลจาก Firestore โดยใช้ UID ของคนที่ล็อกอิน
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("display-name").innerText = data.username;
                    document.getElementById("display-points").innerText = data.points;
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("content").style.display = "block";
                } else {
                    alert("ไม่พบข้อมูลผู้ใช้ในฐานข้อมูล!");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        } else {
            // ถ้าไม่ได้ล็อกอิน ให้เด้งกลับไปหน้า login
            window.location.href = "login.html";
        }
    });

    window.handleLogout = () => {
        signOut(auth).then(() => {
            window.location.href = "login.html";
        });
    };
</script>
</body>
</html>
