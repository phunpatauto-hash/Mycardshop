<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Hub - Card Collector Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #ffc831;
            --accent: #00e5ff;
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg-dark); 
            color: white; margin: 0; min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 200, 49, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 229, 255, 0.08) 0%, transparent 40%);
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; opacity: 0; transform: scale(0.98); }
        .container.show { opacity: 1; transform: scale(1); }

        /* --- Stylish Navbar --- */
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { 
            background: var(--card-bg); border: 1px solid var(--glass-border); color: #fff;
            padding: 8px 20px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem; backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(255,200,49,0.3); }

        /* --- Hero Profile Section --- */
        .hero-section {
            display: grid; grid-template-columns: 280px 1fr 220px; gap: 30px;
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 35px; backdrop-filter: blur(20px);
            margin-bottom: 40px; position: relative; overflow: hidden;
        }

        .hero-section::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,200,49,0.05), transparent);
            animation: rotate 10s linear infinite; pointer-events: none;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Avatar */
        .pfp-container { position: relative; z-index: 2; justify-self: center; }
        .pfp-frame {
            width: 180px; height: 180px; border-radius: 40px; padding: 8px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pfp-frame img { width: 100%; height: 100%; border-radius: 32px; object-fit: cover; background: #111; }
        
        .pfp-edit {
            position: absolute; bottom: 10px; right: 10px;
            background: #fff; color: #000; width: 35px; height: 35px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* User Info */
        .user-main { z-index: 2; align-self: center; }
        .name-wrapper { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .user-main h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-edit-name { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1.2rem; opacity: 0.6; }
        .btn-edit-name:hover { opacity: 1; transform: scale(1.1); }
        .uid-tag { color: var(--primary); font-size: 0.8rem; opacity: 0.7; font-family: monospace; }
        
        /* สัญลักษณ์แรงก์สูงสุด */
        .max-rank-banner { display: inline-flex; align-items: center; gap: 6px; background: rgba(230, 57, 70, 0.15); border: 1px solid rgba(230, 57, 70, 0.4); color: #ff4d6d; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; margin-top: 8px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .stat-card {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;
            border: 1px solid var(--glass-border); text-align: center;
        }
        .stat-card i { font-size: 1.2rem; margin-bottom: 5px; display: block; }
        .stat-val { font-size: 1.1rem; font-weight: 700; }

        /* Featured Slot */
        .featured-display {
            z-index: 2; background: rgba(0,0,0,0.5); border-radius: 25px;
            border: 2px dashed var(--glass-border); display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
            cursor: pointer;
        }
        .featured-display img { width: 100%; height: 100%; object-fit: cover; }
        .featured-label {
            position: absolute; top: 10px; background: var(--primary); color: #000;
            font-size: 0.6rem; font-weight: 800; padding: 2px 10px; border-radius: 5px;
        }

        /* --- Collection Grid --- */
        .section-title { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; padding: 0 10px;
        }
        .section-title h2 { font-size: 1.4rem; margin: 0; font-weight: 300; letter-spacing: 1px; }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; padding-bottom: 100px;
        }

        .card-item {
            background: var(--card-bg); border-radius: 24px; padding: 12px;
            border: 1px solid var(--glass-border); position: relative;
            cursor: pointer; text-align: center;
        }
        .card-item:hover {
            transform: translateY(-10px); border-color: var(--primary);
            background: rgba(255,255,255,0.08); box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-item img { width: 100%; border-radius: 18px; aspect-ratio: 2/3; object-fit: cover; margin-bottom: 12px; }
        
        .card-info .name { font-size: 0.85rem; font-weight: 400; margin-bottom: 8px; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rarity-pill {
            font-size: 0.65rem; font-weight: 800; padding: 3px 12px; border-radius: 8px;
            display: inline-block; letter-spacing: 1px; text-transform: uppercase;
        }
        
        /* เพิ่มสีปุ่มระดับต่างๆ เพื่อความสวยงาม */
        .rarity-SECRET { background: #D8BFD8; color: #000; }
        .rarity-P, .rarity-USEC { background: #ff00ff; color: #fff; }
        .rarity-EXR, .rarity-CBR { background: linear-gradient(45deg, #ff0055, #ffdd00); color: #fff; box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .rarity-SEC { background: #ffac33; color: #000; }
        .rarity-SUR { background: #33ffad; color: #000; }
        .rarity-SSR, .rarity-PR { background: var(--primary); color: #000; }
        .rarity-UR { background: #bf40bf; color: #fff; }
        .rarity-SR { background: var(--accent); color: #000; }
        .rarity-R { background: #33ff57; color: #000; }
        .rarity-U, .rarity-C { background: #ffffff; color: #000; }

        .lvl-tag {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; color: var(--primary);
            border: 1px solid var(--primary); z-index: 5;
        }

        .qty-badge {
            position: absolute; top: -5px; right: -5px; background: #fff; color: #000;
            width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 10px rgba(0,0,0,0.3); z-index: 5;
        }

        /* --- Loader --- */
        #loader { 
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,200,49,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .hero-section { grid-template-columns: 1fr; text-align: center; padding: 30px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr; }
            .featured-display { height: 250px; width: 180px; margin: 20px auto 0; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; letter-spacing: 5px; font-size: 0.7rem; color: var(--primary);">LOADING PROFILE</p>
</div>

<div class="container" id="main-content">
    <header class="nav-header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> หน้าหลัก</a>
        <button onclick="logout()" class="back-btn" style="color: #ff5e5e; border-color: rgba(255,94,94,0.2);"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <section class="hero-section">
        <div class="pfp-container">
            <div class="pfp-frame">
                <img id="user-avatar" src="" alt="Avatar">
            </div>
            <label for="pfp-input" class="pfp-edit"><i class="fas fa-pen"></i></label>
            <input type="file" id="pfp-input" accept="image/*" style="display:none;">
        </div>

        <div class="user-main">
            <span class="uid-tag" id="uid-display">UID: 000000000000</span>
            <div class="name-wrapper">
                <h1 id="username-display">COLLECTOR</h1>
                <button onclick="editUsername()" class="btn-edit-name">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
            
            <div class="max-rank-banner" id="max-rank-display">
                <i class="fas fa-trophy"></i> สถิติสูงสุด: <span id="max-rank-text">UNRANKED (0 🏆)</span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-coins" style="color: var(--primary);"></i>
                    <div class="stat-val" id="stat-points">0</div>
                    <div style="font-size: 0.6rem; opacity: 0.5;">POINTS</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-gem" style="color: var(--accent);"></i>
                    <div class="stat-val" id="stat-diamonds">0</div>
                    <div style="font-size: 0.6rem; opacity: 0.5;">DIAMONDS</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star" style="color: #fff;"></i>
                    <div class="stat-val" id="stat-stars">0</div>
                    <div style="font-size: 0.6rem; opacity: 0.5;">STARS</div>
                </div>
            </div>
        </div>

        <div class="featured-display" id="featured-card">
            <i class="fas fa-plus" style="opacity: 0.2; font-size: 2rem;"></i>
            <span class="featured-label">SHOWCASE</span>
        </div>
    </section>

    <div class="section-title">
        <h2><i class="fas fa-clone"></i> คลังการ์ดสะสม (เรียงตามระดับและเลเวลสูงสุด)</h2>
        <span id="collection-count" style="font-size: 0.8rem; color: var(--primary);">0 CARDS</span>
    </div>

    <div class="grid-container" id="card-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userUID = null;

    // ลำดับความหายากเพื่อใช้ในการจัดเรียงจากสูงไปต่ำ
    const rarityOrder = { 
        'SECRET': 15, 'P': 14, 'USEC': 13, 'EXR': 12, 'CBR': 11, 
        'SEC': 10, 'SUR': 9, 'SSR': 8, 'PR': 7, 'UR': 6, 
        'SR': 5, 'R': 4, 'U': 3, 'C': 2 
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userUID = user.uid;
            document.getElementById("uid-display").innerText = `UID: ${user.uid.toUpperCase()}`;
            
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const userData = snap.data();
                    updateUI(userData);
                    hideLoader();
                }
            });

            document.getElementById("pfp-input").addEventListener("change", uploadImage);
        } else {
            window.location.href = "login.html";
        }
    });

    window.editUsername = async () => {
        const { value: newName } = await Swal.fire({
            title: 'เปลี่ยนชื่อผู้เล่น',
            input: 'text',
            inputLabel: 'ใส่ชื่อใหม่ของคุณ (ไม่เกิน 15 ตัวอักษร)',
            inputValue: document.getElementById("username-display").innerText,
            showCancelButton: true,
            background: '#1a1a1c',
            color: '#fff',
            confirmButtonColor: '#ffc831',
            cancelButtonColor: '#444',
            confirmButtonText: 'ตกลง',
            cancelButtonText: 'ยกเลิก',
            inputAttributes: { maxlength: 15 },
            inputValidator: (value) => {
                if (!value || value.trim() === "") {
                    return 'กรุณาใส่ชื่อด้วยนะ!'
                }
            }
        });

        if (newName && newName.trim() !== "") {
            try {
                await updateDoc(doc(db, "users", userUID), { username: newName.trim() });
                Swal.fire({
                    icon: 'success',
                    title: 'สำเร็จ!',
                    text: 'เปลี่ยนชื่อเรียบร้อยแล้ว',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#1a1a1c',
                    color: '#fff'
                });
            } catch (err) {
                console.error("Update error:", err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถอัปเดตชื่อได้', 'error');
            }
        }
    };

    async function uploadImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 800000) return alert("ไฟล์ต้องมีขนาดไม่เกิน 800KB");

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            await updateDoc(doc(db, "users", userUID), { userPhoto: reader.result });
        };
    }

    function updateUI(data) {
        document.getElementById("username-display").innerText = data.username || "COLLECTOR";
        document.getElementById("stat-points").innerText = (data.points || 0).toLocaleString();
        document.getElementById("stat-diamonds").innerText = (data.diamonds || 0).toLocaleString();
        document.getElementById("stat-stars").innerText = (data.stars || 0).toLocaleString();
        
        // แสดงผลแรงก์สูงสุด
        if (data.maxRank && data.maxRank !== "UNRANKED") {
            document.getElementById("max-rank-text").innerText = `${data.maxRank} (${(data.maxTrophies || 0).toLocaleString()} 🏆)`;
        } else {
            document.getElementById("max-rank-text").innerText = "UNRANKED (0 🏆)";
        }

        const avatar = document.getElementById("user-avatar");
        avatar.src = data.userPhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.username}`;

        // โชว์รูปการ์ดที่ตกแต่ง Showcase
        const feat = document.getElementById("featured-card");
        if (data.featuredCard && data.featuredCard.img) {
            feat.innerHTML = `<img src="${data.featuredCard.img}"><span class="featured-label">FEATURED</span>`;
            feat.style.borderColor = data.featuredCard.rarity === 'EXR' ? '#ff0055' : 'var(--primary)';
        } else {
            feat.innerHTML = `<i class="fas fa-plus" style="opacity: 0.2; font-size: 2rem;"></i><span class="featured-label">SHOWCASE</span>`;
            feat.style.borderColor = "var(--glass-border)";
        }

        const collection = data.collection || [];
        document.getElementById("collection-count").innerText = `${collection.length} CARDS`;
        
        const grid = document.getElementById("card-grid");
        if (collection.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding:50px;">ยังไม่มีการ์ดในครอบครอง</p>`;
            return;
        }

        // จัดกลุ่มการ์ดที่ชื่อและระดับเดียวกัน
        const grouped = {};
        collection.forEach(c => {
            const rStyle = (c.rarity || 'C').toUpperCase();
            const key = `${c.name}_${rStyle}`;
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(c);
        });

        // คัดแยกใบที่ดีที่สุดในกลุ่ม และนับจำนวนใบซ้ำ
        let displayList = [];
        for (const key in grouped) {
            const copies = grouped[key];
            // เรียงใบที่ดาวสูงสุด และเลเวลสูงสุดขึ้นมาก่อนในกลุ่ม
            copies.sort((a, b) => {
                const lvA = parseInt(a.level || a.lv || 1);
                const lvB = parseInt(b.level || b.lv || 1);
                const starA = parseInt(a.stars || 0);
                const starB = parseInt(b.stars || 0);
                return (starB * 100 + lvB) - (starA * 100 + lvA);
            });
            
            const bestCard = copies[0];
            const currentLv = parseInt(bestCard.level || bestCard.lv || 1);
            displayList.push({
                ...bestCard,
                finalLv: currentLv,
                qty: copies.length
            });
        }

        // ทำการจัดเรียงลำดับ: เรียงตามระดับ Rarity (สูง->ต่ำ) -> ถ้าระดับเท่ากัน เรียงตาม Level (มาก->น้อย)
        displayList.sort((a, b) => {
            const rA = (a.rarity || 'C').toUpperCase();
            const rB = (b.rarity || 'C').toUpperCase();
            
            const orderA = rarityOrder[rA] || 0;
            const orderB = rarityOrder[rB] || 0;

            if (orderB !== orderA) {
                return orderB - orderA; // เรียงระดับจากสูงไปต่ำ
            }
            return b.finalLv - a.finalLv; // ถ้าระดับเท่ากัน เรียงเลเวลจากมากไปน้อย
        });

        // แสดงผลลัพธ์ลงใน Grid HTML
        grid.innerHTML = displayList.map(c => {
            const rDisplay = (c.rarity || 'C').toUpperCase();
            // แปลงอ็อบเจ็กต์ให้อยู่ในรูป string ปลอดภัยเพื่อส่งเข้าพารามิเตอร์ฟังก์ชัน
            const safeImg = c.img || c.image || '';
            const safeName = (c.name || 'Unknown Card').replace(/'/g, "\\'");
            const safeAtk = c.atk || c.attack || 0;
            const safeDef = c.def || c.defense || 0;

            return `
                <div class="card-item" onclick="setFeatured('${safeImg}', '${rDisplay}', '${safeName}', ${safeAtk}, ${safeDef})">
                    <div class="lvl-tag">LV.${c.finalLv}</div>
                    ${c.qty > 1 ? `<div class="qty-badge">x${c.qty}</div>` : ''}
                    <img src="${safeImg}" onerror="this.src='https://via.placeholder.com/150x225?text=Card'">
                    <div class="card-info">
                        <div class="name">${c.name}</div>
                        <div class="rarity-pill rarity-${rDisplay}">${rDisplay}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 🌟 ขยายระบบเซ็ต Showcase: อัปเดตทั้งก้อน featuredCard และ decoratedCard ไปพร้อมกันเพื่อให้หน้าแรกดึงข้อมูลไปแสดงใน Popup ได้ครบถ้วน 🌟
    window.setFeatured = async (img, rarity, name, atk, def) => {
        if (!img) return;
        
        const result = await Swal.fire({
            title: 'ตั้งค่าการ์ดโชว์',
            text: `ต้องการนำการ์ด "${name}" ใบนี้ไปตั้งเป็นหน้าตาทับโปรไฟล์หลักของคุณใช่หรือไม่?`,
            icon: 'question',
            showCancelButton: true,
            background: '#1a1a1c',
            color: '#fff',
            confirmButtonColor: '#ffc831',
            cancelButtonColor: '#444',
            confirmButtonText: 'ตกลง',
            cancelButtonText: 'ยกเลิก'
        });

        if (result.isConfirmed) {
            try {
                const cardPayload = {
                    img: img,
                    rarity: rarity,
                    name: name,
                    atk: atk,
                    def: def
                };

                // บันทึกข้อมูลทั้ง 2 ฟิลด์หลักเพื่อรองรับการดึงข้อมูลจากหน้าเว็บจุดต่างๆ 
                await updateDoc(doc(db, "users", userUID), { 
                    featuredCard: cardPayload,
                    decoratedCard: cardPayload 
                });

                Swal.fire({
                    icon: 'success',
                    title: 'ตั้งค่าสำเร็จ!',
                    text: 'อัปเดตการ์ดโชว์บนหน้าโปรไฟล์เรียบร้อยแล้ว',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#1a1a1c',
                    color: '#fff'
                });
            } catch (err) {
                console.error("Set featured card error:", err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถบันทึกการ์ดโชว์ได้', 'error');
            }
        }
    };

    function hideLoader() {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => {
            loader.style.display = "none";
            document.getElementById("main-content").classList.add("show");
        }, 500);
    }

    window.logout = () => {
        if(confirm("ออกจากระบบใช่หรือไม่?")) signOut(auth).then(() => location.href = "login.html");
    };
</script>

</body>
</html>
