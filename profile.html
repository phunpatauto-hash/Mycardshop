<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ & คลังการ์ด - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS Global & Background --- */
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: #0a0a0c; 
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 200, 49, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.1) 0%, transparent 40%);
            color: white; margin: 0; padding: 20px; min-height: 100vh;
        }
        
        .container { max-width: 1100px; margin: auto; opacity: 0; transform: translateY(20px); }
        .container.show { opacity: 1; transform: translateY(0); transition: 0.8s ease-out; }

        /* Navbar */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center; }
        .btn-nav { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px 20px; border-radius: 12px; cursor: pointer; text-decoration: none; 
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
        }
        .btn-nav:hover { background: #ffc831; color: #000; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 200, 49, 0.4); }
        
        /* Profile Card */
        .profile-card { 
            background: rgba(255, 255, 255, 0.03);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 40px; align-items: center;
            backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .profile-main { display: flex; align-items: center; gap: 30px; flex: 1; }
        .profile-pic-container { 
            width: 140px; height: 140px; border-radius: 30px; 
            border: 3px solid #ffc831; overflow: hidden;
            box-shadow: 0 0 30px rgba(255,200,49,0.2); transform: rotate(-2deg);
        }
        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info h1 { margin: 0; font-size: 2.2rem; background: linear-gradient(to right, #fff, #ffc831); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .wallet-stats { display: flex; gap: 12px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); }

        /* LV MAX Effects (Changed to LV 20) */
        .item-card.is-max { border: 2px solid #ffc831 !important; box-shadow: 0 0 15px rgba(255, 200, 49, 0.3) !important; background: rgba(255, 200, 49, 0.05) !important; }
        .max-badge {
            position: absolute; top: 5px; left: 5px; z-index: 5;
            background: linear-gradient(45deg, #ff0000, #ffcc00, #00ff00, #00ffff, #ff00ff);
            background-size: 300% 300%; animation: rainbow-bg 3s linear infinite;
            color: white; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .item-card.is-max::after {
            content: ""; position: absolute; top: -110%; left: -210%; width: 200%; height: 200%;
            background: rgba(255, 255, 255, 0.2); transform: rotate(30deg); pointer-events: none;
        }
        .item-card.is-max:hover::after { animation: flash-shine 0.7s forwards; }
        @keyframes flash-shine { from { top: -110%; left: -210%; } to { top: 110%; left: 210%; } }

        /* Star Styling */
        .star-container { color: #ffc831; font-size: 0.7rem; margin-bottom: 5px; letter-spacing: 1px; }

        /* Progress Bar */
        .progress-container { margin-top: 25px; width: 100%; max-width: 400px; }
        .collection-progress { background: rgba(0,0,0,0.3); height: 10px; border-radius: 20px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffc831, #ff8c00); width: 0%; box-shadow: 0 0 15px rgba(255,200,49,0.4); }

        /* Featured Card */
        .featured-card-box { 
            width: 200px; height: 280px; background: rgba(0,0,0,0.4); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .featured-card-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .glow-ssr { border-color: #ffc831; box-shadow: 0 0 30px rgba(255, 200, 49, 0.5); }
        .glow-exr { border-color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.6); animation: rainbow-glow 3s infinite linear, floating 4s ease-in-out infinite; }
        @keyframes rainbow-glow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* Collection Grid */
        .collection-section { background: rgba(255,255,255,0.02); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        
        .item-card { 
            background: rgba(255,255,255,0.03); border-radius: 18px; padding: 10px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
        }
        .item-card:hover { transform: translateY(-10px); border-color: #ffc831; background: rgba(255,255,255,0.07); cursor: pointer; }
        .item-card img { width: 100%; border-radius: 12px; aspect-ratio: 2/3; object-fit: cover; margin-bottom: 10px; }
        
        .card-name-label { font-size: 0.85rem; color: #ccc; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rarity-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 8px; font-weight: bold; display: inline-block; }
        
        .rarity-EXR { background: #ff0055; color: white; }
        .rarity-SSR { background: #ffc831; color: black; }
        .rarity-SR { background: #00e5ff; color: black; }

        .count-tag { 
            position: absolute; top: -5px; right: -5px; background: #ffc831; color: #000; 
            width: 24px; height: 24px; border-radius: 50%; font-size: 0.75rem; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; z-index: 10; border: 2px solid #0a0a0c;
        }

        /* Loader */
        #auth-loader { position: fixed; inset: 0; background: #0a0a0c; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ring { width: 50px; height: 50px; border: 3px solid rgba(255,200,49,0.1); border-top-color: #ffc831; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-loader">
    <div class="loader-ring"></div>
    <p style="color:#ffc831; margin-top:15px; font-size: 0.8rem; letter-spacing: 2px;">LOADING PROFILE...</p>
</div>

<div class="container" id="main-content">
    <div class="nav-bar">
        <a href="index.html" class="btn-nav"><i class="fas fa-chevron-left"></i> หน้าหลัก</a>
        <button onclick="logout()" class="btn-nav" style="border-color: rgba(255,94,94,0.3);"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
    </div>

    <div class="profile-card">
        <div class="profile-main">
            <div class="profile-pic-container">
                <img id="pfp-display" src="" alt="Profile">
            </div>
            <div class="profile-info">
                <h1 id="display-name">---</h1>
                <div class="wallet-stats">
                    <div class="stat-item">🪙 <span id="p-points">0</span></div>
                    <div class="stat-item">💎 <span id="p-diamonds">0</span></div>
                    <div class="stat-item">⭐ <span id="p-stars">0</span></div>
                </div>
                
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#888;">
                        <span>Collection Mastery</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="collection-progress">
                        <div id="progress-bar" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="display-case">
            <div id="featured-slot" class="featured-card-box">
                <div style="color: #444; text-align:center;">
                    <i class="fas fa-plus-circle" style="font-size: 2rem;"></i><br>
                    <small>FEATURED</small>
                </div>
            </div>
        </div>
    </div>

    <div class="collection-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="margin:0; font-size: 1.2rem;"><i class="fas fa-box-open" style="color:#ffc831; margin-right:10px;"></i> คลังการ์ดของคุณ</h2>
            <div id="card-count-label" style="font-size: 0.8rem; opacity: 0.6;">0 CARDS</div>
        </div>
        <div class="collection-grid" id="collection-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserUID = user.uid;
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    renderPage(docSnap.data());
                    setTimeout(() => {
                        document.getElementById("auth-loader").style.opacity = "0";
                        setTimeout(() => document.getElementById("auth-loader").style.display = "none", 500);
                        document.getElementById("main-content").classList.add("show");
                    }, 800);
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function renderPage(data) {
        document.getElementById("display-name").innerText = data.username || "TRAINER";
        document.getElementById("p-points").innerText = (data.points || 0).toLocaleString();
        document.getElementById("p-diamonds").innerText = (data.diamonds || 0).toLocaleString();
        document.getElementById("p-stars").innerText = (data.stars || 0).toLocaleString();
        document.getElementById("pfp-display").src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.username}&backgroundColor=ffc831`;
        
        const rawCards = data.collection || [];
        const total = rawCards.length;
        const percent = Math.min((total / 100) * 100, 100).toFixed(0);
        document.getElementById("progress-bar").style.width = percent + "%";
        document.getElementById("progress-percent").innerText = percent + "%";

        const slot = document.getElementById("featured-slot");
        if (data.featuredCard) {
            slot.innerHTML = `<img src="${data.featuredCard.img}">`;
            slot.className = `featured-card-box glow-${data.featuredCard.rarity?.toLowerCase()}`;
        }

        const list = document.getElementById("collection-list");
        document.getElementById("card-count-label").innerText = `${total} / 100 CARDS`;

        if (total === 0) {
            list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:50px; color:#555;">ยังไม่มีการ์ดในสะสม</div>`;
            return;
        }

        const cardMap = {};
        rawCards.forEach(card => {
            const key = card.name + "_" + card.rarity;
            if (cardMap[key]) {
                cardMap[key].count++;
                if ((card.lv || 1) > cardMap[key].lv) cardMap[key].lv = card.lv;
                if ((card.stars || 1) > cardMap[key].stars) cardMap[key].stars = card.stars;
            } else {
                cardMap[key] = { ...card, count: 1, lv: card.lv || 1, stars: card.stars || 1 };
            }
        });

        const sorted = Object.values(cardMap).sort((a,b) => {
            const rank = { 'EXR': 1, 'SSR': 2, 'SR': 3, 'R': 4 };
            return (rank[a.rarity] || 99) - (rank[b.rarity] || 99);
        });

        list.innerHTML = sorted.map(card => {
            const currentLv = card.lv || 1;
            const currentStars = card.stars || 1;
            const isMax = currentLv >= 20; // แก้ไขเป็นเลเวล 20 คือ MAX
            
            // สร้าง HTML สำหรับดาว
            let starHtml = '';
            for(let i=0; i<5; i++) {
                starHtml += `<i class="${i < currentStars ? 'fas' : 'far'} fa-star"></i>`;
            }

            return `
                <div class="item-card ${isMax ? 'is-max' : ''}" onclick="setFeatured('${card.img}', '${card.rarity}')">
                    ${isMax ? 
                        '<div class="max-badge">LV.20 MAX</div>' : 
                        `<div style="position:absolute; top:5px; left:5px; background:rgba(0,0,0,0.7); font-size:0.65rem; padding:2px 6px; border-radius:4px; border:1px solid rgba(255,255,255,0.2); z-index:5;">LV.${currentLv}</div>`
                    }
                    
                    ${card.count > 1 ? `<div class="count-tag">${card.count}</div>` : ''}
                    <img src="${card.img}" onerror="this.src='https://via.placeholder.com/150x225?text=No+Image'">
                    
                    <div class="card-name-label">${card.name} ${isMax ? '🔥' : ''}</div>
                    
                    <div class="star-container">${starHtml}</div>
                    
                    <div class="rarity-badge rarity-${card.rarity}">${card.rarity}</div>
                </div>
            `;
        }).join('');
    }

    window.setFeatured = async (img, rarity) => {
        if (!currentUserUID) return;
        try {
            await updateDoc(doc(db, "users", currentUserUID), { featuredCard: { img, rarity } });
        } catch (e) { console.error(e); }
    };

    window.logout = () => {
        if(confirm("ยืนยันการออกจากระบบ?")) signOut(auth).then(() => window.location.href = "login.html");
    };
</script>

</body>
</html>
