<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ล็อกอิน - MY GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 40px 30px; border-radius: 20px; text-align: center; border: 1px solid #444; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h2 { color: #ffc831; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #888; font-size: 0.85rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #ffc831; text-align: center; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #ffc831; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #111; font-size: 1.1rem; margin-top: 15px; }
        button:hover { background: #fff; transform: translateY(-2px); }
        .link { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .link a { color: #28a745; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🎮 เข้าสู่ระบบ</h2>
        <p>กรุณากรอกข้อมูลเพื่อเข้าเล่นเกม</p>
        
        <input type="email" id="email" placeholder="อีเมลผู้ใช้งาน" autocomplete="on">
        <input type="password" id="pass" placeholder="รหัสผ่าน">
        
        <button id="login-btn">เข้าสู่เกม</button>
        
        <div class="link">ยังไม่มีบัญชี? <a href="signup.html">สมัครสมาชิกใหม่ที่นี่</a></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("login-btn").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("pass").value.trim();

        if (!email || !pass) return alert("⚠️ กรุณากรอกอีเมลและรหัสผ่าน");

        try {
            // 1. ล็อกอินผ่าน Firebase Auth
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. เช็คข้อมูลใน Firestore โดยใช้ UID
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                alert("ยินดีต้อนรับกลับครับ!");
                window.location.href = "index.html"; 
            } else {
                // 3. ถ้าล็อกอินผ่านแต่ไม่มีข้อมูลใน Firestore (สร้างให้ใหม่)
                await setDoc(userRef, {
                    username: user.email.split('@')[0],
                    points: 0,
                    collection: [],
                    profileImage: ""
                });
                alert("สร้างข้อมูลโปรไฟล์สำเร็จ!");
                window.location.href = "index.html";
            }

        } catch (error) {
            console.error(error);
            let message = "❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง";
            if (error.code === 'auth/user-not-found') message = "❌ ไม่พบชื่อผู้ใช้นี้";
            if (error.code === 'auth/wrong-password') message = "❌ รหัสผ่านผิด";
            alert(message);
        }
    };
</script>
</body>
</html>
