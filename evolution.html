<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOLUTION CENTER - Super Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- Core & Animations --- */
        body { font-family: 'Kanit', sans-serif; margin: 0; background: radial-gradient(circle at center, #1a0500 0%, #050505 100%); color: white; text-align: center; overflow-x: hidden; min-height: 100vh; }
        
        @keyframes ritual-glow {
            0% { box-shadow: 0 0 10px #ff4500; }
            50% { box-shadow: 0 0 40px #ffc831; }
            100% { box-shadow: 0 0 10px #ff4500; }
        }

        @keyframes card-spawn {
            0% { transform: scale(0) rotate(720deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes rotate-light {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, 0); }
            20%, 40%, 60%, 80% { transform: translate(5px, 0); }
        }

        /* --- Layout --- */
        .navbar { background: rgba(0,0,0,0.8); padding: 15px 20px; border-bottom: 1px solid #ff4500; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .btn-back { color: #ffc831; text-decoration: none; border: 1px solid #ffc831; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        /* Evolution Slot UI */
        .ritual-circle { 
            background: rgba(255, 69, 0, 0.05); 
            border: 2px solid rgba(255, 69, 0, 0.2); 
            border-radius: 30px; 
            padding: 40px; 
            margin-bottom: 40px; 
            position: relative;
            animation: ritual-glow 3s infinite;
        }

        .slots-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        
        .card-slot { 
            width: 110px; aspect-ratio: 2/3; border: 2px dashed #ff4500; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: rgba(0,0,0,0.6); transition: 0.3s; position: relative;
        }
        .card-slot.filled { border-style: solid; border-color: #ffc831; box-shadow: 0 0 15px rgba(255, 200, 49, 0.3); }
        .card-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        
        .arrow { font-size: 30px; color: #ffc831; }

        .result-box { 
            width: 150px; aspect-ratio: 2/3; border: 3px solid #ff4500; border-radius: 15px; 
            background: #111; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.5); overflow: hidden;
        }

        /* Inventory Selection */
        .inventory-title { text-align: left; color: #ffc831; border-left: 4px solid #ff4500; padding-left: 10px; margin: 30px 0 20px; font-weight: bold; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        
        .inv-card { 
            background: #151515; border-radius: 10px; border: 1px solid #333; cursor: pointer;
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .inv-card:hover { transform: translateY(-5px); border-color: #ffc831; }
        .inv-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .badge-lvl { position: absolute; top: 5px; right: 5px; background: #ffc831; color: #000; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 3px; }
        .badge-qty { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 5px; border-radius: 3px; }

        .btn-evo { 
            margin-top: 30px; padding: 15px 60px; border-radius: 30px; border: none;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.4s;
            background: #333; color: #666; pointer-events: none;
        }
        .btn-evo.ready { background: linear-gradient(90deg, #ff4500, #ffcc00); color: #000; pointer-events: all; box-shadow: 0 0 20px rgba(255, 69, 0, 0.6); }

        /* --- Evolution Success Overlay (แก้ไขใหม่ให้ภาพเล็กลง) --- */
        #evo-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999;
            backdrop-filter: blur(15px);
        }

        .evo-result-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: card-spawn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .evo-new-card { 
            width: 280px; /* ปรับลดขนาดลงให้พอดี */
            height: auto;
            border: 4px solid #ffc831; 
            border-radius: 15px; 
            box-shadow: 0 0 60px rgba(255, 200, 49, 0.6);
            background: #000;
        }

        .evo-light-effect {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(255,145,0,0.3) 0%, rgba(255,145,0,0) 70%);
            z-index: -1;
            animation: rotate-light 8s linear infinite;
        }

        .evo-text-title {
            color: #ffc831;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff4500;
            letter-spacing: 5px;
        }

        .btn-close-evo {
            margin-top: 30px;
            padding: 12px 40px;
            background: linear-gradient(90deg, #ffc831, #ff9000);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body id="body-main">

    <nav class="navbar">
        <a href="collection.html" class="btn-back">⬅ ย้อนกลับ</a>
        <div style="color: #00d4ff; font-weight: bold;">💎 <span id="user-dia">0</span></div>
    </nav>

    <div class="container">
        <h1 style="color: #ff4500; text-shadow: 0 0 10px #ff4500; margin: 0;">EVOLUTION CENTER</h1>
        <p style="color: #888; margin-bottom: 40px;">เปลี่ยนการ์ดปกติให้เป็นร่าง [EVO] เพื่อปลดล็อกเลเวลสูงสุด</p>

        <div class="ritual-circle">
            <div class="slots-wrapper">
                <div class="card-slot" id="slot-0" onclick="clearSlot(0)"><span>+</span></div>
                <div class="card-slot" id="slot-1" onclick="clearSlot(1)"><span>+</span></div>
                <div class="card-slot" id="slot-2" onclick="clearSlot(2)"><span>+</span></div>
                <div class="arrow">➔</div>
                <div class="result-box" id="result-view">
                    <span style="color: #333;">?</span>
                </div>
            </div>
            <button id="btn-evo-action" class="btn-evo" onclick="startRitual()">เริ่มการวิวัฒนาการ (💎 50)</button>
        </div>

        <div class="inventory-title">การ์ด LV.10 ที่พร้อมวิวัฒนาการ</div>
        <div id="inv-grid" class="card-grid"></div>
    </div>

    <div id="evo-overlay">
        <div class="evo-text-title">EVOLUTION SUCCESS!</div>
        
        <div class="evo-result-container">
            <div class="evo-light-effect"></div>
            <img id="new-evo-img" class="evo-new-card" src="">
            <h2 id="new-evo-name" style="margin-top: 25px; color: white; font-size: 1.5rem;">NAME</h2>
        </div>

        <button class="btn-close-evo" onclick="location.reload()">รับการ์ดและกลับสู่คลัง</button>
    </div>

    <script>
        let slots = [null, null, null];
        const EVO_PRICE = 50;

        function getActiveUser() { return localStorage.getItem("registeredUser") || "Guest"; }

        function load() {
            const user = getActiveUser();
            const collection = JSON.parse(localStorage.getItem("myCollection")) || [];
            const levels = JSON.parse(localStorage.getItem("cardLevels")) || {};
            const dia = parseInt(localStorage.getItem(`diamonds_${user}`)) || 0;
            document.getElementById("user-dia").innerText = dia.toLocaleString();

            const grid = document.getElementById("inv-grid");
            grid.innerHTML = "";

            const counts = {};
            collection.forEach(c => {
                const key = c.name + c.rarity;
                if (!c.isEvo && levels[key] === 10) {
                    if (!counts[key]) counts[key] = { ...c, qty: 0, key: key };
                    counts[key].qty++;
                }
            });

            Object.values(counts).forEach(c => {
                const item = document.createElement("div");
                item.className = "inv-card";
                item.onclick = () => addToSlot(c);
                item.innerHTML = `
                    <div class="badge-lvl">LV.10</div>
                    <div class="badge-qty">x${c.qty}</div>
                    <img src="${c.img}">
                `;
                grid.appendChild(item);
            });
        }

        function addToSlot(card) {
            const firstEmpty = slots.findIndex(s => s === null);
            if (firstEmpty === -1) return;
            if (slots.some(s => s && s.key !== card.key)) {
                alert("ต้องใช้การ์ดชนิดเดียวกันทั้ง 3 ใบ!");
                return;
            }
            slots[firstEmpty] = card;
            updateUI();
        }

        function clearSlot(i) {
            slots[i] = null;
            updateUI();
        }

        function updateUI() {
            slots.forEach((s, i) => {
                const el = document.getElementById(`slot-${i}`);
                el.innerHTML = s ? `<img src="${s.img}">` : "<span>+</span>";
                el.className = s ? "card-slot filled" : "card-slot";
            });

            const isReady = slots.every(s => s !== null);
            const btn = document.getElementById("btn-evo-action");
            const res = document.getElementById("result-view");

            if (isReady) {
                btn.classList.add("ready");
                res.innerHTML = `<img src="${slots[0].img}" style="filter: brightness(1.5) contrast(1.2) hue-rotate(15deg);">`;
            } else {
                btn.classList.remove("ready");
                res.innerHTML = `<span style="color: #333;">?</span>`;
            }
        }

        function startRitual() {
            const user = getActiveUser();
            let dia = parseInt(localStorage.getItem(`diamonds_${user}`)) || 0;

            if (dia < EVO_PRICE) return alert("เพชรไม่พอ!");

            document.getElementById("body-main").classList.add("shake");
            
            setTimeout(() => {
                let collection = JSON.parse(localStorage.getItem("myCollection")) || [];
                let levels = JSON.parse(localStorage.getItem("cardLevels")) || {};
                const targetKey = slots[0].key;

                localStorage.setItem(`diamonds_${user}`, dia - EVO_PRICE);

                let removed = 0;
                collection = collection.filter(c => {
                    if ((c.name + c.rarity) === targetKey && removed < 3) {
                        removed++;
                        return false;
                    }
                    return true;
                });

                const newCard = {
                    ...slots[0],
                    name: slots[0].name + " [EVO]",
                    rarity: "EVO " + slots[0].rarity,
                    isEvo: true
                };
                collection.push(newCard);
                levels[newCard.name + newCard.rarity] = 0; 

                localStorage.setItem("myCollection", JSON.stringify(collection));
                localStorage.setItem("cardLevels", JSON.stringify(levels));

                document.getElementById("new-evo-img").src = newCard.img;
                document.getElementById("new-evo-name").innerText = newCard.name;
                document.getElementById("evo-overlay").style.display = "flex";
            }, 1000);
        }

        window.onload = load;
    </script>
</body>
</html>
