<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE PASS - Star Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: #08080a; color: white; min-height: 100vh; overflow-x: hidden; }
        .navbar { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .btn-back { color: #888; text-decoration: none; font-size: 0.9rem; }
        .container { padding: 20px 0 140px 0; }
        .header-info { text-align: center; margin-bottom: 20px; }
        .pass-title { font-size: 2.2rem; font-weight: 900; color: #ffc831; margin: 0; }
        
        /* ปรับปรุงส่วน Progress Section ให้ยืดหยุ่น */
        .progress-section { max-width: 800px; margin: 0 auto 40px; padding: 0 20px; }
        
        /* ตั้งค่าให้ตัวหนังสืออยู่กึ่งกลางแนวตั้งและชิดซ้าย */
        .lv-info { 
            display: flex; 
            align-items: center; /* กึ่งกลางแนวตั้ง */
            justify-content: flex-start; /* ชิดซ้าย */
            gap: 12px; 
            margin-bottom: 8px; 
            font-weight: bold;
            min-height: 30px;
        }

        .progress-bg { width: 100%; height: 14px; background: #1a1a1c; border-radius: 20px; overflow: hidden; border: 1px solid #333; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffc831, #ff8c00); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* สไตล์พิเศษสำหรับโหมดดวงดาว */
        .progress-fill.star-mode { 
            background: linear-gradient(90deg, #00f2fe, #4facfe); 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .star-text-glow { 
            color: #00f2fe; 
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ส่วนอื่นๆ คงเดิม */
        .pass-system { display: flex; flex-direction: column; gap: 15px; padding: 20px 50px; overflow-x: auto; }
        .pass-row { display: flex; gap: 15px; padding-bottom: 15px; min-width: max-content; align-items: center; }
        .track-label { position: sticky; left: 0; z-index: 10; min-width: 140px; height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; background: #0d0d10; border: 1px solid #333; border-radius: 12px; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .reward-card { width: 120px; height: 140px; background: #151518; border: 2px solid #333; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.3s; overflow: hidden; }
        .reward-img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; filter: grayscale(1) opacity(0.3); }
        .is-unlocked .reward-img { filter: grayscale(0) opacity(1); }
        .rarity-sr { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .rarity-ssr { border-color: #ffc831; background: linear-gradient(135deg, #2c1f01, #000); }
        .rarity-ssr.is-unlocked .reward-img { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #ffc831); } 50% { transform: scale(1.08); filter: drop-shadow(0 0 15px #ffc831); } }
        .lv-tag { position: absolute; top: 5px; right: 8px; font-size: 0.65rem; color: #888; font-weight: bold; }
        .reward-val { font-size: 0.65rem; font-weight: bold; text-align: center; color: #eee; padding: 0 5px; line-height: 1.2; }
        .is-unlocked { border-color: #ffc831 !important; background: rgba(255,200,49,0.05); }
        .is-claimed::after { content: "✓"; position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #2ed573; z-index: 2; font-weight: bold; backdrop-filter: blur(2px); }
        .lv-header-row { display: flex; gap: 15px; margin-left: 155px; min-width: max-content; }
        .lv-box { width: 120px; text-align: center; font-weight: 900; color: #444; font-size: 1.2rem; }
        .lv-box.active { color: #ffc831; }
        .action-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,15,0.95); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; backdrop-filter: blur(10px); z-index: 1000; }
        .btn-premium { background: linear-gradient(45deg, #ff8c00, #ffc831); color: black; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .btn-claim { background: #2ed573; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-claim:disabled { background: #222; color: #555; cursor: not-allowed; }
        .btn-claim.star-ready { background: #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.5); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>
        <div style="font-weight: bold; background: #1a1a1c; padding: 8px 16px; border-radius: 30px; border: 1px solid #333; display: flex; gap: 10px; align-items: center;">
            <span>🪙 <span id="pts">0</span></span>
            <span style="color: #444;">|</span>
            <span>💎 <span id="dia">0</span></span>
            <span style="color: #444;">|</span>
            <span style="color: #00f2fe;">⭐ <span id="stars">0</span></span>
        </div>
    </nav>

    <div class="container">
        <div class="header-info">
            <h1 class="pass-title">SEASONAL PASS</h1>
            <p style="color: #666; font-size: 0.9rem;">เลเวลสูงสุด 50 - สะสมแต้มส่วนเกินเพื่อรับดวงดาว</p>
        </div>

        <div class="progress-section">
            <div class="lv-info" id="lv-info-container">
                </div>
            <div class="progress-bg">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </div>

        <div class="pass-system">
            <div class="lv-header-row" id="lv-header"></div>
            <div class="pass-row" id="premium-track">
                <div class="track-label" style="color: #ffc831; border-color: #ffc831;">
                    <span style="font-size: 0.7rem;">PREMIUM</span>
                    <span>PASS</span>
                    <span style="font-size: 1.2rem; margin-top: 5px;">👑</span>
                </div>
            </div>
            <div class="pass-row" id="free-track">
                <div class="track-label" style="color: #aaa;">
                    <span style="font-size: 0.7rem;">FREE</span>
                    <span>PASS</span>
                    <span style="font-size: 1.2rem; margin-top: 5px;">⚪</span>
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <div id="premium-status"></div>
        <button class="btn-claim" id="claim-btn" disabled>รับรางวัลที่มีทั้งหมด</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLgMyUiSZcIdBXnefK3SHQiVpSaBm8xoM",
        authDomain: "sign-up-73f99.firebaseapp.com",
        projectId: "sign-up-73f99",
        storageBucket: "sign-up-73f99.appspot.com",
        messagingSenderId: "916335559099",
        appId: "1:916335559099:web:3a8ed896ba26e38991849e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const imgAssets = {
        coin: "https://cdn-icons-png.flaticon.com/512/2311/2311904.png",
        diamond: "https://cdn-icons-png.flaticon.com/512/2532/2532847.png",
        cardSR: "https://cookierunbraverse.com/data/en_storage/9dSROSHeCW45pKTUSOYTCQ.webp", 
        cardSSR: "https://cookierunbraverse.com/data/en_storage/Zjseu_FlFypzT3-hXxMdBA.webp",
        star: "https://cdn-icons-png.flaticon.com/512/1828/1828884.png"
    };

    const passData = [];
    for(let i=1; i<=50; i++) {
        passData.push({
            lv: i,
            free: i % 10 === 0 ? { id: `f${i}`, type: 'card', name: "Hollyberry Cookie", rarity: 'SR', img: imgAssets.cardSR } : { id: `f${i}`, type: 'points', amount: i * 150, img: imgAssets.coin },
            premium: i % 5 === 0 ? { id: `p${i}`, type: 'card', name: "Hollyberry Cookie", rarity: 'SSR', img: imgAssets.cardSSR } : { id: `p${i}`, type: 'diamonds', amount: 20, img: imgAssets.diamond }
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) renderPass(docSnap.data(), user.uid);
            });
        } else { window.location.href = 'login.html'; }
    });

    function renderPass(data, uid) {
        document.getElementById("pts").innerText = (data.points || 0).toLocaleString();
        document.getElementById("dia").innerText = (data.diamonds || 0).toLocaleString();
        document.getElementById("stars").innerText = (data.stars || 0).toLocaleString();

        let totalExp = data.passExp || 0;
        let lv = 1;
        let expRequired = 50;
        let tempExp = totalExp;
        let expUsedFor50 = 0;
        for(let l=1; l<50; l++) { expUsedFor50 += (l * 50); }

        while (tempExp >= expRequired && lv < 50) {
            tempExp -= expRequired;
            lv++;
            expRequired = lv * 50;
        }

        const infoContainer = document.getElementById("lv-info-container");
        const progressBar = document.getElementById("progress-bar");

        // ตรวจสอบว่าเป็น Max Level หรือไม่
        if (lv >= 50) {
            let overflowExp = totalExp - expUsedFor50;
            let starProgress = overflowExp % 2500;
            let starReady = Math.floor(overflowExp / 2500) - (data.claimedStars || 0);

            // แสดงสถานะดวงดาวชิดซ้าย
            infoContainer.innerHTML = `
                <span class="star-text-glow" style="font-size: 1.1rem; letter-spacing: 1px;">MAX LEVEL</span>
                <span class="star-text-glow" style="font-size: 0.9rem; margin-left: 10px;">
                    ⭐ ${starProgress.toLocaleString()} / 2,500 EXP
                </span>
            `;
            
            progressBar.style.width = (starProgress / 2500 * 100) + "%";
            progressBar.classList.add("star-mode");
            window.currentStarReady = starReady;
        } else {
            // แสดงสถานะเลเวลปกติชิดซ้าย
            infoContainer.innerHTML = `
                <span style="color: white; font-size: 1.1rem;">LEVEL ${lv}</span>
                <span style="color: #ffc831; font-size: 0.9rem; margin-left: 10px;">
                    ${tempExp.toLocaleString()} / ${expRequired.toLocaleString()} EXP
                </span>
            `;
            progressBar.style.width = (tempExp / expRequired * 100) + "%";
            progressBar.classList.remove("star-mode");
        }

        // Render Cards และปุ่ม Claim (ตรรกะเดิมที่ทำงานได้ดีอยู่แล้ว)
        const lvHeader = document.getElementById("lv-header");
        const preTrack = document.getElementById("premium-track");
        const freeTrack = document.getElementById("free-track");
        const preLabel = `<div class="track-label" style="color: #ffc831; border-color: #ffc831;"><span style="font-size: 0.7rem;">PREMIUM</span><span>PASS</span><span style="font-size: 1.2rem; margin-top: 5px;">👑</span></div>`;
        const freeLabel = `<div class="track-label" style="color: #aaa;"><span style="font-size: 0.7rem;">FREE</span><span>PASS</span><span style="font-size: 1.2rem; margin-top: 5px;">⚪</span></div>`;
        
        lvHeader.innerHTML = "";
        preTrack.innerHTML = preLabel;
        freeTrack.innerHTML = freeLabel;

        let canClaimAny = false;
        let claimList = { pts: 0, dia: 0, cards: [], ids: [] };
        const isPremium = data.isPremiumUser || false;
        const claimed = data.claimedRewards || [];

        passData.forEach(item => {
            const reached = lv >= item.lv;
            lvHeader.innerHTML += `<div class="lv-box ${reached ? 'active' : ''}">${item.lv}</div>`;
            
            const createCardHTML = (reward, isPremiumTrack) => {
                const unlocked = reached && (isPremiumTrack ? isPremium : true);
                const isClaimed = claimed.includes(reward.id);
                if(unlocked && !isClaimed) {
                    canClaimAny = true;
                    claimList.ids.push(reward.id);
                    if(reward.type === 'points') claimList.pts += reward.amount;
                    else if(reward.type === 'diamonds') claimList.dia += reward.amount;
                    else if(reward.type === 'card') {
                        claimList.cards.push({ name: reward.name, rarity: reward.rarity, image: reward.img, level: 1, source: "Battle Pass", receivedAt: new Date().toISOString() });
                    }
                }
                return `<div class="reward-card ${reward.type === 'card' ? (reward.rarity === 'SR' ? 'rarity-sr' : 'rarity-ssr') : ''} ${unlocked ? 'is-unlocked' : ''} ${isClaimed ? 'is-claimed' : ''}"><div class="lv-tag">LV.${item.lv}</div><img src="${reward.img}" class="reward-img"><span class="reward-val">${reward.type === 'card' ? reward.name : reward.amount.toLocaleString()}</span></div>`;
            };
            preTrack.innerHTML += createCardHTML(item.premium, true);
            freeTrack.innerHTML += createCardHTML(item.free, false);
        });

        const claimBtn = document.getElementById("claim-btn");
        if (canClaimAny) {
            claimBtn.disabled = false;
            claimBtn.classList.remove("star-ready");
            claimBtn.innerText = `รับรางวัล (${claimList.ids.length} รายการ)`;
            claimBtn.onclick = async () => {
                claimBtn.disabled = true;
                const updateObj = { points: increment(claimList.pts), diamonds: increment(claimList.dia), claimedRewards: arrayUnion(...claimList.ids) };
                if(claimList.cards.length > 0) updateObj.collection = arrayUnion(...claimList.cards);
                await updateDoc(doc(db, "users", uid), updateObj);
                alert("รับรางวัลสำเร็จ!");
            };
        } else if (lv >= 50 && window.currentStarReady > 0) {
            claimBtn.disabled = false;
            claimBtn.classList.add("star-ready");
            claimBtn.innerText = `รับดวงดาว ⭐ (${window.currentStarReady})`;
            claimBtn.onclick = async () => {
                claimBtn.disabled = true;
                await updateDoc(doc(db, "users", uid), { stars: increment(window.currentStarReady), claimedStars: increment(window.currentStarReady) });
                alert(`คุณได้รับ ${window.currentStarReady} ดวงดาว! ⭐`);
            };
        } else {
            claimBtn.disabled = true;
            claimBtn.classList.remove("star-ready");
            claimBtn.innerText = (lv >= 50) ? "สะสม EXP เพื่อรับดวงดาว" : "รับรางวัลที่มีทั้งหมด";
        }

        const premStatus = document.getElementById("premium-status");
        if(isPremium) {
            premStatus.innerHTML = `<span style="color:#ffc831; font-weight:bold;">✨ PREMIUM MEMBER</span>`;
        } else {
            premStatus.innerHTML = `<button class="btn-premium" id="buy-premium">🔓 ปลดล็อคพรีเมียม (1000 💎)</button>`;
            document.getElementById("buy-premium").onclick = async () => {
                if((data.diamonds || 0) < 1000) return alert("เพชรไม่พอ!");
                if(confirm("ปลดล็อค Premium Track?")) {
                    await updateDoc(doc(db, "users", uid), { diamonds: increment(-1000), isPremiumUser: true });
                }
            };
        }
    }
</script>
</body>
</html>
